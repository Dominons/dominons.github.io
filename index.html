<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DANIFU777 - Dominon </title>
  <link rel="icon" type="image/ico" href="Favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --color-dark-bg: #1A1A1A;
      --color-header-bg: #282828;
      --color-border: #444;
      --color-highlight: #A855F7;
      --color-main-bg: #282828;
      --color-text: #EAEAEA;
      --color-input-bg: #1F1F1F;
      --shadow-light: 0 0 8px rgba(0, 0, 0, 0.5);
      --main-gap: 15px;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--color-dark-bg);
      color: var(--color-text);
      overflow: hidden;
      transition: background 0.3s;
    }

    /* ========== LOGIN SCREEN ========== */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #loginScreen.hidden {
      display: none !important;
    }
    .login-container {
      background: #1F1F1F;
      border: 3px solid #A855F7;
      border-radius: 15px;
      padding: 50px;
      text-align: center;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
    }
    .google-button {
      background: white;
      color: #333;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1em;
    }
    .google-button svg {
      width: 20px;
      height: 20px;
    }

    /* ========== MAIN CONTAINER ========== */
    .container {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    .container.hidden {
      display: none !important;
    }

    /* ========== TOP BAR ========== */
    .top-bar {
      grid-column: 1 / span 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 15px;
      background: var(--color-header-bg);
      border-bottom: 2px solid var(--color-highlight);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.8);
      z-index: 10;
      position: sticky;
      top: 0;
    }
    .top-left,
    .top-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* ========== USER INFO ========== */
    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      background: #333;
      border: 1px solid var(--color-border);
      border-radius: 20px;
      font-size: 0.85em;
    }
    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--color-highlight);
      object-fit: cover;
    }
    .user-name {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--color-text);
    }
    .logout-btn {
      background: #DC2626;
      color: white;
      border: none;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 15px;
      font-size: 0.8em;
      transition: background 0.2s;
    }
    .logout-btn:hover {
      background: #b91c1c;
    }

    /* ========== BOXES & PANELS ========== */
    .box {
      border: 1px solid var(--color-border);
      padding: 4px 10px;
      background: #333;
      border-radius: 4px;
      box-shadow: var(--shadow-light);
      transition: background 0.3s ease;
      font-size: 0.9em;
      white-space: nowrap;
    }
    .main {
      grid-column: 1 / -1;
      background: var(--color-main-bg);
      padding: var(--main-gap);
      display: flex;
      flex-direction: column;
      gap: var(--main-gap);
      height: calc(100vh - 52px);
      overflow-y: auto;
      box-sizing: border-box;
    }

    /* --- CHART --- */
    .chart-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 10px;
      box-shadow: var(--shadow-light);
      height: 300px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .chart-header h2 {
      color: var(--color-highlight);
      margin: 0;
      font-size: 1.2em;
    }
    .symbol-selector {
      background: #333;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 5px 10px;
      border-radius: 4px;
    }
    .chart-iframe {
      width: 100%;
      height: calc(100% - 40px);
      border: none;
    }

    /* --- NOTEPAD --- */
    .notepad-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow-light);
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      min-height: 200px;
    }
    .notepad-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 8px;
    }
    .notepad-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .tab-btn {
      background: #333;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.75em;
    }
    .tab-btn.active {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
    }
    #notepad {
      background: #0D0D0D;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 10px;
      border-radius: 4px;
      font-family: 'Segoe UI', sans-serif;
      resize: none;
      flex-grow: 1;
    }

    /* --- BOTTOM (CALC & POMO) --- */
    .bottom-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--main-gap);
      flex-shrink: 0;
    }
    .calculator-panel, .pomodoro-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 10px;
    }
    .calculator-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    .calc-display {
      background: #0D0D0D;
      color: var(--color-highlight);
      text-align: right;
      padding: 10px;
      margin-bottom: 6px;
      font-size: 1.5em;
      border-radius: 4px;
      border: 1px solid var(--color-highlight);
    }
    .calc-button {
      background: #333;
      color: white;
      border: 1px solid #444;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .pomodoro-display {
      font-size: 2.5em;
      text-align: center;
      color: var(--color-highlight);
      font-weight: bold;
    }
    .pomodoro-controls {
      display: flex;
      gap: 5px;
      justify-content: center;
      margin-top: 10px;
    }
    .pomo-btn {
      background: #333;
      color: white;
      border: 1px solid #444;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 4px;
    }

    /* --- THEMES & MUSIC --- */
    .theme-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid white;
      cursor: pointer;
    }
    .music-container { position: relative; }
    #musicPanel.hidden { display: none !important; }
    .music-btn { background: #333; color: white; border: 1px solid #444; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
  </style>
</head>
<body>

  <div id="loginScreen">
    <div class="login-container">
      <h1 style="color: #A855F7; font-size: 3em; margin: 0;">DANIFU777</h1>
      <button class="google-button" id="googleSignInBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Iniciar sesión con Google
      </button>
    </div>
  </div>

  <div class="container hidden" id="mainApp">
    <div class="top-bar">
      <div class="top-left">
        <div class="box" id="fecha-hora">...</div>
      </div>
      <div class="top-right">
        <div class="user-info" id="userInfo">
          <img class="user-avatar" id="userAvatar" src="" alt="U">
          <span class="user-name" id="userName"></span>
          <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <div class="theme-buttons" style="display:flex; gap:5px;">
          <button class="theme-btn" style="background:#A855F7" onclick="setTheme('#A855F7')"></button>
          <button class="theme-btn" style="background:#3B82F6" onclick="setTheme('#3B82F6')"></button>
          <button class="theme-btn" style="background:#EF4444" onclick="setTheme('#EF4444')"></button>
        </div>
        <div class="music-container">
          <button class="music-btn" id="toggleMusicPanel"><i class="fa-solid fa-compact-disc"></i></button>
          <div id="musicPanel" class="hidden" style="position:absolute; top:40px; right:0; background:#1F1F1F; border:2px solid var(--color-highlight); padding:10px; z-index:1000;">
            <button class="music-btn" id="prevBtn">Prev</button>
            <button class="music-btn" id="playPauseBtn">Play</button>
            <button class="music-btn" id="nextBtn">Next</button>
          </div>
        </div>
      </div>
    </div>

    <main class="main">
      <div class="chart-panel">
        <div class="chart-header">
          <h2>Gráfico</h2>
          <select class="symbol-selector" id="symbolSelect" onchange="changeSymbol()">
            <option value="BINANCE:USDTARS">USDT/ARS</option>
            <option value="BITSTAMP:BTCUSD">BTC/USD</option>
          </select>
        </div>
        <iframe class="chart-iframe" id="tradingViewChart" src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3AUSDTARS&theme=dark" frameborder="0"></iframe>
      </div>

      <div class="notepad-panel">
        <div class="notepad-header-row">
          <h2 id="notepad-title">Bloc - Pág 1</h2>
          <div class="notepad-tabs">
            <button class="tab-btn active" onclick="switchTab(1)">P1</button>
            <button class="tab-btn" onclick="switchTab(2)">P2</button>
            <button class="tab-btn" onclick="switchTab(3)">P3</button>
            <button class="tab-btn" onclick="switchTab(4)">P4</button>
            <button class="tab-btn" onclick="switchTab(5)">P5</button>
          </div>
        </div>
        <textarea id="notepad" placeholder="Escribe algo..."></textarea>
      </div>

      <div class="bottom-container">
        <div class="calculator-panel">
          <div id="display" class="calc-display">0</div>
          <div class="calculator-grid">
            <button class="calc-button" onclick="clearDisplay()">C</button>
            <button class="calc-button" onclick="appendNumber('7')">7</button>
            <button class="calc-button" onclick="appendNumber('8')">8</button>
            <button class="calc-button" onclick="appendOperator('+')">+</button>
            <button class="calc-button" onclick="appendNumber('4')">4</button>
            <button class="calc-button" onclick="appendNumber('5')">5</button>
            <button class="calc-button" onclick="appendNumber('6')">6</button>
            <button class="calc-button" onclick="calculate()">=</button>
          </div>
        </div>
        <div class="pomodoro-panel">
          <div class="pomodoro-display" id="pomo-display">25:00</div>
          <div class="pomodoro-controls">
            <button class="pomo-btn" onclick="togglePomodoro()">Start/Stop</button>
            <button class="pomo-btn" onclick="resetPomodoro()">Reset</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="youtube-player"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDOuLA7meYcSX7zpxHl6sA8eDGS21QD0CY",
      authDomain: "danifu777-4732c.firebaseapp.com",
      projectId: "danifu777-4732c",
      storageBucket: "danifu777-4732c.firebasestorage.app",
      messagingSenderId: "171480985650",
      appId: "1:171480985650:web:4873bc5cc38d67d6c10c2b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Variables globales para el bloc de notas
    window.activeTab = 1;
    let saveTimeout;

    // LOGIN / LOGOUT
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userName').textContent = user.displayName;
        document.getElementById('userAvatar').src = user.photoURL;
        loadNote(window.activeTab); // Cargar la nota al entrar
      } else {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainApp').classList.add('hidden');
      }
    });

    document.getElementById('googleSignInBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    // FUNCIONES DEL BLOC DE NOTAS (FIRESTORE)
    async function loadNote(tabNum) {
      if (!auth.currentUser) return;
      const notepad = document.getElementById('notepad');
      notepad.value = "Cargando....";
      try {
        const docRef = doc(db, "users", auth.currentUser.uid, "notas", `pagina-${tabNum}`);
        const docSnap = await getDoc(docRef);
        notepad.value = docSnap.exists() ? docSnap.data().content : "";
      } catch (e) {
        console.error(e);
        notepad.value = "";
      }
    }

    async function saveNote(tabNum, text) {
      if (!auth.currentUser) return;
      try {
        const docRef = doc(db, "users", auth.currentUser.uid, "notas", `pagina-${tabNum}`);
        await setDoc(docRef, { content: text }, { merge: true });
      } catch (e) { console.error(e); }
    }

    // Evento de escritura
    document.getElementById('notepad').addEventListener('input', (e) => {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        saveNote(window.activeTab, e.target.value);
      }, 1000); // Guarda 1 seg después de dejar de escribir
    });

    // Pestañas
    window.switchTab = function(tabNum) {
      window.activeTab = tabNum;
      document.getElementById('notepad-title').innerText = `Bloc - Pág ${tabNum}`;
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i + 1 === tabNum);
      });
      loadNote(tabNum);
    }
  </script>

  <script>
    // Fecha y Hora
    setInterval(() => {
      document.getElementById("fecha-hora").textContent = new Date().toLocaleString();
    }, 1000);

    // Calculadora Simple
    let calcVal = "0";
    function updateCalc() { document.getElementById('display').innerText = calcVal; }
    window.appendNumber = (n) => { calcVal = calcVal === "0" ? n : calcVal + n; updateCalc(); };
    window.appendOperator = (o) => { calcVal += o; updateCalc(); };
    window.clearDisplay = () => { calcVal = "0"; updateCalc(); };
    window.calculate = () => { try { calcVal = eval(calcVal).toString(); } catch { calcVal = "Error"; } updateCalc(); };

    // Pomodoro
    let pomoSec = 25 * 60, pomoInt, isPomoRun = false;
    window.togglePomodoro = () => {
      if (isPomoRun) clearInterval(pomoInt);
      else pomoInt = setInterval(() => {
        pomoSec--;
        let m = Math.floor(pomoSec/60), s = pomoSec%60;
        document.getElementById('pomo-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
      }, 1000);
      isPomoRun = !isPomoRun;
    };
    window.resetPomodoro = () => { clearInterval(pomoInt); pomoSec = 25*60; isPomoRun = false; document.getElementById('pomo-display').innerText = "25:00"; };

    // Temas y Gráfico
    window.setTheme = (c) => document.documentElement.style.setProperty('--color-highlight', c);
    window.changeSymbol = () => {
      let s = document.getElementById('symbolSelect').value;
      document.getElementById('tradingViewChart').src = `https://s.tradingview.com/widgetembed/?symbol=${s}&theme=dark`;
    };

    // Música Panel
    document.getElementById('toggleMusicPanel').onclick = () => document.getElementById('musicPanel').classList.toggle('hidden');
  </script>

  <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
