<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DANIFU777 - Dominon</title>
  <link rel="icon" type="image/ico" href="Favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --color-dark-bg: #1A1A1A;
      --color-header-bg: #282828;
      --color-border: #444;
      --color-highlight: #A855F7;
      --color-main-bg: #282828;
      --color-text: #EAEAEA;
      --color-input-bg: #1F1F1F;
      --shadow-light: 0 0 8px rgba(0, 0, 0, 0.5);
      --main-gap: 15px;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--color-dark-bg);
      color: var(--color-text);
      overflow: hidden;
      transition: background 0.3s;
    }

    /* ========== LOGIN SCREEN ========== */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #loginScreen.hidden {
      display: none !important;
    }
    .login-container {
      background: #1F1F1F;
      border: 3px solid #A855F7;
      border-radius: 15px;
      padding: 50px;
      text-align: center;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
    }
    .google-button {
      background: white;
      color: #333;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1em;
    }
    .google-button:hover {
      background: #f0f0f0;
    }
    .google-button svg {
      width: 20px;
      height: 20px;
    }

    /* ========== MAIN CONTAINER ========== */
    .container {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    .container.hidden {
      display: none !important;
    }

    /* ========== TOP BAR ========== */
    .top-bar {
      grid-column: 1 / span 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 15px;
      background: var(--color-header-bg);
      border-bottom: 2px solid var(--color-highlight);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.8);
      z-index: 10;
      position: sticky;
      top: 0;
    }
    .top-left,
    .top-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* ========== USER INFO (COMPACT) ========== */
    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      background: #333;
      border: 1px solid var(--color-border);
      border-radius: 20px;
      font-size: 0.85em;
    }
    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--color-highlight);
      object-fit: cover;
    }
    .user-name {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--color-text);
    }
    .logout-btn {
      background: #DC2626;
      color: white;
      border: none;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 15px;
      font-size: 0.8em;
      transition: background 0.2s;
    }
    .logout-btn:hover {
      background: #b91c1c;
    }

    /* ========== SHARED STYLES ========== */
    .box {
      border: 1px solid var(--color-border);
      padding: 4px 10px;
      background: #333;
      border-radius: 4px;
      box-shadow: var(--shadow-light);
      transition: background 0.3s ease;
      font-size: 0.9em;
      white-space: nowrap;
    }
    .main {
      grid-column: 1 / -1;
      background: var(--color-main-bg);
      padding: var(--main-gap);
      display: flex;
      flex-direction: column;
      gap: var(--main-gap);
      height: calc(100vh - 52px);
      overflow-y: auto;
      box-sizing: border-box;
    }
    .main::-webkit-scrollbar {
      width: 10px;
    }
    .main::-webkit-scrollbar-track {
      background: var(--color-input-bg);
    }
    .main::-webkit-scrollbar-thumb {
      background: var(--color-highlight);
      border-radius: 5px;
    }
    .main::-webkit-scrollbar-thumb:hover {
      background: #8b3ed9;
    }
    h1 {
      display: none;
    }
    /* --- GRAFICO TOP --- */
    .chart-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 10px;
      box-shadow: var(--shadow-light);
      height: 300px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 10px;
    }
    .chart-header h2 {
      color: var(--color-highlight);
      margin: 0;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 5px;
      font-size: 1.2em;
      flex: 1;
    }
    .symbol-selector {
      background: #333;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 0.85em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .symbol-selector:hover {
      background: #444;
    }
    .symbol-selector:focus {
      outline: none;
      border-color: var(--color-highlight);
    }
    .chart-iframe {
      width: 100%;
      height: calc(100% - 40px);
      border: none;
      display: block;
    }
    /* --- NOTEPAD PANEL --- */
    .notepad-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow-light);
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      min-height: 200px;
    }
    .notepad-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 8px;
    }
    .notepad-header-row h2 {
      color: var(--color-highlight);
      margin: 0;
      font-size: 1.1em;
    }
    .notepad-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      width: 100%;
    }
    .tab-btn {
      background: #333;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.75em;
      transition: all 0.2s;
      white-space: nowrap;
      flex: 0 1 auto;
    }
    .tab-btn:hover {
      background: #444;
    }
    .tab-btn.active {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
    }
    #notepad {
      background: #0D0D0D;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 10px;
      border-radius: 4px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.95em;
      resize: none;
      flex-grow: 1;
    }
    #notepad::placeholder {
      color: #666;
    }
    #notepad:focus {
      outline: none;
      border-color: var(--color-highlight);
      box-shadow: 0 0 8px rgba(168, 85, 247, 0.3);
    }
    /* --- BOTTOM CONTAINER (CALC + POMODORO) --- */
    .bottom-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--main-gap);
      flex-shrink: 0;
      height: auto;
    }
    /* --- CALCULADORA --- */
    .calculator-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 8px;
      box-shadow: var(--shadow-light);
      display: flex;
      flex-direction: column;
    }
    .calculator-panel h2 {
      color: var(--color-highlight);
      margin: 0 0 6px 0;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 4px;
      font-size: 1em;
    }
    .calculator-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    .calc-display {
      grid-column: 1 / -1;
      background: #0D0D0D;
      color: var(--color-highlight);
      border: 2px solid var(--color-highlight);
      text-align: right;
      padding: 10px;
      margin-bottom: 6px;
      font-size: 1.5em;
      font-weight: bold;
      overflow: hidden;
      min-height: 32px;
      border-radius: 4px;
      font-family: monospace;
      word-break: break-all;
    }
    .calc-button {
      background: #333;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 10px 0;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.1s;
    }
    .calc-button:active {
      background: #555;
      transform: scale(0.95);
    }
    .calc-button:hover {
      background: #444;
    }
    .calc-button.equals {
      grid-column: 4 / span 1;
      grid-row: 5 / span 1;
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
      font-size: 1.1em;
    }
    .calc-button.equals:hover {
      background: #8b3ed9;
    }
    .calc-button.zero {
      grid-column: 1 / span 2;
    }
    .calc-button.operator {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
      font-size: 1.1em;
    }
    .calc-button.operator:hover {
      background: #8b3ed9;
    }
    .calc-button.clear {
      background: #DC2626;
      color: white;
      font-weight: bold;
    }
    .calc-button.clear:hover {
      background: #b91c1c;
    }
    /* --- POMODORO PANEL --- */
    .pomodoro-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 10px;
      box-shadow: var(--shadow-light);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .pomodoro-panel h2 {
      color: var(--color-highlight);
      margin: 0 0 6px 0;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 4px;
      font-size: 1em;
    }
    .pomodoro-display {
      font-size: 2em;
      font-weight: bold;
      color: var(--color-highlight);
      font-family: monospace;
      letter-spacing: 2px;
      text-align: center;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      margin: 8px 0;
    }
    .pomodoro-controls {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .pomo-btn {
      background: #333;
      color: #ddd;
      border: 1px solid #555;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.8em;
      transition: background 0.2s;
      flex: 1;
      min-width: 55px;
    }
    .pomo-btn:hover {
      background: #444;
    }
    .pomo-btn.active {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
    }
    .custom-time-input {
      background: #0D0D0D;
      color: var(--color-highlight);
      border: 1px solid var(--color-highlight);
      padding: 5px 6px;
      border-radius: 4px;
      width: 50px;
      font-size: 0.8em;
      text-align: center;
      flex: 0 0 auto;
    }
    .custom-time-input::placeholder {
      color: #777;
    }
    /* --- THEMES --- */
    .theme-buttons {
      display: flex;
      gap: 8px;
    }
    .theme-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #555;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .theme-btn:hover {
      transform: scale(1.15);
    }
    .theme-btn.purple { background: #A855F7; border-color: #A855F7; }
    .theme-btn.blue { background: #3B82F6; border-color: #3B82F6; }
    .theme-btn.green { background: #10B981; border-color: #10B981; }
    .theme-btn.red { background: #EF4444; border-color: #EF4444; }
    .theme-btn.pink { background: #EC4899; border-color: #EC4899; }
    .theme-btn.yellow { background: #FBBF24; border-color: #FBBF24; }
    .theme-btn.cyan { background: #06B6D4; border-color: #06B6D4; }
    .theme-btn.lime { background: #84CC16; border-color: #84CC16; }
    .theme-btn.orange { background: #F97316; border-color: #F97316; }
    .theme-btn.indigo { background: #6366F1; border-color: #6366F1; }
    .theme-btn.white { background: #FFFFFF; border-color: #FFFFFF; }
    .theme-btn.black { background: #000000; border-color: #FFFFFF; }
    .theme-btn.gray { background: #9CA3AF; border-color: #9CA3AF; }

    /* ========== NUEVO ICONO DE MUSICA ========== */
    .music-icon-btn {
      background: linear-gradient(135deg, #8b3ed9, var(--color-highlight));
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1em;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
      transition: all 0.3s ease;
    }
    .music-icon-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.8);
    }
    .music-icon-btn.playing {
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 15px rgba(168, 85, 247, 0.5); }
      50% { box-shadow: 0 0 30px rgba(168, 85, 247, 0.9); }
    }

    /* ========== MODAL DE MUSICA ========== */
    .music-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      backdrop-filter: blur(5px);
    }
    .music-modal-overlay.active {
      display: flex;
    }
    .music-modal {
      background: linear-gradient(145deg, #1F1F1F, #2a2a2a);
      border: 2px solid var(--color-highlight);
      border-radius: 15px;
      padding: 20px;
      width: 320px;
      max-width: 90vw;
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.4);
      position: relative;
    }
    .music-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--color-border);
    }
    .music-modal-header h3 {
      color: var(--color-highlight);
      margin: 0;
      font-size: 1.1em;
    }
    .close-modal-btn {
      background: #DC2626;
      color: white;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.9em;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .close-modal-btn:hover {
      background: #b91c1c;
    }

    /* --- CONTROLES DE REPRODUCCION --- */
    .music-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    .music-control-btn {
      background: #333;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.9em;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .music-control-btn:hover {
      background: #444;
      transform: scale(1.1);
    }
    .music-control-btn.play-btn {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      width: 50px;
      height: 50px;
      font-size: 1.2em;
    }
    .music-control-btn.play-btn:hover {
      background: #8b3ed9;
    }

    /* --- CONTADOR DE TIEMPO --- */
    .time-display {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 0.85em;
      color: #aaa;
      font-family: monospace;
    }
    .time-current {
      color: var(--color-highlight);
      font-weight: bold;
    }
    .time-total {
      color: #888;
    }
    .progress-bar-container {
      width: 100%;
      height: 6px;
      background: #333;
      border-radius: 3px;
      margin-bottom: 15px;
      cursor: pointer;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--color-highlight), #8b3ed9);
      border-radius: 3px;
      transition: width 0.1s linear;
      width: 0%;
    }

    /* --- BARRA DE VOLUMEN --- */
    .volume-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    .volume-icon {
      color: var(--color-highlight);
      font-size: 1em;
    }
    .volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: #333;
      border-radius: 3px;
      cursor: pointer;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: var(--color-highlight);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .volume-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    /* --- PLAYLISTS --- */
    .playlists-section {
      border-top: 1px solid var(--color-border);
      padding-top: 12px;
    }
    .playlists-section h4 {
      color: var(--color-highlight);
      margin: 0 0 10px 0;
      font-size: 0.9em;
    }
    .playlist-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .playlist-btn {
      background: #333;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 8px 4px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75em;
      text-align: center;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .playlist-btn:hover {
      background: #444;
      border-color: var(--color-highlight);
    }
    .playlist-btn.active {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      border-color: var(--color-highlight);
    }
    .playlist-btn i {
      font-size: 1.2em;
    }

    /* --- NOMBRE DE CANCION --- */
    .song-info {
      text-align: center;
      margin-top: 10px;
      font-size: 0.8em;
      color: #888;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- ========== LOGIN SCREEN ========== -->
  <div id="loginScreen">
    <div class="login-container">
      <h1 style="color: #A855F7; font-size: 3em; margin: 0;">DANIFU777</h1>
      <p style="color: #EAEAEA; margin-top: 10px;">Dominon</p>
      <button class="google-button" id="googleSignInBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Iniciar sesion con Google
      </button>
    </div>
  </div>

  <!-- ========== MAIN APP ========== -->
  <div class="container hidden" id="mainApp">
    <div class="top-bar">
      <div class="top-left">
        <div class="box" id="fecha-hora">Cargando...</div>
      </div>
      <div class="top-right">
        <!-- USER INFO (compact, integrated) -->
        <div class="user-info" id="userInfo">
          <img class="user-avatar" id="userAvatar" src="" alt="Avatar">
          <span class="user-name" id="userName"></span>
          <button class="logout-btn" id="logoutBtn" title="Cerrar sesion">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
        <div class="theme-buttons">
          <button class="theme-btn purple" onclick="setTheme('#A855F7')" title="Purpura"></button>
          <button class="theme-btn blue" onclick="setTheme('#3B82F6')" title="Azul"></button>

    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDOuLA7meYcSX7zpxHl6sA8eDGS21QD0CY",
      authDomain: "danifu777-4732c.firebaseapp.com",
      projectId: "danifu777-4732c",
      storageBucket: "danifu777-4732c.firebasestorage.app",
      messagingSenderId: "171480985650",
      appId: "1:171480985650:web:4873bc5cc38d67d6c10c2b",
      measurementId: "G-SL032V9XGM"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const database = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // Variable global para el usuario
    let currentUser = null;

    // Auth state listener
    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        // User is signed in
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userName').textContent = user.displayName;
        document.getElementById('userAvatar').src = user.photoURL;

        // Cargar estado de musica desde Firebase
        loadMusicState(user.uid);
      } else {
        // User is signed out
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainApp').classList.add('hidden');
      }
    });

    // Sign in button
    document.getElementById('googleSignInBtn').onclick = () => signInWithPopup(auth, provider);

    // Logout button
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    // Funcion para guardar estado de musica
    window.saveMusicState = async function(videoId, currentTime, playlistId) {
      if (!currentUser) return;
      try {
        await set(ref(database, 'users/' + currentUser.uid + '/musicState'), {
          videoId: videoId,
          currentTime: currentTime,
          playlistId: playlistId,
          lastUpdated: Date.now()
        });
      } catch (error) {
        console.error('Error guardando estado de musica:', error);
      }
    };

    // Funcion para cargar estado de musica
    window.loadMusicState = async function(uid) {
      try {
        const snapshot = await get(ref(database, 'users/' + uid + '/musicState'));
        if (snapshot.exists()) {
          const data = snapshot.val();
          if (window.musicPlayer) {
            window.musicPlayer.loadPlaylist(data.playlistId, data.currentTime);
          }
        }
      } catch (error) {
        console.error('Error cargando estado de musica:', error);
      }
    };
  </script>

  <!-- ========== APP SCRIPTS ========== -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    // --- VARIABLES GLOBALES ---
    let player;
    let currentPlaylist = 'PLKByqT47PJxp9fLnCY9Fptz-BBuoW9OWG';
    let isPlayerReady = false;

    // --- FUNCIONES GLOBALES ---
    // 1. CALCULADORA
    const display = document.getElementById('display');
    let currentInput = '0';
    let previousInput = '';
    let operation = null;
    let waitingForSecondOperand = false;

    window.updateDisplay = function () {
      if (display) display.textContent = currentInput.length > 15 ? currentInput.slice(0, 15) : currentInput;
    };

    window.appendNumber = function (number) {
      if (waitingForSecondOperand) {
        currentInput = number;
        waitingForSecondOperand = false;
      } else {
        currentInput = currentInput === '0' && number !== '.' ? number : currentInput + number;
      }
      updateDisplay();
    };

    window.appendOperator = function (nextOperation) {
      const inputValue = parseFloat(currentInput);
      if (operation && waitingForSecondOperand) {
        operation = nextOperation;
        return;
      }
      if (previousInput === '') {
        previousInput = inputValue;
      } else if (operation) {
        const result = performCalculation[operation](previousInput, inputValue);
        currentInput = String(result);
        previousInput = result;
      }
      waitingForSecondOperand = true;
      operation = nextOperation;
      updateDisplay();
    };

    const performCalculation = {
      '/': (a, b) => a / b,
      '*': (a, b) => a * b,
      '+': (a, b) => a + b,
      '-': (a, b) => a - b
    };

    window.calculate = function () {
      if (!operation || waitingForSecondOperand) return;
      const result = performCalculation[operation](previousInput, parseFloat(currentInput));
      currentInput = String(result);
      operation = null;
      previousInput = '';
      waitingForSecondOperand = false;
      updateDisplay();
    };

    window.clearDisplay = function () {
      currentInput = '0';
      previousInput = '';
      operation = null;
      updateDisplay();
    };

    window.backspace = function () {
      if (currentInput.length > 1) currentInput = currentInput.slice(0, -1);
      else currentInput = '0';
      updateDisplay();
    };

    // 2. BLOC DE NOTAS
    let activeTab = localStorage.getItem('danifu_active_tab') || "1";

    window.switchTab = function (tabNum) {
      const notepad = document.getElementById('notepad');
      const notepadTitle = document.getElementById('notepad-title');
      if (notepad) localStorage.setItem(`danifu_notes_v2_${activeTab}`, notepad.value);
      activeTab = String(tabNum);
      localStorage.setItem('danifu_active_tab', activeTab);
      if (notepadTitle) notepadTitle.innerText = `Bloc de Notas - Pag ${activeTab}`;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById(`btn-tab-${activeTab}`);
      if (activeBtn) activeBtn.classList.add('active');
      if (notepad) notepad.value = localStorage.getItem(`danifu_notes_v2_${activeTab}`) || "";
    };

    // 3. CAMBIAR TEMA
    window.setTheme = function (color) {
      document.documentElement.style.setProperty('--color-highlight', color);
      localStorage.setItem('danifu_theme', color);
    };

    // 3.5. CAMBIAR SIMBOLO DEL GRAFICO
    window.changeSymbol = function () {
      const select = document.getElementById('symbolSelect');
      const symbol = select.value;
      const iframe = document.getElementById('tradingViewChart');
      const newSrc = `https://s.tradingview.com/widgetembed/?symbol=${symbol}&interval=D&theme=dark&style=1&locale=es&toolbar_bg=f1f3f6&allow_symbol_change=0&enable_publishing=0&hide_side_toolbar=0&save_image=0&studies=[]&show_popup_button=0&calendar=0&hide_volume=1&no-cache`;
      iframe.src = newSrc;
      localStorage.setItem('danifu_chart_symbol', symbol);
    };

    // 4. POMODORO CON PERSONALIZACION
    let pomoInterval;
    let pomoSeconds = 25 * 60;
    let isRunning = false;

    window.updatePomoUI = function () {
      const m = Math.floor(pomoSeconds / 60).toString().padStart(2, '0');
      const s = (pomoSeconds % 60).toString().padStart(2, '0');
      document.getElementById('pomo-display').innerText = `${m}:${s}`;
    };

    window.togglePomodoro = function () {
      const btn = document.getElementById('start-btn');
      if (isRunning) {
        clearInterval(pomoInterval);
        isRunning = false;
        btn.innerText = "INICIAR";
        btn.classList.remove('active');
      } else {
        isRunning = true;
        btn.innerText = "PAUSAR";
        btn.classList.add('active');
        pomoInterval = setInterval(() => {
          if (pomoSeconds > 0) {
            pomoSeconds--;
            updatePomoUI();
          } else {
            clearInterval(pomoInterval);
            isRunning = false;
            btn.innerText = "INICIAR";
            btn.classList.remove('active');
            alert("Tiempo terminado!");
          }
        }, 1000);
      }
    };

    window.resetPomodoro = function () {
      clearInterval(pomoInterval);
      isRunning = false;
      pomoSeconds = 25 * 60;
      updatePomoUI();
      document.getElementById('start-btn').innerText = "INICIAR";
      document.getElementById('start-btn').classList.remove('active');
    };

    window.setCustomTime = function () {
      const input = document.getElementById('custom-min');
      const mins = parseInt(input.value);
      if (!mins || mins <= 0) {
        alert("Por favor ingresa un numero de minutos valido.");
        return;
      }
      clearInterval(pomoInterval);
      isRunning = false;
      pomoSeconds = mins * 60;
      updatePomoUI();
      document.getElementById('start-btn').innerText = "INICIAR";
      document.getElementById('start-btn').classList.remove('active');
    };

    // --- SISTEMA DE MUSICA MODULAR ---
    window.musicPlayer = {
      isPlaying: false,
      currentTime: 0,
      duration: 0,
      volume: 70,

      // Inicializar reproductor
      init: function() {
        const self = this;

        // Boton de abrir modal
        document.getElementById('musicIconBtn').onclick = () => {
          document.getElementById('musicModal').classList.add('active');
        };

        // Boton de cerrar modal
        document.getElementById('closeMusicModal').onclick = () => {
          document.getElementById('musicModal').classList.remove('active');
        };

        // Cerrar modal al hacer click fuera
        document.getElementById('musicModal').onclick = (e) => {
          if (e.target.id === 'musicModal') {
            document.getElementById('musicModal').classList.remove('active');
          }
        };

        // Controles de reproduccion
        document.getElementById('playPauseBtn').onclick = () => self.togglePlay();
        document.getElementById('prevBtn').onclick = () => self.previous();
        document.getElementById('nextBtn').onclick = () => self.next();

        // Barra de progreso clickeable
        document.getElementById('progressContainer').onclick = (e) => {
          if (!player || !player.getDuration) return;
          const rect = e.target.getBoundingClientRect();
          const percent = (e.clientX - rect.left) / rect.width;
          const newTime = percent * player.getDuration();
          player.seekTo(newTime, true);
        };

        // Control de volumen
        document.getElementById('volumeSlider').oninput = (e) => {
          self.volume = e.target.value;
          if (player && player.setVolume) {
            player.setVolume(self.volume);
          }
          self.updateVolumeIcon();
        };

        // Playlist buttons
        document.querySelectorAll('.playlist-btn').forEach(btn => {
          btn.onclick = () => {
            const playlistId = btn.dataset.playlist;
            self.loadPlaylist(playlistId, 0);
          };
        });
      },

      // Cargar playlist
      loadPlaylist: function(playlistId, startTime = 0) {
        currentPlaylist = playlistId;
        if (player && player.loadPlaylist) {
          player.loadPlaylist({
            listType: 'playlist',
            list: playlistId,
            index: 0,
            startSeconds: startTime,
            suggestedQuality: 'small'
          });
        }

        // Actualizar botones de playlist
        document.querySelectorAll('.playlist-btn').forEach(btn => {
          btn.classList.remove('active');
          if (btn.dataset.playlist === playlistId) {
            btn.classList.add('active');
          }
        });

        document.getElementById('songInfo').textContent = 'Cargando playlist...';
      },

      // Toggle play/pausa
      togglePlay: function() {
        if (!player) return;
        if (player.getPlayerState() === 1) {
          player.pauseVideo();
        } else {
          player.playVideo();
        }
      },

      // Anterior
      previous: function() {
        if (player && player.previousVideo) {
          player.previousVideo();
        }
      },

      // Siguiente
      next: function() {
        if (player && player.nextVideo) {
          player.nextVideo();
        }
      },

      // Actualizar tiempo
      updateTime: function(currentTime, duration) {
        this.currentTime = currentTime;
        this.duration = duration;

        // Actualizar display de tiempo
        document.getElementById('currentTime').textContent = this.formatTime(currentTime);
        document.getElementById('totalTime').textContent = this.formatTime(duration);

        // Actualizar barra de progreso
        if (duration > 0) {
          const percent = (currentTime / duration) * 100;
          document.getElementById('progressBar').style.width = percent + '%';
        }

        // Guardar estado en Firebase periodicamente
        if (currentTime > 0 && Math.floor(currentTime) % 5 === 0) {
          const videoId = player.getVideoId ? player.getVideoId() : '';
          if (typeof saveMusicState === 'function') {
            saveMusicState(videoId, currentTime, currentPlaylist);
          }
        }
      },

      // Formatear tiempo
      formatTime: function(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
      },

      // Actualizar icono de volumen
      updateVolumeIcon: function() {
        const icon = document.getElementById('volumeIcon');
        if (this.volume === 0) {
          icon.className = 'fas fa-volume-mute volume-icon';
        } else if (this.volume < 50) {
          icon.className = 'fas fa-volume-down volume-icon';
        } else {
          icon.className = 'fas fa-volume-up volume-icon';
        }
      },

      // Estado de reproduccion cambio
      onStateChange: function(state) {
        const playBtn = document.getElementById('playPauseBtn');
        const musicIconBtn = document.getElementById('musicIconBtn');

        if (state === 1) {
          // Reproduciendo
          this.isPlaying = true;
          playBtn.innerHTML = '<i class="fas fa-pause"></i>';
          musicIconBtn.classList.add('playing');

          // Obtener nombre de cancion
          try {
            const title = player.getVideoData().title;
            document.getElementById('songInfo').textContent = title.substring(0, 30) + (title.length > 30 ? '...' : '');
          } catch (e) {}
        } else {
          // Pausado o detenido
          this.isPlaying = false;
          playBtn.innerHTML = '<i class="fas fa-play"></i>';
          musicIconBtn.classList.remove('playing');
        }
      }
    };

    // --- YOUTUBE IFRAME API ---
    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('youtube-player', {
        height: '1',
        width: '1',
        playerVars: {
          'listType': 'playlist',
          'list': currentPlaylist,
          'autoplay': 0,
          'controls': 0,
          'disablekb': 1,
          'fs': 0,
          'modestbranding': 1
        },
        events: {
          'onReady': function (event) {
            isPlayerReady = true;
            player.setVolume(70);
            window.musicPlayer.init();
          },
          'onStateChange': function (event) {
            window.musicPlayer.onStateChange(event.data);

            // Actualizar tiempo cada segundo cuando esta reproduciendo
            if (event.data === 1) {
              clearInterval(window.playerInterval);
              window.playerInterval = setInterval(() => {
                if (player && player.getCurrentTime && player.getDuration) {
                  window.musicPlayer.updateTime(player.getCurrentTime(), player.getDuration());
                }
              }, 1000);
            }
          }
        }
      });
    };

    // --- INIT ---
    window.onload = function () {
      window.switchTab(activeTab);

      const notepad = document.getElementById('notepad');
      if (notepad) notepad.addEventListener('input', () => localStorage.setItem(`danifu_notes_v2_${activeTab}`, notepad.value));

      const savedTheme = localStorage.getItem('danifu_theme');
      if (savedTheme) window.setTheme(savedTheme);

      const savedSymbol = localStorage.getItem('danifu_chart_symbol');
      if (savedSymbol) {
        document.getElementById('symbolSelect').value = savedSymbol;
      }

      updatePomoUI();
      updateDisplay();
    };

    // DATE
    setInterval(() => {
      const d = new Date();
      const el = document.getElementById("fecha-hora");
      if (el) el.textContent = d.toLocaleDateString() + " " + d.toLocaleTimeString();
    }, 1000);
  </script>
</body>
</html>
