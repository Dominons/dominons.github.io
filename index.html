<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DANIFU777 - Dominon </title>
  <link rel="icon" type="image/ico" href="Favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    /* ========== ESTILOS ORIGINALES ESTRUCTURALES ========== */
    :root {
      --color-dark-bg: #1A1A1A;
      --color-header-bg: #282828;
      --color-border: #444;
      --color-highlight: #A855F7;
      --color-main-bg: #282828;
      --color-text: #EAEAEA;
      --color-input-bg: #1F1F1F;
      --shadow-light: 0 0 8px rgba(0, 0, 0, 0.5);
      --main-gap: 15px;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--color-dark-bg);
      color: var(--color-text);
      overflow: hidden;
      transition: background 0.3s;
    }

    /* ========== LOGIN SCREEN ========== */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #loginScreen.hidden { display: none !important; }
    .login-container {
      background: #1F1F1F;
      border: 3px solid #A855F7;
      border-radius: 15px;
      padding: 50px;
      text-align: center;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
    }
    .google-button {
      background: white;
      color: #333;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      display: flex;
      align-items: center; gap: 10px; font-size: 1em;
    }

    /* ========== CONTAINER Y TOP BAR ========== */
    .container {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    .container.hidden { display: none !important; }

    .top-bar {
      grid-column: 1 / span 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 15px;
      background: var(--color-header-bg);
      border-bottom: 2px solid var(--color-highlight);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.8);
      z-index: 10;
    }

    /* REPRODUCTOR - EFECTO MARQUEE REQUERIDO */
    .song-display-container {
      width: 250px;
      height: 34px;
      background: #000;
      border: 1px solid var(--color-highlight);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
    }
    .song-title-marquee {
      white-space: nowrap;
      position: absolute;
      padding-left: 100%;
      animation: marquee 15s linear infinite;
      color: var(--color-highlight);
      font-size: 0.9em;
      font-weight: bold;
      text-transform: uppercase;
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-180%); }
    }

    .top-left, .top-right { display: flex; align-items: center; gap: 15px; }
    .user-info { display: flex; align-items: center; gap: 8px; padding: 4px 10px; background: #333; border: 1px solid var(--color-border); border-radius: 20px; font-size: 0.85em; }
    .user-avatar { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--color-highlight); }
    .logout-btn { background: #DC2626; color: white; border: none; padding: 5px 12px; cursor: pointer; border-radius: 15px; }

    .box { border: 1px solid var(--color-border); padding: 5px 12px; background: #333; border-radius: 4px; font-size: 0.9em; box-shadow: var(--shadow-light); }
    .main { padding: var(--main-gap); display: flex; flex-direction: column; gap: var(--main-gap); height: calc(100vh - 55px); overflow-y: auto; box-sizing: border-box; }

    /* ========== PANELES ========== */
    .chart-panel, .notepad-panel, .calculator-panel, .pomodoro-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 10px;
      padding: 15px;
      box-shadow: var(--shadow-light);
    }

    /* CHART */
    .chart-panel { height: 350px; display: flex; flex-direction: column; flex-shrink: 0; }
    .chart-iframe { width: 100%; height: calc(100% - 45px); border: none; border-radius: 5px; }

    /* NOTEPAD CON 20 PÁGINAS */
    .notepad-panel { display: flex; flex-direction: column; flex-grow: 1; min-height: 300px; }
    .notepad-tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
    .tab-btn { background: #333; color: var(--color-text); border: 1px solid var(--color-border); padding: 6px 10px; cursor: pointer; border-radius: 5px; font-size: 0.8em; transition: 0.2s; }
    .tab-btn.active { background: var(--color-highlight); color: #000; font-weight: bold; border-color: #fff; }
    #notepad { background: #0D0D0D; color: var(--color-text); border: 1px solid var(--color-border); padding: 15px; border-radius: 6px; resize: none; flex-grow: 1; font-size: 1.05em; line-height: 1.6; font-family: inherit; }

    /* CALCULADORA Y POMODORO */
    .bottom-container { display: grid; grid-template-columns: 1fr 1fr; gap: var(--main-gap); flex-shrink: 0; }
    .calc-display { background: #0D0D0D; color: var(--color-highlight); text-align: right; padding: 15px; margin-bottom: 10px; font-size: 1.8em; border: 1px solid var(--color-highlight); border-radius: 5px; font-family: 'Courier New', Courier, monospace; }
    .calculator-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .calc-button { background: #333; color: white; border: 1px solid #444; padding: 15px; border-radius: 6px; cursor: pointer; font-size: 1.1em; transition: background 0.2s; }
    .calc-button:hover { background: #444; }
    .pomodoro-display { font-size: 3.5em; text-align: center; color: var(--color-highlight); font-weight: bold; margin: 15px 0; text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }

    /* PANEL MÚSICA REESTRUCTURADO */
    #musicPanel { position: absolute; top: 60px; right: 20px; background: #1F1F1F; border: 2px solid var(--color-highlight); padding: 25px; border-radius: 15px; z-index: 1000; width: 260px; box-shadow: 0 20px 40px rgba(0,0,0,0.7); }
    #musicPanel.hidden { display: none; }
    .music-controls { display: flex; justify-content: center; gap: 25px; margin-bottom: 20px; }
    .music-btn-ui { background: none; border: none; color: white; font-size: 1.6em; cursor: pointer; transition: 0.2s; }
    .music-btn-ui:hover { color: var(--color-highlight); transform: scale(1.1); }
    .prog-container { margin-bottom: 15px; }
    .volume-container { display: flex; align-items: center; gap: 12px; }
    input[type="range"] { cursor: pointer; accent-color: var(--color-highlight); }

    /* SCROLLBAR PERSONALIZADA */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: var(--color-dark-bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-highlight); }
  </style>
</head>
<body>

  <div id="loginScreen">
    <div class="login-container">
      <h1 style="color: #A855F7; font-size: 4.5em; margin: 0;">DANIFU777</h1>
      <p style="color: #666; letter-spacing: 3px; margin-top: -10px; margin-bottom: 30px;">DOMINON SYSTEM</p>
      <button class="google-button" id="googleSignInBtn">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Entrar con Google Account
      </button>
    </div>
  </div>

  <div class="container hidden" id="mainApp">
    <header class="top-bar">
      <div class="top-left">
        <div class="box" id="fecha-hora">...</div>
      </div>
      
      <div class="song-display-container">
        <div class="song-title-marquee" id="song-title">Cargando playlist...</div>
      </div>

      <div class="top-right">
        <div class="user-info">
          <img class="user-avatar" id="userAvatar" src="">
          <span class="user-name" id="userName"></span>
          <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <div class="theme-buttons" style="display:flex; gap:8px;">
          <button class="theme-btn" style="width:20px; height:20px; border-radius:50%; background:#A855F7; border:1px solid #fff; cursor:pointer;" onclick="setTheme('#A855F7')"></button>
          <button class="theme-btn" style="width:20px; height:20px; border-radius:50%; background:#3B82F6; border:1px solid #fff; cursor:pointer;" onclick="setTheme('#3B82F6')"></button>
          <button class="theme-btn" style="width:20px; height:20px; border-radius:50%; background:#EF4444; border:1px solid #fff; cursor:pointer;" onclick="setTheme('#EF4444')"></button>
        </div>
        <button class="box" id="toggleMusicPanel" style="cursor:pointer; color:var(--color-highlight); border:1px solid var(--color-highlight); font-size:1.1em;"><i class="fa-solid fa-music"></i></button>
      </div>
    </header>

    <div id="musicPanel" class="hidden">
      <div class="music-controls">
        <button class="music-btn-ui" onclick="window.player.previousVideo()"><i class="fas fa-step-backward"></i></button>
        <button class="music-btn-ui" id="playPauseBtn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
        <button class="music-btn-ui" onclick="window.player.nextVideo()"><i class="fas fa-step-forward"></i></button>
      </div>
      <div class="prog-container">
        <input type="range" id="progressBar" value="0" step="1" style="width:100%">
        <div style="display:flex; justify-content:space-between; font-size:0.7em; color:#888; margin-top:5px;">
          <span id="current-time">0:00</span>
          <span id="duration-time">0:00</span>
        </div>
      </div>
      <div class="volume-container">
        <i class="fas fa-volume-down" style="color:var(--color-highlight)"></i>
        <input type="range" id="volumeSlider" min="0" max="100" value="50" style="flex:1">
        <i class="fas fa-volume-up" style="color:var(--color-highlight)"></i>
      </div>
    </div>

    <main class="main">
      <div class="chart-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
          <h2 style="color:var(--color-highlight); margin:0; font-size:1.3em;">Trading Analysis</h2>
          <select id="symbolSelect" onchange="changeSymbol()" style="background:#333; color:white; border:1px solid var(--color-highlight); border-radius:4px;">
            <option value="BINANCE:USDTARS">USDT/ARS</option>
            <option value="BITSTAMP:BTCUSD">BTC/USD</option>
          </select>
        </div>
        <iframe class="chart-iframe" id="tradingViewChart" src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3AUSDTARS&theme=dark" frameborder="0"></iframe>
      </div>

      <div class="notepad-panel">
        <div class="notepad-tabs">
          <script>
            for(let i=1; i<=20; i++){
              document.write(`<button class="tab-btn ${i===1?'active':''}" onclick="switchTab(${i})">${i}</button>`);
            }
          </script>
        </div>
        <h2 id="notepad-title" style="margin:0 0 10px 0; font-size:1.1em; color:var(--color-highlight);">Bloc de Notas - Página 1</h2>
        <textarea id="notepad" placeholder="Tu información se guarda automáticamente en Firestore..."></textarea>
      </div>

      <div class="bottom-container">
        <div class="calculator-panel">
          <div id="display" class="calc-display">0</div>
          <div class="calculator-grid">
            <button class="calc-button" onclick="clearDisplay()">C</button>
            <button class="calc-button" onclick="appendOperator('/')">/</button>
            <button class="calc-button" onclick="appendOperator('*')">*</button>
            <button class="calc-button" onclick="deleteLast()">←</button>
            <button class="calc-button" onclick="appendNumber('7')">7</button>
            <button class="calc-button" onclick="appendNumber('8')">8</button>
            <button class="calc-button" onclick="appendNumber('9')">9</button>
            <button class="calc-button" onclick="appendOperator('-')">-</button>
            <button class="calc-button" onclick="appendNumber('4')">4</button>
            <button class="calc-button" onclick="appendNumber('5')">5</button>
            <button class="calc-button" onclick="appendNumber('6')">6</button>
            <button class="calc-button" onclick="appendOperator('+')">+</button>
            <button class="calc-button" onclick="appendNumber('1')">1</button>
            <button class="calc-button" onclick="appendNumber('2')">2</button>
            <button class="calc-button" onclick="appendNumber('3')">3</button>
            <button class="calc-button" onclick="calculate()" style="background:var(--color-highlight); color:black;">=</button>
            <button class="calc-button" onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
            <button class="calc-button" onclick="appendNumber('.')">.</button>
          </div>
        </div>
        <div class="pomodoro-panel" style="text-align:center;">
          <h2 style="margin:0; font-size:1em; color:#888;">TIMER FOCUS</h2>
          <div class="pomodoro-display" id="pomo-display">25:00</div>
          <div style="display:flex; justify-content:center; gap:10px;">
            <button class="calc-button" onclick="togglePomodoro()">START / STOP</button>
            <button class="calc-button" onclick="resetPomodoro()">RESET</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="youtube-player"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDOuLA7meYcSX7zpxHl6sA8eDGS21QD0CY",
      authDomain: "danifu777-4732c.firebaseapp.com",
      projectId: "danifu777-4732c",
      storageBucket: "danifu777-4732c.firebasestorage.app",
      messagingSenderId: "171480985650",
      appId: "1:171480985650:web:4873bc5cc38d67d6c10c2b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    window.activeTab = 1;
    let saveTimeout;

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userName').textContent = user.displayName;
        document.getElementById('userAvatar').src = user.photoURL;
        loadNote(window.activeTab);
      } else {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainApp').classList.add('hidden');
      }
    });

    document.getElementById('googleSignInBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    async function loadNote(tabNum) {
      if (!auth.currentUser) return;
      const notepad = document.getElementById('notepad');
      notepad.value = "Sincronizando...";
      const snap = await getDoc(doc(db, "users", auth.currentUser.uid, "notas", `pagina-${tabNum}`));
      notepad.value = snap.exists() ? snap.data().content : "";
    }

    document.getElementById('notepad').oninput = (e) => {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(async () => {
        if (auth.currentUser) {
          await setDoc(doc(db, "users", auth.currentUser.uid, "notas", `pagina-${window.activeTab}`), { content: e.target.value }, { merge: true });
        }
      }, 1000);
    };

    window.switchTab = (n) => {
      window.activeTab = n;
      document.getElementById('notepad-title').innerText = `Bloc de Notas - Página ${n}`;
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i+1 === n));
      loadNote(n);
    };
  </script>

  <script>
    // ========== YOUTUBE API INTEGRATION ==========
    let player;
    function onYouTubeIframeAPIReady() {
      window.player = new YT.Player('youtube-player', {
        height: '0', width: '0',
        playerVars: {
          listType: 'playlist',
          list: 'PL4fGSI1pDJn6jW076GVgK77zKu31', // REEMPLAZA CON TU PLAYLIST REAL
          loop: 1
        },
        events: {
          'onReady': (e) => {
             const v = localStorage.getItem('danifu_volume') || 50;
             e.target.setVolume(v);
             document.getElementById('volumeSlider').value = v;
          },
          'onStateChange': (e) => {
             const btn = document.getElementById('playPauseBtn');
             if(e.data == 1) {
               btn.innerHTML = '<i class="fas fa-pause"></i>';
               const title = window.player.getVideoData().title;
               document.getElementById('song-title').innerText = title || "Reproduciendo...";
             } else {
               btn.innerHTML = '<i class="fas fa-play"></i>';
             }
          }
        }
      });
    }

    function togglePlay() {
      const s = window.player.getPlayerState();
      s == 1 ? window.player.pauseVideo() : window.player.playVideo();
    }

    setInterval(() => {
      if(window.player && window.player.getCurrentTime){
        const cur = window.player.getCurrentTime();
        const dur = window.player.getDuration();
        if(dur > 0){
          document.getElementById('progressBar').value = (cur/dur)*100;
          document.getElementById('current-time').innerText = Math.floor(cur/60) + ":" + Math.floor(cur%60).toString().padStart(2,'0');
          document.getElementById('duration-time').innerText = Math.floor(dur/60) + ":" + Math.floor(dur%60).toString().padStart(2,'0');
        }
      }
    }, 1000);

    document.getElementById('progressBar').oninput = (e) => window.player.seekTo((e.target.value/100)*window.player.getDuration());
    document.getElementById('volumeSlider').oninput = (e) => {
      window.player.setVolume(e.target.value);
      localStorage.setItem('danifu_volume', e.target.value);
    };

    document.getElementById('toggleMusicPanel').onclick = () => document.getElementById('musicPanel').classList.toggle('hidden');

    // ========== HERRAMIENTAS EXTRAS ==========
    setInterval(() => document.getElementById("fecha-hora").textContent = new Date().toLocaleString(), 1000);

    let calcV = "0";
    const updC = () => document.getElementById('display').innerText = calcV;
    window.appendNumber = (n) => { calcV = calcV === "0" ? n : calcV + n; updC(); };
    window.appendOperator = (o) => { calcV += o; updC(); };
    window.deleteLast = () => { calcV = calcV.slice(0,-1) || "0"; updC(); };
    window.clearDisplay = () => { calcV = "0"; updC(); };
    window.calculate = () => { try { calcV = eval(calcV).toString(); } catch { calcV = "Error"; } updC(); };

    let pS = 25*60, pI, pR = false;
    window.togglePomodoro = () => {
      if(pR) clearInterval(pI);
      else pI = setInterval(() => {
        pS--;
        document.getElementById('pomo-display').innerText = Math.floor(pS/60) + ":" + (pS%60).toString().padStart(2,'0');
      }, 1000);
      pR = !pR;
    };
    window.resetPomodoro = () => { clearInterval(pI); pS = 25*60; pR = false; document.getElementById('pomo-display').innerText = "25:00"; };

    window.setTheme = (c) => document.documentElement.style.setProperty('--color-highlight', c);
    window.changeSymbol = () => {
      const s = document.getElementById('symbolSelect').value;
      document.getElementById('tradingViewChart').src = `https://s.tradingview.com/widgetembed/?symbol=${s}&theme=dark`;
    };
  </script>
  <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
