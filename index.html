<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIFU777 - Unified Terminal & Dashboard</title>
    <link rel="icon" type="image/ico" href="Favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --color-dark-bg: #000000;
            --color-header-bg: #0D0D0D;
            --color-border: #333;
            --color-highlight: #A855F7;
            --color-main-bg: #000000;
            --color-text: #EAEAEA;
            --color-input-bg: #0D0D0D;
            --shadow-light: 0 0 10px rgba(168, 85, 247, 0.2);
            --main-gap: 15px;
            --fs: 14px;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--color-dark-bg);
            color: var(--color-text);
            overflow: hidden;
        }

        .hidden-view { display: none !important; }

        /* Estilos Globales de Dominon */
        #loginScreen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        #loginScreen.hidden { display: none !important; }
        .login-container { background: #0D0D0D; border: 3px solid var(--color-highlight); border-radius: 15px; padding: 50px; text-align: center; box-shadow: 0 0 30px rgba(168, 85, 247, 0.3); }
        .google-button { background: white; color: #333; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 20px; display: flex; align-items: center; gap: 10px; font-size: 1em; }
        
        .container { display: grid; grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: 100vh; }
        .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 15px; background: var(--color-header-bg); border-bottom: 2px solid var(--color-highlight); z-index: 100; gap: 10px; }
        .top-left, .top-right { display: flex; align-items: center; gap: 10px; }
        
        .box { border: 1px solid var(--color-border); padding: 4px 10px; background: #111; border-radius: 4px; font-size: 0.9em; }
        .view-switch-btn { background: var(--color-highlight); color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .view-switch-btn:hover { filter: brightness(1.2); box-shadow: 0 0 10px var(--color-highlight); }

        .main { padding: var(--main-gap); display: flex; flex-direction: column; gap: var(--main-gap); height: calc(100vh - 60px); overflow-y: auto; box-sizing: border-box; }
        .chart-panel, .notepad-panel, .calculator-panel, .pomodoro-panel { background: var(--color-input-bg); border: 2px solid var(--color-highlight); border-radius: 8px; padding: 12px; box-shadow: var(--shadow-light); }
        
        /* Aislamiento Estilos Terminal DATOS */
        #deep-flow-view { height: calc(100vh - 60px); display: flex; flex-direction: column; background: #000; font-family: 'Courier New', monospace; font-size: var(--fs); }
        #deep-flow-view .terminal-header { display: flex; gap: 20px; padding: 10px; border-bottom: 1px solid #222; background: #050505; }
        #deep-flow-view .ledger-container { flex: 1; display: flex; overflow: hidden; }
        #deep-flow-view .ledger-main { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #222; }
        #deep-flow-view .ledger-body { flex: 1; overflow-y: auto; position: relative; }
        #deep-flow-view .row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #111; cursor: pointer; transition: background 0.2s; }
        #deep-flow-view .row:hover { background: #0A0A0A; }
        #deep-flow-view .row.active { background: #151515; }
        #deep-flow-view .action-tag { padding: 2px 6px; border-left: 3px solid; font-size: 0.8em; font-weight: bold; }
        #deep-flow-view .submenu { display: none; background: #080808; padding: 15px; border-bottom: 1px solid #222; }
        #deep-flow-view .submenu.open { display: block; }
        #deep-flow-view .sidebar { width: 280px; padding: 15px; background: #030303; display: none; }
        #deep-flow-view .sidebar.active { display: block; }
        #deep-flow-view .status-dot.live { color: #39FF14; text-shadow: 0 0 5px #39FF14; }
        #deep-flow-view .pos { color: #39FF14; }
        #deep-flow-view .neg { color: #FF3131; }

        /* Estilos Música (Global) */
        .music-player-panel { position: fixed; bottom: 20px; right: 20px; background: #0D0D0D; border: 2px solid var(--color-highlight); padding: 15px; border-radius: 8px; z-index: 1001; width: 280px; }
        .music-player-panel.hidden { display: none !important; }
        
        /* Utility */
        .user-avatar { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--color-highlight); }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-container">
        <h1 style="color: #A855F7; font-size: 3em; margin: 0;">DANIFU777</h1>
        <p style="color: #EAEAEA; margin-top: 10px;">Acceso Terminal Unificada</p>
        <button class="google-button" id="googleSignInBtn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Iniciar con Google
        </button>
    </div>
</div>

<div class="container hidden" id="mainApp">
    <header class="top-bar">
        <div class="top-left">
            <div class="box" id="fecha-hora">Cargando...</div>
            <button class="view-switch-btn" onclick="toggleViews()">
                <i class="fas fa-exchange-alt"></i> CAMBIAR VISTA
            </button>
        </div>
        <div class="top-right">
            <div id="userInfo" style="display:flex; align-items:center; gap:8px;">
                <img class="user-avatar" id="userAvatar" src="">
                <span id="userName" class="box">Usuario</span>
                <button class="box" id="logoutBtn" style="color:#FF3131; cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <div class="box" id="songTitle">Silencio</div>
            <button class="box" id="toggleMusicPanel"><i class="fa-solid fa-music"></i></button>
        </div>
    </header>

    <!-- VISTA 1: DOMINON DASHBOARD -->
    <main id="main-dashboard-view" class="main">
        <div class="chart-panel">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <h2 style="margin:0; font-size:1em; color:var(--color-highlight);">LIVE CHART</h2>
                <select id="symbolSelect" class="box" style="background:#000; color:white;" onchange="changeSymbol()">
                    <option value="BINANCE:BTCUSDT">BTC/USDT</option>
                    <option value="BINANCE:ETHUSDT">ETH/USDT</option>
                </select>
            </div>
            <iframe id="tradingViewChart" style="width:100%; height:250px; border:none;" src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3ABTCUSDT&theme=dark"></iframe>
        </div>

        <div class="notepad-panel">
            <div id="notepad-tabs" style="display:flex; gap:5px; margin-bottom:8px;"></div>
            <textarea id="notepad" style="width:100%; height:150px; background:#000; color:white; border:1px solid #333; resize:none;" placeholder="Notas de sesión..."></textarea>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div class="calculator-panel">
                <div id="display" style="background:#000; color:var(--color-highlight); padding:10px; text-align:right; font-family:monospace; font-size:1.5em; border:1px solid #333; margin-bottom:5px;">0</div>
                <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:4px;">
                    <button class="box" onclick="clearDisplay()">C</button>
                    <button class="box" onclick="appendOperator('/')">/</button>
                    <button class="box" onclick="appendOperator('*')">*</button>
                    <button class="box" onclick="appendNumber('7')">7</button>
                    <button class="box" onclick="appendNumber('8')">8</button>
                    <button class="box" onclick="appendNumber('9')">9</button>
                    <button class="box" onclick="calculate()" style="grid-row: span 2; background:var(--color-highlight); color:#000;">=</button>
                    <button class="box" onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
                </div>
            </div>
            <div class="pomodoro-panel">
                <div id="pomo-display" style="font-size:2.5em; text-align:center; color:var(--color-highlight); font-family:monospace;">25:00</div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <button class="box" id="start-btn" onclick="togglePomodoro()" style="flex:1;">START</button>
                    <button class="box" onclick="resetPomodoro()">RST</button>
                </div>
            </div>
        </div>
    </main>

    <!-- VISTA 2: DEEP FLOW TERMINAL (DATOS) -->
    <div id="deep-flow-view" class="hidden-view">
        <div class="terminal-header">
            <div class="box"><i id="status-dot" class="fas fa-circle"></i> <span id="hdr-conn-status">CONNECTING...</span></div>
            <div class="box">BTC: <span id="btc-price">---</span> <small id="btc-change"></small></div>
            <div class="box">GAS: <span id="gas-value">--</span> gwei</div>
            <div class="box" id="hdr-clock">00:00:00</div>
        </div>
        <div class="ledger-container">
            <div class="ledger-main">
                <div id="ledger-header" class="row" style="background:#080808; font-weight:bold; border-bottom:2px solid #222;">
                    <span style="flex:1;" data-sort="value" class="sort-header">VALUE <span id="arrow-value"></span></span>
                    <span style="width:100px; text-align:center;">ASSET</span>
                    <span style="width:115px; text-align:center;">ACTION</span>
                    <span style="flex:1;">FROM/TO</span>
                </div>
                <div id="ledger-body" class="ledger-body">
                    <div id="scroll-sentinel"></div>
                </div>
            </div>
            <aside id="sidebar-onchain" class="sidebar active">
                <div class="box" style="margin-bottom:10px;">FLOW RATIO</div>
                <div style="height:10px; background:#222; display:flex; border-radius:5px; overflow:hidden;">
                    <div id="ratio-buy" style="background:#39FF14; width:50%;"></div>
                    <div id="ratio-sell" style="background:#FF3131; width:50%;"></div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:0.7em; margin-top:5px;">
                    <span id="ratio-buy-label">BUY 50%</span>
                    <span id="ratio-sell-label">SELL 50%</span>
                </div>
            </aside>
        </div>
    </div>
</div>

<!-- ELEMENTOS GLOBALES -->
<div id="musicPanel" class="hidden music-player-panel">
    <div style="text-align:center; font-weight:bold; color:var(--color-highlight); margin-bottom:10px;">CYBER-PLAYER</div>
    <div style="display:flex; justify-content:center; gap:15px; margin-bottom:10px;">
        <button id="prevBtn" class="box"><i class="fas fa-backward"></i></button>
        <button id="playPauseBtn" class="box"><i class="fas fa-play"></i></button>
        <button id="nextBtn" class="box"><i class="fas fa-forward"></i></button>
    </div>
    <input type="range" id="progressBar" style="width:100%; accent-color:var(--color-highlight);" value="0">
    <div style="display:flex; justify-content:space-between; font-size:0.7em; color:#888;">
        <span id="current-time">0:00</span>
        <span id="duration-time">0:00</span>
    </div>
</div>
<div id="youtube-player" style="position:absolute; visibility:hidden;"></div>

<!-- SCRIPTS UNIFICADOS -->
<script src="https://www.youtube.com/iframe_api"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDOuLA7meYcSX7zpxHl6sA8eDGS21QD0CY",
        authDomain: "danifu777-4732c.firebaseapp.com",
        projectId: "danifu777-4732c",
        databaseURL: "https://danifu777-4732c-default-rtdb.firebaseio.com",
        storageBucket: "danifu777-4732c.firebasestorage.app",
        messagingSenderId: "171480985650",
        appId: "1:171480985650:web:4873bc5cc38d67d6c10c2b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);
    const provider = new GoogleAuthProvider();

    window.auth = auth; window.db = db; window.rtdb = rtdb;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').textContent = user.displayName;
            document.getElementById('userAvatar').src = user.photoURL;
            window.loadNoteFromFirestore(window.activeTab);
            // Iniciar motores de datos tras login
            if(typeof initTerminal === 'function') initTerminal();
        } else {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
        }
    });

    document.getElementById('googleSignInBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);
</script>

<script>
    // CONTROL DE VISTAS (SPA SWITCH) [Fuente 2]
    function toggleViews() {
        const dash = document.getElementById('main-dashboard-view');
        const flow = document.getElementById('deep-flow-view');
        dash.classList.toggle('hidden-view');
        flow.classList.toggle('hidden-view');
        console.log("View switched. Deep Flow Engine remains active.");
    }

    // --- LÓGICA TERMINAL DATOS (DEEP FLOW) [Fuente 1] ---
    const STATE = { 
        lang:'en', sortField:'value', sortDir:'desc', dataStream:'onchain', 
        pool:[], visible:[], renderedCount:0, apiAlive:false, btcPrice:104500, gasPrice:32 
    };

    const DOM = {
        statusDot: document.getElementById('status-dot'),
        hdrClock: document.getElementById('hdr-clock'),
        btcPrice: document.getElementById('btc-price'),
        ledgerBody: document.getElementById('ledger-body'),
        scrollSentinel: document.getElementById('scroll-sentinel')
    };

    function formatUSD(v) { return '$' + (v >= 1e6 ? (v/1e6).toFixed(1)+'M' : (v/1e3).toFixed(1)+'K'); }

    function generateFakeTx() {
        return {
            id: Date.now(), value: Math.floor(Math.random()*5000000)+100000,
            token: { sym: 'BTC', color: '#F7931A', icon: '?' },
            interaction: { short: 'SWAP', color: '#A855F7' },
            fromHash: '0x'+Math.random().toString(16).slice(2,10),
            toHash: '0x'+Math.random().toString(16).slice(2,10),
            timestamp: Date.now()
        };
    }

    function createRowEl(tx) {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
            <span style="flex:1; color:#39FF14">${formatUSD(tx.value)}</span>
            <span style="width:100px; text-align:center;">${tx.token.sym}</span>
            <span style="width:115px; text-align:center; color:${tx.interaction.color}">${tx.interaction.short}</span>
            <span style="flex:1; font-size:0.8em; color:#666;">${tx.fromHash}...</span>
        `;
        return row;
    }

    function initTerminal() {
        setInterval(() => {
            const tx = generateFakeTx();
            const el = createRowEl(tx);
            DOM.ledgerBody.insertBefore(el, DOM.ledgerBody.firstChild);
            if(DOM.ledgerBody.children.length > 50) DOM.ledgerBody.lastElementChild.remove();
            
            // Update Mini UI
            STATE.btcPrice += (Math.random()-0.5)*50;
            DOM.btcPrice.textContent = '$' + Math.floor(STATE.btcPrice).toLocaleString();
            DOM.hdrClock.textContent = new Date().toLocaleTimeString();
        }, 3000);
        DOM.statusDot.classList.add('live');
    }

    // --- LÓGICA DASHBOARD DOMINON [Fuente 2] ---
    const display = document.getElementById('display');
    let currentInput = '0';
    window.appendNumber = (n) => { currentInput = currentInput === '0' ? n : currentInput + n; display.textContent = currentInput; };
    window.clearDisplay = () => { currentInput = '0'; display.textContent = '0'; };
    
    let pomoSeconds = 1500; let pomoInterval;
    function updatePomoUI() { 
        const m = Math.floor(pomoSeconds/60).toString().padStart(2,'0');
        const s = (pomoSeconds%60).toString().padStart(2,'0');
        document.getElementById('pomo-display').textContent = `${m}:${s}`;
    }
    window.togglePomodoro = () => {
        if(pomoInterval) { clearInterval(pomoInterval); pomoInterval = null; }
        else { pomoInterval = setInterval(() => { pomoSeconds--; updatePomoUI(); }, 1000); }
    };

    // --- REPRODUCTOR YOUTUBE (CONTINUO) [Fuente 2] ---
    let player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '0', width: '0',
            playerVars: { 'listType': 'playlist', 'list': 'PLKByqT47PJxp9fLnCY9Fptz-BBuoW9OWG' },
            events: { 'onStateChange': (e) => { if(e.data === 1) document.getElementById('songTitle').textContent = "Reproduciendo..."; } }
        });
    }
    document.getElementById('toggleMusicPanel').onclick = () => document.getElementById('musicPanel').classList.toggle('hidden');
    document.getElementById('playPauseBtn').onclick = () => {
        const state = player.getPlayerState();
        state === 1 ? player.pauseVideo() : player.playVideo();
    };
</script>
</body>
</html>
