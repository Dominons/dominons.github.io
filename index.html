<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DANIFU777 - Dominon </title>
  <link rel="icon" type="image/ico" href="Favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    /* ========== VARIABLES GLOBALES (DOMINON POR DEFECTO) ========== */
    :root {
      --color-dark-bg: #1A1A1A;
      --color-header-bg: #282828;
      --color-border: #444;
      --color-highlight: #A855F7;
      --color-main-bg: #282828;
      --color-text: #EAEAEA;
      --color-input-bg: #1F1F1F;
      --shadow-light: 0 0 8px rgba(0, 0, 0, 0.5);
      --main-gap: 15px;
    }

    /* ========== ESTILOS GLOBALES DE SOPORTE SPA ========== */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--color-dark-bg);
      color: var(--color-text);
      overflow: hidden;
      transition: background 0.3s;
    }

    .hidden-view {
      display: none !important;
    }

    /* ========== LOGIN SCREEN (ESTTICA EN LA RAZ) ========== */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
    }
    #loginScreen.hidden {
      display: none !important;
    }
    .login-container {
      background: #1F1F1F;
      border: 3px solid #A855F7;
      border-radius: 15px;
      padding: 50px;
      text-align: center;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
    }
    .google-button {
      background: white;
      color: #333;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1em;
    }
    .google-button:hover {
      background: #f0f0f0;
    }
    .google-button svg {
      width: 20px;
      height: 20px;
    }

    /* ========== ESTILOS DE VISTA: DOMINON (MAIN APP VIEW) ========== */
    #main-dashboard-view {
      --color-dark-bg: #1A1A1A;
      --color-header-bg: #282828;
      --color-border: #444;
      --color-highlight: #A855F7;
      --color-main-bg: #282828;
      --color-text: #EAEAEA;
      --color-input-bg: #1F1F1F;
      --shadow-light: 0 0 8px rgba(0, 0, 0, 0.5);
      --main-gap: 15px;
      width: 100%;
      height: 100vh;
      background: var(--color-dark-bg);
      color: var(--color-text);
    }
    #main-dashboard-view.light-theme {
      --color-dark-bg: #f4f4f5;
      --color-header-bg: #ffffff;
      --color-border: #d4d4d8;
      --color-highlight: #111827;
      --color-main-bg: #f9fafb;
      --color-text: #18181b;
      --color-input-bg: #ffffff;
      --shadow-light: 0 0 8px rgba(15, 23, 42, 0.12);
    }
    #main-dashboard-view.purple-theme {
      --color-highlight: #A855F7;
    }
    #main-dashboard-view.green-theme {
      --color-highlight: #39FF14;
    }
    #main-dashboard-view.red-theme {
      --color-highlight: #FF3131;
    }
    #main-dashboard-view.blue-theme {
      --color-highlight: #00AEEF;
    }
    #main-dashboard-view.green-theme .tab-btn.active,
    #main-dashboard-view.green-theme .calc-button.equals,
    #main-dashboard-view.green-theme .pomo-btn.active,
    #main-dashboard-view.red-theme .tab-btn.active,
    #main-dashboard-view.red-theme .calc-button.equals,
    #main-dashboard-view.red-theme .pomo-btn.active,
    #main-dashboard-view.blue-theme .tab-btn.active,
    #main-dashboard-view.blue-theme .calc-button.equals,
    #main-dashboard-view.blue-theme .pomo-btn.active {
      color: #000000;
    }
    #main-dashboard-view .container {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    #main-dashboard-view .container.hidden {
      display: none !important;
    }
    #main-dashboard-view .top-bar {
      grid-column: 1 / span 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 15px;
      background: var(--color-header-bg);
      border-bottom: 2px solid var(--color-highlight);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.8);
      z-index: 10;
      position: sticky;
      top: 0;
      flex-wrap: wrap;
      gap: 6px;
    }
    #main-dashboard-view .top-left,
    #main-dashboard-view .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    #main-dashboard-view .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      background: var(--color-input-bg);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      font-size: 0.85em;
    }
    #main-dashboard-view .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--color-highlight);
      object-fit: cover;
    }
    #main-dashboard-view .user-name {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--color-text);
    }
    #main-dashboard-view .logout-btn {
      background: #DC2626;
      color: white;
      border: none;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 15px;
      font-size: 0.8em;
      transition: background 0.2s;
    }
    #main-dashboard-view .logout-btn:hover {
      background: #b91c1c;
    }
    #main-dashboard-view .box {
      border: 1px solid var(--color-border);
      padding: 4px 10px;
      background: var(--color-input-bg);
      border-radius: 4px;
      box-shadow: var(--shadow-light);
      transition: background 0.3s ease;
      font-size: 0.9em;
      white-space: nowrap;
    }
    #main-dashboard-view .main {
      grid-column: 1 / -1;
      background: var(--color-main-bg);
      padding: var(--main-gap);
      display: flex;
      flex-direction: column;
      gap: var(--main-gap);
      height: calc(100vh - 52px);
      overflow-y: auto;
      box-sizing: border-box;
    }
    #main-dashboard-view .main::-webkit-scrollbar {
      width: 10px;
    }
    #main-dashboard-view .main::-webkit-scrollbar-track {
      background: var(--color-input-bg);
    }
    #main-dashboard-view .main::-webkit-scrollbar-thumb {
      background: var(--color-highlight);
      border-radius: 5px;
    }
    #main-dashboard-view .main::-webkit-scrollbar-thumb:hover {
      background: #8b3ed9;
    }
    #main-dashboard-view .chart-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 10px;
      box-shadow: var(--shadow-light);
      height: 300px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #main-dashboard-view .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 10px;
    }
    #main-dashboard-view .chart-header h2 {
      color: var(--color-highlight);
      margin: 0;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 5px;
      font-size: 1.2em;
      flex: 1;
    }
    #main-dashboard-view .symbol-selector {
      background: var(--color-input-bg);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 0.85em;
      cursor: pointer;
      transition: background 0.2s;
    }
    #main-dashboard-view .symbol-selector:hover {
      background: #444;
    }
    #main-dashboard-view .symbol-selector:focus {
      outline: none;
      border-color: var(--color-highlight);
    }
    #main-dashboard-view .chart-iframe {
      width: 100%;
      height: calc(100% - 40px);
      border: none;
      display: block;
    }
    #main-dashboard-view .notepad-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow-light);
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      min-height: 200px;
    }
    #main-dashboard-view .notepad-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 8px;
    }
    #main-dashboard-view .notepad-header-row h2 {
      color: var(--color-highlight);
      margin: 0;
      font-size: 1.1em;
    }
    #main-dashboard-view .notepad-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      width: 100%;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    #main-dashboard-view .tab-btn {
      background: var(--color-input-bg);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.75em;
      transition: all 0.2s;
      white-space: nowrap;
      flex: 0 1 auto;
    }
    #main-dashboard-view .tab-btn:hover {
      background: #444;
    }
    #main-dashboard-view .tab-btn.active {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
    }
    #main-dashboard-view #notepad {
      background: #0D0D0D;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 10px;
      border-radius: 4px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.95em;
      resize: none;
      flex-grow: 1;
    }
    #main-dashboard-view #notepad::placeholder {
      color: #666;
    }
    #main-dashboard-view #notepad:focus {
      outline: none;
      border-color: var(--color-highlight);
      box-shadow: 0 0 8px rgba(168, 85, 247, 0.3);
    }
    #main-dashboard-view .bottom-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--main-gap);
      flex-shrink: 0;
      height: auto;
    }
    #main-dashboard-view .calculator-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 8px;
      box-shadow: var(--shadow-light);
      display: flex;
      flex-direction: column;
    }
    #main-dashboard-view .calculator-panel h2 {
      color: var(--color-highlight);
      margin: 0 0 6px 0;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 4px;
      font-size: 1em;
    }
    #main-dashboard-view .calculator-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    #main-dashboard-view .calc-display {
      grid-column: 1 / -1;
      background: var(--color-input-bg);
      color: var(--color-highlight);
      border: 2px solid var(--color-highlight);
      text-align: right;
      padding: 10px;
      margin-bottom: 6px;
      font-size: 1.5em;
      font-weight: bold;
      overflow: hidden;
      min-height: 32px;
      border-radius: 4px;
      font-family: monospace;
      word-break: break-all;
    }
    #main-dashboard-view .calc-button {
      background: var(--color-input-bg);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 10px 0;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.1s;
    }
    #main-dashboard-view .calc-button:active {
      background: var(--color-border);
      transform: scale(0.95);
    }
    #main-dashboard-view .calc-button:hover {
      border-color: var(--color-highlight);
    }
    #main-dashboard-view .calc-button.equals {
      grid-column: 4 / span 1;
      grid-row: 5 / span 1;
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
      font-size: 1.1em;
    }
    #main-dashboard-view .calc-button.equals:hover {
      background: #8b3ed9;
    }
    #main-dashboard-view .calc-button.zero {
      grid-column: 1 / span 2;
    }
    #main-dashboard-view .calc-button.operator {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
      font-size: 1.1em;
    }
    #main-dashboard-view .calc-button.operator:hover {
      filter: brightness(0.95);
    }
    #main-dashboard-view .calc-button.clear {
      background: #DC2626;
      color: white;
      font-weight: bold;
    }
    #main-dashboard-view .calc-button.clear:hover {
      filter: brightness(0.9);
    }
    #main-dashboard-view .pomodoro-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 10px;
      box-shadow: var(--shadow-light);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    #main-dashboard-view .pomodoro-panel h2 {
      color: var(--color-highlight);
      margin: 0 0 6px 0;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 4px;
      font-size: 1em;
    }
    #main-dashboard-view .pomodoro-display {
      font-size: 2em;
      font-weight: bold;
      color: var(--color-highlight);
      font-family: monospace;
      letter-spacing: 2px;
      text-align: center;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      margin: 8px 0;
    }
    #main-dashboard-view .pomodoro-controls {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }
    #main-dashboard-view .pomo-btn {
      background: var(--color-input-bg);
      color: #ddd;
      border: 1px solid #555;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.8em;
      transition: background 0.2s;
      flex: 1;
      min-width: 55px;
    }
    #main-dashboard-view .pomo-btn:hover {
      background: #444;
    }
    #main-dashboard-view .pomo-btn.active {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
    }
    #main-dashboard-view .custom-time-input {
      background: #0D0D0D;
      color: var(--color-highlight);
      border: 1px solid var(--color-highlight);
      padding: 5px 6px;
      border-radius: 4px;
      width: 50px;
      font-size: 0.8em;
      text-align: center;
      flex: 0 0 auto;
    }
    #main-dashboard-view .custom-time-input::placeholder {
      color: #777;
    }
    #main-dashboard-view .music-container {
      display: flex;
      gap: 10px;
      align-items: center;
      position: relative;
    }
    #main-dashboard-view .theme-buttons {
      display: flex;
      gap: 8px;
    }
    #main-dashboard-view .theme-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #555;
      cursor: pointer;
      transition: transform 0.2s;
    }
    #main-dashboard-view .theme-btn:hover {
      transform: scale(1.15);
    }
    #main-dashboard-view .theme-btn.black { background: #000000; border-color: #FFFFFF; }
    #main-dashboard-view .theme-btn.white { background: #FFFFFF; border-color: #FFFFFF; }
    #main-dashboard-view .theme-btn.purple { background: #A855F7; border-color: #A855F7; }

    /* ========== PLANES, CONFIGURACION GLOBAL Y CONTROLES COMPARTIDOS ========== */
    #plansModal,
    #dominon-config-dropdown,
    #quantis-config-dropdown,
    #miniPlanPopup {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .icon-square-btn {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      border: 1px solid var(--color-highlight);
      background: var(--color-input-bg);
      color: var(--color-highlight);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
    }
    .icon-square-btn:hover {
      background: rgba(168,85,247,0.14);
      transform: translateY(-1px);
    }
    #plansModal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100000;
      background: rgba(0,0,0,0.58);
      padding: 18px;
    }
    #plansModal.open { display: flex; }
    .plans-card {
      width: min(940px, 96vw);
      max-height: 88vh;
      overflow: auto;
      background: #111318;
      border: 1px solid rgba(168,85,247,0.38);
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.55);
      color: #f4f4f5;
      padding: 20px;
    }
    .plans-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .plans-header h2 {
      margin: 0;
      color: #A855F7;
      font-size: 1.25rem;
      letter-spacing: 0;
    }
    .plans-close {
      width: 30px;
      height: 30px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: #e4e4e7;
      cursor: pointer;
    }
    .plans-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .plan-option {
      background: #181a20;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      min-height: 230px;
    }
    .plan-option:hover {
      border-color: #A855F7;
      transform: translateY(-2px);
    }
    .plan-option h3 {
      margin: 0 0 6px;
      color: #fff;
      font-size: 1.05rem;
    }
    .plan-price {
      color: #A855F7;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .plan-option ul {
      margin: 0;
      padding-left: 18px;
      color: #c4c4cc;
      line-height: 1.55;
      font-size: 0.9rem;
    }
    .plan-contact-card {
      display: none;
      margin-top: 14px;
      padding: 14px;
      border-radius: 8px;
      background: rgba(168,85,247,0.08);
      border: 1px solid rgba(168,85,247,0.25);
      color: #e4e4e7;
    }
    .plan-contact-card.open { display: block; }
    .plan-contact-card p { margin: 6px 0; }
    #dominon-config-dropdown,
    #quantis-config-dropdown {
      position: fixed;
      top: 58px;
      right: 18px;
      width: 186px;
      display: none;
      z-index: 99990;
      background: #111318;
      border: 1px solid rgba(168,85,247,0.34);
      border-radius: 8px;
      box-shadow: 0 14px 36px rgba(0,0,0,0.5);
      padding: 12px;
      color: #e4e4e7;
    }
    #dominon-config-dropdown.open,
    #quantis-config-dropdown.open { display: block; }
    .config-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.4px;
      color: #71717a;
      margin: 0 0 8px;
      text-transform: uppercase;
    }
    .config-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    #dominon-config-dropdown .theme-btn,
    #quantis-config-dropdown .theme-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #555;
      cursor: pointer;
    }
    #dominon-config-dropdown .theme-btn.black,
    #quantis-config-dropdown .theme-btn.black { background: #000000; border-color: #FFFFFF; }
    #dominon-config-dropdown .theme-btn.white,
    #quantis-config-dropdown .theme-btn.white { background: #FFFFFF; border-color: #FFFFFF; }
    #dominon-config-dropdown .theme-btn.purple { background: #A855F7; border-color: #A855F7; }
    #dominon-config-dropdown .theme-btn.green { background: #39FF14; border-color: #39FF14; }
    #dominon-config-dropdown .theme-btn.red { background: #FF3131; border-color: #FF3131; }
    #dominon-config-dropdown .theme-btn.blue { background: #00AEEF; border-color: #00AEEF; }
    .language-toggle {
      border: 1px solid rgba(168,85,247,0.45);
      background: var(--color-input-bg, #1f1f26);
      color: #e4e4e7;
      border-radius: 999px;
      padding: 5px 10px;
      min-width: 64px;
      cursor: pointer;
      font-weight: 800;
    }
    .notepad-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .notepad-file-btn,
    .q-tool-btn {
      background: var(--color-input-bg, #22242c);
      color: var(--color-text, #d4d4d8);
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 4px;
      padding: 6px 9px;
      cursor: pointer;
      font-size: 0.78rem;
    }
    .notepad-file-btn:hover,
    .q-tool-btn:hover {
      border-color: #A855F7;
      color: #fff;
    }
    #miniPlanPopup {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: none;
      z-index: 100001;
      background: #111318;
      border: 1px solid rgba(168,85,247,0.42);

      padding-bottom: 8px;

    }
    #quantis-view .q-sidebar-content {

    }

    #quantis-view .q-sidebar-content code {

      }

      }

  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="login-container">
      <h1 style="color: #A855F7; font-size: 3em; margin: 0;">DANIFU777</h1>
      <p style="color: #EAEAEA; margin-top: 10px;">Dominon</p>
      <button class="google-button" id="googleSignInBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Iniciar sesión con Google
      </button>
    </div>
  </div>

  <!-- MAIN DASHBOARD VIEW -->
  <div id="main-dashboard-view">
    <div class="container">
      <div class="top-bar">
        <div class="top-left">
          <div class="box" id="fecha-hora">Cargando...</div>
        </div>
        <div class="top-right">
          <div class="user-info" id="userInfo">
            <img class="user-avatar" id="userAvatar" src="" alt="Avatar">
            <span class="user-name" id="userName"></span>
            <button class="logout-btn" id="logoutBtn" title="Cerrar sesión">
              <i class="fas fa-sign-out-alt"></i>
            </button>
          </div>
          <div class="theme-buttons">
            <button class="theme-btn black" onclick="setTheme('#000000', 'main-dashboard-view')" title="Negro"></button>
            <button class="theme-btn white" onclick="setTheme('#FFFFFF', 'main-dashboard-view')" title="Blanco"></button>
            <button class="theme-btn purple" onclick="setTheme('#A855F7', 'main-dashboard-view')" title="Morado"></button>
            <button class="theme-btn green" onclick="setTheme('#39FF14', 'main-dashboard-view')" title="Verde"></button>
            <button class="theme-btn red" onclick="setTheme('#FF3131', 'main-dashboard-view')" title="Rojo"></button>
            <button class="theme-btn blue" onclick="setTheme('#00AEEF', 'main-dashboard-view')" title="Azul"></button>
          </div>
          <button class="icon-square-btn" id="dominonConfigBtn" title="Config">
            <i class="fas fa-cog"></i>
          </button>
          <button class="icon-square-btn" id="dominonPlansBtn" title="Planes">
            <i class="fas fa-star"></i>
          </button>
          <div class="music-container">
            <button class="music-btn" id="toggleMusicPanel" title="Reproductor">
              <i class="fa-solid fa-music"></i>
            </button>
            <button class="music-btn" id="geminiPanelToggle" title="Gemini AI">
              <i class="fa-solid fa-sparkles"></i>
            </button>
          </div>
        </div>
      </div>

      <main class="main">
        <div class="chart-panel">
          <div class="chart-header">
            <h2>Mini-Gráfico</h2>
            <select class="symbol-selector" id="symbolSelect" onchange="changeSymbol()">
              <option value="BINANCE:USDTARS">USDT/ARS</option>
              <option value="FOREXCOM:XAUUSD">Oro (XAU/USD)</option>
              <option value="FOREXCOM:EURUSD">EUR/USD</option>
              <option value="FOREXCOM:GBPUSD">GBP/USD</option>
              <option value="FOREXCOM:JPYUSD">JPY/USD</option>
              <option value="BITSTAMP:BTCUSD">Bitcoin (BTC/USD)</option>
              <option value="BITSTAMP:ETHUSD">Ethereum (ETH/USD)</option>
              <option value="FOREXCOM:XAGUSD">Plata (XAG/USD)</option>
              <option value="FOREXCOM:WTIUSD">Petróleo (WTI/USD)</option>
              <option value="FOREXCOM:NGAS">Gas Natural</option>
            </select>
          </div>
          <iframe class="chart-iframe" id="tradingViewChart"
            src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3AUSDTARS&interval=D&theme=dark&style=1&locale=es&toolbar_bg=f1f3f6&allow_symbol_change=0&enable_publishing=0&hide_side_toolbar=1&hide_legend=1&range=1M"
            frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="notepad-panel">
          <div class="notepad-header-row">
            <h2 id="notepad-title">Bloc de Notas - Nota 1</h2>
            <div class="notepad-tabs" id="notepad-tabs">
              <!-- Se generan dinámicamente con JavaScript -->
            </div>
          </div>
          <textarea id="notepad" placeholder="Escribe tus notas aquí..."></textarea>
        </div>

        <div class="bottom-container">
          <div class="calculator-panel">
            <h2>Calculadora</h2>
            <div id="display" class="calc-display">0</div>
            <div class="calculator-grid">
              <button class="calc-button clear" onclick="clearDisplay()">C</button>
              <button class="calc-button" onclick="backspace()">←</button>
              <button class="calc-button operator" onclick="appendOperator('/')">/</button>
              <button class="calc-button operator" onclick="appendOperator('*')">×</button>
              <button class="calc-button" onclick="appendNumber('7')">7</button>
              <button class="calc-button" onclick="appendNumber('8')">8</button>
              <button class="calc-button" onclick="appendNumber('9')">9</button>
              <button class="calc-button operator" onclick="appendOperator('-')">−</button>
              <button class="calc-button" onclick="appendNumber('4')">4</button>
              <button class="calc-button" onclick="appendNumber('5')">5</button>
              <button class="calc-button" onclick="appendNumber('6')">6</button>
              <button class="calc-button operator" onclick="appendOperator('+')">+</button>
              <button class="calc-button" onclick="appendNumber('1')">1</button>
              <button class="calc-button" onclick="appendNumber('2')">2</button>
              <button class="calc-button" onclick="appendNumber('3')">3</button>
              <button class="calc-button equals" onclick="calculate()">=</button>
              <button class="calc-button zero" onclick="appendNumber('0')">0</button>
              <button class="calc-button" onclick="appendNumber('.')">.</button>
            </div>
          </div>

          <div class="pomodoro-panel">
            <h2>Pomodoro</h2>
            <div class="pomodoro-display" id="pomo-display">25:00</div>
            <div class="pomodoro-controls">
              <input type="number" id="custom-min" class="custom-time-input" placeholder="Min" min="1" max="120">
              <button class="pomo-btn" onclick="setCustomTime()">FIJAR</button>
              <button class="pomo-btn" id="start-btn" onclick="togglePomodoro()">INICIAR</button>
              <button class="pomo-btn" onclick="resetPomodoro()">RST</button>
            </div>
          </div>
        </div>

        <!-- GEMINI PANEL -->
        <div class="gemini-panel">
          <h2>Gemini AI Assistant</h2>
          <div class="gemini-settings">
            <input type="password" id="geminiApiKeyInput" placeholder="Pega tu Google AI Studio API Key...">
            <button class="gemini-btn" id="saveGeminiKeyBtn">Guardar</button>
            <button class="gemini-btn" id="deleteGeminiKeyBtn" style="background: #DC2626;">Eliminar</button>
          </div>
          <div id="geminiChatHistory" class="gemini-history"></div>
          <div class="gemini-input-row">
            <textarea id="geminiPromptInput" placeholder="Escribe tu pregunta para Gemini..."></textarea>
            <button class="gemini-btn" id="sendGeminiBtn">Enviar</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- DEEP FLOW VIEW (Hidden by default) -->
  <div id="deep-flow-view" class="hidden-view">
    <!-- Deep Flow content will be rendered here by JavaScript -->
  </div>

  <!-- QUANTIS VIEW (Hidden by default) -->
  <div id="quantis-view" class="hidden-view">
    <!-- Quantis content will be rendered here by JavaScript -->
  </div>

  <!-- MODALS AND DROPDOWNS -->
  <div id="plansModal">
    <div class="plans-card">
      <div class="plans-header">
        <h2>Planes Disponibles</h2>
        <button class="plans-close" onclick="closePlansModal()">✕</button>
      </div>
      <div class="plans-grid" id="plansGrid">
        <!-- Planes cargados dinámicamente -->
      </div>
    </div>
  </div>

  <div id="dominon-config-dropdown">
    <div class="config-label">Tema</div>
    <div class="config-row">
      <button class="theme-btn black" onclick="setTheme('#000000', 'main-dashboard-view')" title="Negro"></button>
      <button class="theme-btn white" onclick="setTheme('#FFFFFF', 'main-dashboard-view')" title="Blanco"></button>
      <button class="theme-btn purple" onclick="setTheme('#A855F7', 'main-dashboard-view')" title="Morado"></button>
      <button class="theme-btn green" onclick="setTheme('#39FF14', 'main-dashboard-view')" title="Verde"></button>
      <button class="theme-btn red" onclick="setTheme('#FF3131', 'main-dashboard-view')" title="Rojo"></button>
      <button class="theme-btn blue" onclick="setTheme('#00AEEF', 'main-dashboard-view')" title="Azul"></button>
    </div>
    <div class="config-label" style="margin-top: 12px;">Idioma</div>
    <button class="language-toggle" onclick="toggleLanguage()">ES / EN</button>
  </div>

  <div id="quantis-config-dropdown">
    <div class="config-label">Tema</div>
    <div class="config-row">
      <button class="theme-btn black" onclick="setTheme('#000000', 'quantis-view')" title="Negro"></button>
      <button class="theme-btn white" onclick="setTheme('#FFFFFF', 'quantis-view')" title="Blanco"></button>
      <button class="theme-btn purple" onclick="setTheme('#A855F7', 'quantis-view')" title="Morado"></button>
      <button class="theme-btn green" onclick="setTheme('#39FF14', 'quantis-view')" title="Verde"></button>
      <button class="theme-btn red" onclick="setTheme('#FF3131', 'quantis-view')" title="Rojo"></button>
      <button class="theme-btn blue" onclick="setTheme('#00AEEF', 'quantis-view')" title="Azul"></button>
    </div>
  </div>

  <div id="miniPlanPopup"></div>

  <!-- JAVASCRIPT SECTION -->
  <script>
    // Gemini AI Assistant - Gestión de claves por usuario
    function getGeminiUserScope() {
      var userId = (window.auth && window.auth.currentUser) ? window.auth.currentUser.uid : 'anonymous';
      return userId;
    }

    function readGeminiKeyStore() {
      var store = localStorage.getItem('danifu_gemini_api_key');
      return (store && typeof store === 'string') ? JSON.parse(store) : {};
    }

    function writeGeminiKeyForUser(apiKey) {
      var store = readGeminiKeyStore();
      var scope = getGeminiUserScope();
      if (apiKey) store[scope] = apiKey;
      else delete store[scope];
      localStorage.setItem('danifu_gemini_api_key', JSON.stringify(store));
    }

    function getGeminiKeyForUser() {
      return readGeminiKeyStore()[getGeminiUserScope()] || '';
    }

    function appendGeminiMessage(role, text) {
      var history = document.getElementById('geminiChatHistory');
      if (!history) return;
      var line = document.createElement('div');
      line.className = 'gemini-message gemini-' + role;
      line.textContent = (role === 'user' ? 'You: ' : 'Gemini: ') + text;
      history.appendChild(line);
      history.scrollTop = history.scrollHeight;
    }

    window.initGeminiAssistant = function() {
      var keyInput = document.getElementById('geminiApiKeyInput');
      if (keyInput) keyInput.value = getGeminiKeyForUser();
    };

    document.getElementById('saveGeminiKeyBtn')?.addEventListener('click', function() {
      var keyInput = document.getElementById('geminiApiKeyInput');
      writeGeminiKeyForUser(keyInput ? keyInput.value.trim() : '');
      window.showPlanPopup('Gemini API Key guardada para este usuario.');
    });

    document.getElementById('deleteGeminiKeyBtn')?.addEventListener('click', function() {
      writeGeminiKeyForUser('');
      var keyInput = document.getElementById('geminiApiKeyInput');
      if (keyInput) keyInput.value = '';
      window.showPlanPopup('Gemini API Key eliminada.');
    });

document.getElementById('sendGeminiBtn')?.addEventListener('click', async function() {
      var promptInput = document.getElementById('geminiPromptInput');
      var prompt = promptInput ? promptInput.value.trim() : '';
      var apiKey = getGeminiKeyForUser();
      if (!apiKey) return window.showPlanPopup('Guarda tu Google AI Studio API Key primero.');
      if (!prompt) return;
      
      appendGeminiMessage('user', prompt);
      if (promptInput) promptInput.value = '';
      
      try {
        var url = 'https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=' + encodeURIComponent(apiKey);
        
        var response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });

        var data = await response.json();

        // Si la respuesta no es correcta, leemos el mensaje de error real de Google
        if (!response.ok) {
          var googleError = data?.error?.message || 'Error ' + response.status;
          appendGeminiMessage('assistant', 'Google API Error: ' + googleError);
          return;
        }

        var text = data?.candidates?.[0]?.content?.parts?.map(function(part) { return part.text || ''; }).join('\n').trim();
        appendGeminiMessage('assistant', text || 'No response received.');
      } catch (error) {
        console.error("Error de conexión:", error);
        appendGeminiMessage('assistant', 'Error de conexión. Revisa tu consola de desarrollador.');
      }
    });

    window.initGeminiAssistant();
  </script>
</body>
