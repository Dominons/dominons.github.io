<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DANIFU777 - Dominon </title>
  <link rel="icon" type="image/ico" href="Favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --color-dark-bg: #1A1A1A;
      --color-header-bg: #282828;
      --color-border: #444;
      --color-highlight: #A855F7;
      --color-main-bg: #282828;
      --color-text: #EAEAEA;
      --color-input-bg: #1F1F1F;
      --shadow-light: 0 0 8px rgba(0, 0, 0, 0.5);
      --main-gap: 15px;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--color-dark-bg);
      color: var(--color-text);
      overflow: hidden;
      transition: background 0.3s;
    }
    #loginScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1A1A1A 0%, #282828 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #loginScreen.hidden { display: none !important; }
    .login-container {
      background: #1F1F1F;
      border: 3px solid #A855F7;
      border-radius: 15px;
      padding: 50px 40px;
      text-align: center;
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.4);
      max-width: 450px;
    }
    .login-container h1 {
      color: #A855F7;
      margin: 0 0 15px 0;
      font-size: 3.5em;
      text-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
    }
    .google-button {
      background: white;
      color: #333;
      border: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 1.05em;
      cursor: pointer;
      font-weight: 600;
      margin: 20px auto;
    }
    .google-button:hover { background: #f8f8f8; }
    .container {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    .container.hidden { display: none !important; }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 15px;
      background: var(--color-header-bg);
      border-bottom: 2px solid var(--color-highlight);
      z-index: 10;
    }
    .top-right { display: flex; gap: 15px; align-items: center; }
    .theme-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #555;
      cursor: pointer;
    }
    .logout-btn {
      background: #DC2626;
      color: white;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-weight: 600;
    }
    .user-info {
      display: flex;
      gap: 10px;
      align-items: center;
      background: #333;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.85em;
    }
    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }
    .main {
      background: var(--color-main-bg);
      padding: var(--main-gap);
      display: flex;
      flex-direction: column;
      gap: var(--main-gap);
      height: calc(100vh - 52px);
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-container">
      <h1>DANIFU777</h1>
      <p>Dominon</p>
      <button class="google-button" id="googleSignInBtn">
        <i class="fa-brands fa-google"></i> Iniciar sesión con Google
      </button>
    </div>
  </div>

  <!-- APP -->
  <div class="container hidden" id="mainApp">
    <div class="top-bar">
      <div style="flex: 1;"></div>
      <div class="top-right">
        <div style="display: flex; gap: 8px;">
          <button class="theme-btn" onclick="setTheme('#A855F7')" style="background: #A855F7; border-color: #A855F7;"></button>
          <button class="theme-btn" onclick="setTheme('#3B82F6')" style="background: #3B82F6; border-color: #3B82F6;"></button>
          <button class="theme-btn" onclick="setTheme('#10B981')" style="background: #10B981; border-color: #10B981;"></button>
        </div>
        <div class="user-info" id="userInfo">
          <img class="user-avatar" id="userAvatar" alt="Avatar">
          <span id="userName">Usuario</span>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>
    </div>
    <main class="main">
      <p>¡Bienvenido a DANIFU777!</p>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDOuLA7meYcSX7zpxHl6sA8eDGS21QD0CY",
      authDomain: "danifu777-4732c.firebaseapp.com",
      projectId: "danifu777-4732c",
      storageBucket: "danifu777-4732c.firebasestorage.app",
      messagingSenderId: "171480985650",
      appId: "1:171480985650:web:4873bc5cc38d67d6c10c2b"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userName').textContent = user.displayName || 'Usuario';
        if (user.photoURL) {
          document.getElementById('userAvatar').src = user.photoURL;
        }
      } else {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainApp').classList.add('hidden');
      }
    });

    document.getElementById('googleSignInBtn').addEventListener('click', function() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithRedirect(provider);
    });

    auth.getRedirectResult().then(result => {
      console.log('Redirect result:', result);
    }).catch(error => {
      console.error('Redirect error:', error);
    });

    window.logout = function() {
      auth.signOut();
    };

    window.setTheme = function(color) {
      document.documentElement.style.setProperty('--color-highlight', color);
    };
  </script>
</body>
</html>
