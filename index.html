<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DANIFU777 - Deep Flow Unified</title>
<link rel="icon" type="image/ico" href="Favicon.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
/* === GLOBAL ROOT & RESET === */
:root {
  --color-dark-bg: #1A1A1A;
  --color-header-bg: #282828;
  --color-border: #444;
  --color-highlight: #A855F7;
  --color-main-bg: #282828;
  --color-text: #EAEAEA;
  --color-input-bg: #1F1F1F;
  --shadow-light: 0 0 8px rgba(0, 0, 0, 0.5);
  --main-gap: 15px;
  --df-fs: 1;
}
html, body { margin: 0; padding: 0; height: 100%; }
.hidden-view { display: none !important; }

/* === DOMINON CSS SCOPE (#main-dashboard-view) === */
#main-dashboard-view {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--color-dark-bg);
  color: var(--color-text);
  overflow: hidden;
  transition: background 0.3s;
  position: fixed;
  inset: 0;
}
#main-dashboard-view h1 { display: none; }
#main-dashboard-view .container {
  display: grid;
  grid-template-columns: 1fr;
  grid-template-rows: auto 1fr;
  height: 100vh;
}
#main-dashboard-view .container.hidden { display: none !important; }
#main-dashboard-view .top-bar {
  grid-column: 1 / span 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 15px;
  background: var(--color-header-bg);
  border-bottom: 2px solid var(--color-highlight);
  box-shadow: 0 3px 6px rgba(0, 0, 0, 0.8);
  z-index: 10;
  position: sticky;
  top: 0;
  flex-wrap: wrap;
  gap: 6px;
}
#main-dashboard-view .top-left,
#main-dashboard-view .top-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
#main-dashboard-view .user-info {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  background: #333;
  border: 1px solid var(--color-border);
  border-radius: 20px;
  font-size: 0.85em;
}
#main-dashboard-view .user-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--color-highlight);
  object-fit: cover;
}
#main-dashboard-view .user-name {
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--color-text);
}
#main-dashboard-view .logout-btn {
  background: #DC2626;
  color: white;
  border: none;
  padding: 4px 10px;
  cursor: pointer;
  border-radius: 15px;
  font-size: 0.8em;
  transition: background 0.2s;
}
#main-dashboard-view .logout-btn:hover { background: #b91c1c; }
#main-dashboard-view .box {
  border: 1px solid var(--color-border);
  padding: 4px 10px;
  background: #333;
  border-radius: 4px;
  box-shadow: var(--shadow-light);
  transition: background 0.3s ease;
  font-size: 0.9em;
  white-space: nowrap;
}
#main-dashboard-view .main {
  grid-column: 1 / -1;
  background: var(--color-main-bg);
  padding: var(--main-gap);
  display: flex;
  flex-direction: column;
  gap: var(--main-gap);
  height: calc(100vh - 52px);
  overflow-y: auto;
  box-sizing: border-box;
}
#main-dashboard-view .main::-webkit-scrollbar { width: 10px; }
#main-dashboard-view .main::-webkit-scrollbar-track { background: var(--color-input-bg); }
#main-dashboard-view .main::-webkit-scrollbar-thumb { background: var(--color-highlight); border-radius: 5px; }
#main-dashboard-view .main::-webkit-scrollbar-thumb:hover { background: #8b3ed9; }
#main-dashboard-view .chart-panel {
  background: var(--color-input-bg);
  border: 2px solid var(--color-highlight);
  border-radius: 8px;
  padding: 10px;
  box-shadow: var(--shadow-light);
  height: 300px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
#main-dashboard-view .chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  gap: 10px;
}
#main-dashboard-view .chart-header h2 {
  color: var(--color-highlight);
  margin: 0;
  border-bottom: 1px solid var(--color-border);
  padding-bottom: 5px;
  font-size: 1.2em;
  flex: 1;
}
#main-dashboard-view .symbol-selector {
  background: #333;
  color: var(--color-text);
  border: 1px solid var(--color-border);
  padding: 5px 10px;
  border-radius: 4px;
  font-size: 0.85em;
  cursor: pointer;
  transition: background 0.2s;
}
#main-dashboard-view .symbol-selector:hover { background: #444; }
#main-dashboard-view .symbol-selector:focus {
  outline: none;
  border-color: var(--color-highlight);
}
#main-dashboard-view .chart-iframe {
  width: 100%;
  height: calc(100% - 40px);
  border: none;
  display: block;
}
#main-dashboard-view .notepad-panel {
  background: var(--color-input-bg);
  border: 2px solid var(--color-highlight);
  border-radius: 8px;
  padding: 12px;
  box-shadow: var(--shadow-light);
  display: flex;
  flex-direction: column;
  flex-grow: 1;
  min-height: 200px;
}
#main-dashboard-view .notepad-header-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 10px;
  border-bottom: 1px solid var(--color-border);
  padding-bottom: 8px;
}
#main-dashboard-view .notepad-header-row h2 {
  color: var(--color-highlight);
  margin: 0;
  font-size: 1.1em;
}
#main-dashboard-view .notepad-tabs {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  width: 100%;
  overflow-x: auto;
  padding-bottom: 2px;
}
#main-dashboard-view .tab-btn {
  background: #333;
  color: var(--color-text);
  border: 1px solid var(--color-border);
  padding: 4px 8px;
  cursor: pointer;
  border-radius: 4px;
  font-size: 0.75em;
  transition: all 0.2s;
  white-space: nowrap;
  flex: 0 1 auto;
}
#main-dashboard-view .tab-btn:hover { background: #444; }
#main-dashboard-view .tab-btn.active {
  background: var(--color-highlight);
  color: var(--color-dark-bg);
  font-weight: bold;
}
#main-dashboard-view #notepad {
  background: #0D0D0D;
  color: var(--color-text);
  border: 1px solid var(--color-border);
  padding: 10px;
  border-radius: 4px;
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.95em;
  resize: none;
  flex-grow: 1;
}
#main-dashboard-view #notepad::placeholder { color: #666; }
#main-dashboard-view #notepad:focus {
  outline: none;
  border-color: var(--color-highlight);
  box-shadow: 0 0 8px rgba(168, 85, 247, 0.3);
}
#main-dashboard-view .bottom-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--main-gap);
  flex-shrink: 0;
  height: auto;
}
#main-dashboard-view .calculator-panel {
  background: var(--color-input-bg);
  border: 2px solid var(--color-highlight);
  border-radius: 8px;
  padding: 8px;
  box-shadow: var(--shadow-light);
  display: flex;
  flex-direction: column;
}
#main-dashboard-view .calculator-panel h2 {
  color: var(--color-highlight);
  margin: 0 0 6px 0;
  border-bottom: 1px solid var(--color-border);
  padding-bottom: 4px;
  font-size: 1em;
}
#main-dashboard-view .calculator-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
}
#main-dashboard-view .calc-display {
  grid-column: 1 / -1;
  background: #0D0D0D;
  color: var(--color-highlight);
  border: 2px solid var(--color-highlight);
  text-align: right;
  padding: 10px;
  margin-bottom: 6px;
  font-size: 1.5em;
  font-weight: bold;
  overflow: hidden;
  min-height: 32px;
  border-radius: 4px;
  font-family: monospace;
  word-break: break-all;
}
#main-dashboard-view .calc-button {
  background: #333;
  color: var(--color-text);
  border: 1px solid var(--color-border);
  padding: 10px 0;
  font-size: 0.95em;
  font-weight: 600;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.1s;
}
#main-dashboard-view .calc-button:active {
  background: #555;
  transform: scale(0.95);
}
#main-dashboard-view .calc-button:hover { background: #444; }
#main-dashboard-view .calc-button.equals {
  grid-column: 4 / span 1;
  grid-row: 5 / span 1;
  background: var(--color-highlight);
  color: var(--color-dark-bg);
  font-weight: bold;
  font-size: 1.1em;
}
#main-dashboard-view .calc-button.equals:hover { background: #8b3ed9; }
#main-dashboard-view .calc-button.zero { grid-column: 1 / span 2; }
#main-dashboard-view .calc-button.operator {
  background: var(--color-highlight);
  color: var(--color-dark-bg);
  font-weight: bold;
  font-size: 1.1em;
}
#main-dashboard-view .calc-button.operator:hover { background: #8b3ed9; }
#main-dashboard-view .calc-button.clear {
  background: #DC2626;
  color: white;
  font-weight: bold;
}
#main-dashboard-view .calc-button.clear:hover { background: #b91c1c; }
#main-dashboard-view .pomodoro-panel {
  background: var(--color-input-bg);
  border: 2px solid var(--color-highlight);
  border-radius: 8px;
  padding: 10px;
  box-shadow: var(--shadow-light);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
#main-dashboard-view .pomodoro-panel h2 {
  color: var(--color-highlight);
  margin: 0 0 6px 0;
  border-bottom: 1px solid var(--color-border);
  padding-bottom: 4px;
  font-size: 1em;
}
#main-dashboard-view .pomodoro-display {
  font-size: 2em;
  font-weight: bold;
  color: var(--color-highlight);
  font-family: monospace;
  letter-spacing: 2px;
  text-align: center;
  text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
  margin: 8px 0;
}
#main-dashboard-view .pomodoro-controls {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
}
#main-dashboard-view .pomo-btn {
  background: #333;
  color: #ddd;
  border: 1px solid #555;
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 4px;
  font-size: 0.8em;
  transition: background 0.2s;
  flex: 1;
  min-width: 55px;
}
#main-dashboard-view .pomo-btn:hover { background: #444; }
#main-dashboard-view .pomo-btn.active {
  background: var(--color-highlight);
  color: var(--color-dark-bg);
  font-weight: bold;
}
#main-dashboard-view .custom-time-input {
  background: #0D0D0D;
  color: var(--color-highlight);
  border: 1px solid var(--color-highlight);
  padding: 5px 6px;
  border-radius: 4px;
  width: 50px;
  font-size: 0.8em;
  text-align: center;
  flex: 0 0 auto;
}
#main-dashboard-view .custom-time-input::placeholder { color: #777; }
#main-dashboard-view .music-container {
  display: flex;
  gap: 10px;
  align-items: center;
  position: relative;
}
#main-dashboard-view .theme-buttons { display: flex; gap: 8px; }
#main-dashboard-view .theme-btn {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid #555;
  cursor: pointer;
  transition: transform 0.2s;
}
#main-dashboard-view .theme-btn:hover { transform: scale(1.15); }
#main-dashboard-view .theme-btn.black   { background: #000000; border-color: #FFFFFF; }
#main-dashboard-view .theme-btn.white   { background: #FFFFFF; border-color: #FFFFFF; }
#main-dashboard-view .theme-btn.purple  { background: #A855F7; border-color: #A855F7; }
#main-dashboard-view .music-btn {
  background: #333;
  color: var(--color-text);
  border: 1px solid #555;
  padding: 6px 12px;
  cursor: pointer;
  border-radius: 4px;
  font-size: 0.85em;
  transition: background 0.2s;
}
#main-dashboard-view .music-btn:hover { background: var(--color-highlight); }
#main-dashboard-view .song-display {
  background: #0D0D0D;
  border: 1px solid var(--color-border);
  padding: 6px 12px;
  border-radius: 4px;
  max-width: 180px;
  overflow: hidden;
}
#main-dashboard-view .song-marquee {
  display: block;
  color: var(--color-highlight);
  font-size: 0.85em;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 160px;
}
#main-dashboard-view #loginScreen {
  position: fixed;
  inset: 0;
  background: #1A1A1A;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
#main-dashboard-view #loginScreen.hidden { display: none !important; }
#main-dashboard-view .login-container {
  background: #1F1F1F;
  border: 3px solid #A855F7;
  border-radius: 15px;
  padding: 50px;
  text-align: center;
  box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
}
#main-dashboard-view .google-button {
  background: white;
  color: #333;
  border: none;
  padding: 12px 24px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1em;
}
#main-dashboard-view .google-button:hover { background: #f0f0f0; }
#main-dashboard-view .google-button svg { width: 20px; height: 20px; }

@media (max-width: 1024px) {
  #main-dashboard-view .top-right { gap: 6px; }
  #main-dashboard-view .theme-btn { width: 20px; height: 20px; }
  #main-dashboard-view .user-name { max-width: 80px; }
}
@media (max-width: 768px) {
  body { overflow: auto; }
  #main-dashboard-view .main {
    height: auto;
    min-height: calc(100vh - 100px);
    overflow-y: visible;
  }
  #main-dashboard-view .top-bar {
    flex-direction: column;
    align-items: flex-start;
    padding: 8px 10px;
  }
  #main-dashboard-view .top-left, #main-dashboard-view .top-right {
    width: 100%;
    justify-content: flex-start;
    flex-wrap: wrap;
  }
  #main-dashboard-view .theme-buttons { flex-wrap: wrap; gap: 5px; }
  #main-dashboard-view .theme-btn { width: 18px; height: 18px; }
  #main-dashboard-view .chart-panel { height: 45vh; min-height: 220px; }
  #main-dashboard-view .bottom-container { grid-template-columns: 1fr; }
  #main-dashboard-view .song-display { max-width: 130px; }
  #main-dashboard-view .song-marquee { max-width: 110px; }
}
@media (max-width: 480px) {
  :root { --main-gap: 10px; }
  #main-dashboard-view .top-bar { padding: 6px 8px; gap: 4px; }
  #main-dashboard-view .top-right { gap: 5px; }
  #main-dashboard-view .user-name { display: none; }
  #main-dashboard-view .chart-panel { height: 35vh; min-height: 180px; }
  #main-dashboard-view .tab-btn { font-size: 0.7em; padding: 3px 6px; flex-shrink: 0; }
  #main-dashboard-view .calc-button { padding: 8px 0; font-size: 0.85em; }
  #main-dashboard-view .calc-display { font-size: 1.2em; padding: 8px; }
  #main-dashboard-view .pomodoro-display { font-size: 1.6em; }
  #main-dashboard-view .theme-btn { width: 16px; height: 16px; }
  #main-dashboard-view .song-display { max-width: 100px; }
  #main-dashboard-view .song-marquee { max-width: 80px; font-size: 0.78em; }
}

/* === DETACHED MUSIC PLAYER (Global) === */
#musicPanel.hidden { display: none !important; }
.music-player-panel {
  position: fixed;
  top: 55px;
  right: 15px;
  background: #1F1F1F;
  border: 2px solid #A855F7;
  padding: 15px;
  border-radius: 8px;
  z-index: 10000;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  min-width: 280px;
}
.player-header {
  text-align: center;
  margin-bottom: 12px;
  font-size: 0.8em;
  color: #A855F7;
  font-weight: 700;
  letter-spacing: 1px;
}
.song-info {
  background: #0D0D0D;
  border: 1px solid #444;
  padding: 8px;
  border-radius: 4px;
  margin-bottom: 12px;
  text-align: center;
}
.player-song-title {
  color: #EAEAEA;
  font-size: 0.85em;
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.player-controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 12px;
}
.progress-time {
  display: flex;
  justify-content: space-between;
  font-size: 0.7em;
  color: #AAA;
  margin-bottom: 6px;
}
.progress-bar-container { margin-bottom: 12px; }
.progress-bar {
  width: 100%;
  height: 5px;
  accent-color: #A855F7;
  cursor: pointer;
  border-radius: 2px;
}
.volume-control {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}
.volume-control i { color: #A855F7; font-size: 0.85em; }
.volume-slider {
  flex: 1;
  height: 4px;
  accent-color: #A855F7;
  cursor: pointer;
  border-radius: 2px;
}
.fa-spin-slow { animation: spin 4s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* === DEEP FLOW CSS SCOPE (#deep-flow-view) === */
#deep-flow-view, #deep-flow-view *, #deep-flow-view *::before, #deep-flow-view *::after { box-sizing: border-box; margin: 0; padding: 0; }
#deep-flow-view {
  height: 100vh;
  overflow: hidden;
  background: #000;
  color: #c8c8d0;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 300;
  font-size: calc(11px * var(--df-fs));
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  position: fixed;
  inset: 0;
}
#deep-flow-view::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,240,255,0.012) 2px,rgba(0,240,255,0.012) 4px);
  pointer-events: none;
  z-index: 9999;
}
#deep-flow-view #ledger-body::-webkit-scrollbar { width: 5px; }
#deep-flow-view #ledger-body::-webkit-scrollbar-track { background: #06000e; }
#deep-flow-view #ledger-body::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.2); border-radius: 3px; }
#deep-flow-view #hdr {
  display: flex;
  align-items: center;
  height: 36px;
  padding: 0 8px;
  gap: 6px;
  background: #050008;
  border-bottom: 1px solid transparent;
  border-image: linear-gradient(90deg,#00F0FF 0%,#FF007F 40%,#39FF14 70%,transparent 100%) 1;
  flex-shrink: 0;
  z-index: 10;
}
#deep-flow-view #status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #FF3131;
  box-shadow: 0 0 6px #FF3131;
  flex-shrink: 0;
  transition: background 0.3s,box-shadow 0.3s;
}
#deep-flow-view #status-dot.live { background: #39FF14; box-shadow: 0 0 6px #39FF14; }
#deep-flow-view #hdr-brand {
  font-family: 'Orbitron',monospace;
  font-weight: 900;
  font-size: calc(12px * var(--df-fs));
  color: #00F0FF;
  letter-spacing: 3px;
  text-shadow: 0 0 10px rgba(0,240,255,0.6),0 0 25px rgba(0,240,255,0.3);
  background: rgba(0,240,255,0.06);
  padding: 2px 10px;
  border-radius: 3px;
  box-shadow: 0 0 15px rgba(0,240,255,0.2),inset 0 0 8px rgba(0,240,255,0.15);
  border: 1px solid rgba(0,240,255,0.2);
  white-space: nowrap;
}
#deep-flow-view .ctrl-btn {
  background: transparent;
  border: 1px solid rgba(0,240,255,0.25);
  color: #00F0FF;
  font-family: 'JetBrains Mono',monospace;
  font-size: 8px;
  font-weight: 700;
  padding: 1px 5px;
  cursor: pointer;
  letter-spacing: 0.5px;
  border-radius: 2px;
  flex-shrink: 0;
  transition: all 0.15s;
  white-space: nowrap;
}
#deep-flow-view .ctrl-btn:hover { background: rgba(0,240,255,0.08); border-color: rgba(0,240,255,0.5); }
#deep-flow-view .ctrl-btn.muted { color: #444; border-color: rgba(255,255,255,0.08); }
#deep-flow-view #stream-toggle {
  border-color: #00F0FF;
  color: #00F0FF;
  text-shadow: 0 0 4px rgba(0,240,255,0.3);
}
#deep-flow-view #stream-toggle.binance-active {
  border-color: #F0B90B;
  color: #F0B90B;
  text-shadow: 0 0 6px rgba(240,185,11,0.5);
  box-shadow: 0 0 8px rgba(240,185,11,0.15);
}
#deep-flow-view #hdr-spacer { flex: 1; }
#deep-flow-view #hdr-conn-status {
  color: #FF3131;
  font-weight: 700;
