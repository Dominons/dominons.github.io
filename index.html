<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DANIFU777 - Dominon </title>
  <link rel="icon" type="image/ico" href="Favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --color-dark-bg: #1A1A1A;
      --color-header-bg: #282828;
      --color-highlight: #A855F7;
      --color-text: #EAEAEA;
    }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--color-dark-bg); color: var(--color-text); overflow: hidden; }
    #loginScreen { position: fixed; inset: 0; background: #1A1A1A; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    #loginScreen.hidden { display: none !important; }
    .login-container { background: #1F1F1F; border: 3px solid #A855F7; border-radius: 15px; padding: 50px; text-align: center; }
    .google-button { background: white; color: #333; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 20px; }
    .container { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
    .container.hidden { display: none !important; }
    .top-bar { display: flex; justify-content: space-between; padding: 10px 20px; background: #282828; border-bottom: 2px solid var(--color-highlight); }
    .user-avatar { width: 30px; height: 30px; border-radius: 50%; }
    .logout-btn { background: #DC2626; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-left: 10px; }
  </style>
</head>
<body>
  <div id="loginScreen">
    <div class="login-container">
      <h1 style="color: #A855F7; font-size: 3em; margin: 0;">DANIFU777</h1>
      <p>Dominon</p>
      <button class="google-button" id="googleSignInBtn">Iniciar sesión con Google</button>
    </div>
  </div>

  <div class="container hidden" id="mainApp">
    <div class="top-bar">
      <div></div>
      <div style="display: flex; align-items: center; gap: 10px;">
        <img class="user-avatar" id="userAvatar" src="" alt="">
        <span id="userName"></span>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    </div>
    <main style="padding: 20px;">
      <p>¡Bienvenido a DANIFU777!</p>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDOuLA7meYcSX7zpxHl6sA8eDGS21QD0CY",
      authDomain: "danifu777-4732c.firebaseapp.com",
      projectId: "danifu777-4732c",
      storageBucket: "danifu777-4732c.firebasestorage.app",
      messagingSenderId: "171480985650",
      appId: "1:171480985650:web:4873bc5cc38d67d6c10c2b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userName').textContent = user.displayName;
        document.getElementById('userAvatar').src = user.photoURL;
      } else {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainApp').classList.add('hidden');
      }
    });

    document.getElementById('googleSignInBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);
  </script>
</body>
</html>
