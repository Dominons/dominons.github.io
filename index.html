<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DANIFU777 - Dominon </title>
  <link rel="icon" type="image/ico" href="Favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --color-dark-bg: #1A1A1A;
      --color-header-bg: #282828;
      --color-border: #444;
      --color-highlight: #A855F7;
      --color-main-bg: #282828;
      --color-text: #EAEAEA;
      --color-input-bg: #1F1F1F;
      --shadow-light: 0 0 8px rgba(0, 0, 0, 0.5);
      --main-gap: 15px;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--color-dark-bg);
      color: var(--color-text);
      overflow: hidden;
      transition: background 0.3s;
    }

    /* ========== LOGIN SCREEN ========== */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #loginScreen.hidden {
      display: none !important;
    }
    .login-container {
      background: #1F1F1F;
      border: 3px solid #A855F7;
      border-radius: 15px;
      padding: 50px;
      text-align: center;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
    }
    .google-button {
      background: white;
      color: #333;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1em;
    }
    .google-button:hover {
      background: #f0f0f0;
    }

    /* ========== MAIN CONTAINER ========== */
    .container {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    .container.hidden {
      display: none !important;
    }

    /* ========== TOP BAR ========== */
    .top-bar {
      grid-column: 1 / span 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 15px;
      background: var(--color-header-bg);
      border-bottom: 2px solid var(--color-highlight);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.8);
      z-index: 10;
      position: sticky;
      top: 0;
    }
    .top-left, .top-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ========== USER INFO ========== */
    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      background: #333;
      border: 1px solid var(--color-border);
      border-radius: 20px;
      font-size: 0.85em;
    }
    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--color-highlight);
      object-fit: cover;
    }
    .logout-btn {
      background: #DC2626;
      color: white;
      border: none;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 15px;
      font-size: 0.8em;
    }

    /* ========== NUEVO MODAL DE MÚSICA ========== */
    .music-trigger {
      background: var(--color-highlight);
      color: white;
      border: none;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
      transition: transform 0.2s;
    }
    .music-trigger:hover { transform: scale(1.1); }

    #musicPlayerModal {
      position: fixed;
      top: 60px;
      right: 20px;
      width: 280px;
      background: rgba(31, 31, 31, 0.95);
      border: 2px solid var(--color-highlight);
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      z-index: 1000;
      display: none;
      backdrop-filter: blur(5px);
    }
    #musicPlayerModal.active { display: block; animation: fadeIn 0.3s; }

    .music-modal-header {
      font-size: 0.9em;
      font-weight: bold;
      color: var(--color-highlight);
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #444;
      padding-bottom: 5px;
    }
    .song-title {
      font-size: 0.8em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
      color: #bbb;
    }
    .music-controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 15px;
    }
    .music-btn-circle {
      background: #333;
      border: 1px solid #555;
      color: white;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .music-btn-circle:hover { background: var(--color-highlight); }
    
    .progress-container { margin-bottom: 10px; }
    .time-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.7em;
      margin-top: 3px;
      color: #888;
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--color-highlight);
      cursor: pointer;
      height: 4px;
    }
    .volume-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8em;
      color: #888;
    }
    .playlist-selector {
      margin-top: 15px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }
    .p-btn {
      font-size: 0.7em;
      padding: 4px;
      background: #222;
      border: 1px solid #444;
      color: #eee;
      cursor: pointer;
      border-radius: 4px;
    }
    .p-btn:hover { border-color: var(--color-highlight); }

    /* ========== OTROS ESTILOS ========== */
    .box { border: 1px solid var(--color-border); padding: 4px 10px; background: #333; border-radius: 4px; font-size: 0.85em; }
    .main { padding: var(--main-gap); display: flex; flex-direction: column; gap: var(--main-gap); height: calc(100vh - 52px); overflow-y: auto; box-sizing: border-box; }
    .chart-panel { background: var(--color-input-bg); border: 2px solid var(--color-highlight); border-radius: 8px; padding: 10px; height: 300px; display: flex; flex-direction: column; }
    .notepad-panel { background: var(--color-input-bg); border: 2px solid var(--color-highlight); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; flex-grow: 1; }
    .notepad-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
    .tab-btn { background: #333; color: var(--color-text); border: 1px solid var(--color-border); padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 0.7em; }
    .tab-btn.active { background: var(--color-highlight); color: #000; font-weight: bold; }
    #notepad { background: #0D0D0D; color: var(--color-text); border: 1px solid var(--color-border); padding: 10px; border-radius: 4px; resize: none; flex-grow: 1; }
    .bottom-container { display: grid; grid-template-columns: 1fr 1fr; gap: var(--main-gap); }
    .calculator-panel, .pomodoro-panel { background: var(--color-input-bg); border: 2px solid var(--color-highlight); border-radius: 8px; padding: 10px; }
    .calc-display { background: #0D0D0D; color: var(--color-highlight); text-align: right; padding: 10px; margin-bottom: 6px; font-size: 1.2em; border-radius: 4px; font-family: monospace; }
    .calculator-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .calc-button { background: #333; color: white; border: 1px solid #444; padding: 10px; cursor: pointer; border-radius: 4px; }
    .pomodoro-display { font-size: 2em; text-align: center; color: var(--color-highlight); margin: 10px 0; font-family: monospace; }
    .theme-buttons { display: flex; gap: 4px; flex-wrap: wrap; max-width: 150px; }
    .theme-btn { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #555; cursor: pointer; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- FIREBASE SETUP -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDOuLA7meYcSX7zpxHl6sA8eDGS21QD0CY",
      authDomain: "danifu777-4732c.firebaseapp.com",
      projectId: "danifu777-4732c",
      storageBucket: "danifu777-4732c.firebasestorage.app",
      messagingSenderId: "171480985650",
      appId: "1:171480985650:web:4873bc5cc38d67d6c10c2b",
      measurementId: "G-SL032V9XGM",
      databaseURL: "https://danifu777-4732c-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    window.currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        window.currentUser = user;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userName').textContent = user.displayName.split(' ')[0];
        document.getElementById('userAvatar').src = user.photoURL;
        
        // Cargar estado de música guardado
        const musicRef = ref(db, `users/${user.uid}/musicState`);
        const snapshot = await get(musicRef);
        if (snapshot.exists()) {
          const data = snapshot.val();
          window.lastSavedState = data;
          if (window.playerReady) resumeMusic();
        }
      } else {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainApp').classList.add('hidden');
      }
    });

    // Guardar estado cada 10 segundos si está sonando
    setInterval(() => {
      if (window.currentUser && window.player && player.getPlayerState() === 1) {
        const state = {
          videoId: player.getVideoData().video_id,
          time: player.getCurrentTime(),
          listId: window.currentPlaylistId || 'PLKByqT47PJxp9fLnCY9Fptz-BBuoW9OWG'
        };
        set(ref(db, `users/${window.currentUser.uid}/musicState`), state);
      }
    }, 10000);

    document.getElementById('googleSignInBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);
  </script>

  <!-- APP SCRIPTS -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player;
    window.playerReady = false;
    window.currentPlaylistId = 'PLKByqT47PJxp9fLnCY9Fptz-BBuoW9OWG';

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('youtube-player', {
        height: '0', width: '0',
        playerVars: { listType: 'playlist', list: window.currentPlaylistId, autoplay: 0 },
        events: {
          'onReady': onPlayerReady,
          'onStateChange': onPlayerStateChange
        }
      });
    }

    function onPlayerReady(event) {
      window.playerReady = true;
      if (window.lastSavedState) resumeMusic();
      setInterval(updateMusicUI, 1000);
    }

    function resumeMusic() {
      if (!window.lastSavedState) return;
      const { videoId, time, listId } = window.lastSavedState;
      player.cueVideoById({
        videoId: videoId,
        startSeconds: time
      });
      document.getElementById('song-title').textContent = "Sesión recuperada...";
    }

    function onPlayerStateChange(event) {
      const btn = document.getElementById('playBtn');
      const icon = document.getElementById('disc-icon');
      if (event.data == YT.PlayerState.PLAYING) {
        btn.innerHTML = '<i class="fas fa-pause"></i>';
        icon.style.animationPlayState = 'running';
        document.getElementById('song-title').textContent = player.getVideoData().title;
      } else {
        btn.innerHTML = '<i class="fas fa-play"></i>';
        icon.style.animationPlayState = 'paused';
      }
    }

    function togglePlay() {
      if (player.getPlayerState() == 1) player.pauseVideo();
      else player.playVideo();
    }

    function changeVolume(v) { player.setVolume(v); }

    function seekVideo(v) {
      const duration = player.getDuration();
      player.seekTo(duration * (v / 100));
    }

    function updateMusicUI() {
      if (player && player.getPlayerState() == 1) {
        const curr = player.getCurrentTime();
        const total = player.getDuration();
        document.getElementById('progress-bar').value = (curr / total) * 100;
        document.getElementById('curr-time').textContent = formatTime(curr);
        document.getElementById('total-time').textContent = formatTime(total);
      }
    }

    function formatTime(s) {
      const min = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${min}:${sec.toString().padStart(2, '0')}`;
    }

    function toggleMusicModal() {
      document.getElementById('musicPlayerModal').classList.toggle('active');
    }

    function changePlaylist(id) {
      window.currentPlaylistId = id;
      player.loadPlaylist({ list: id, listType: 'playlist' });
    }

    // --- OTROS SISTEMAS (Calc, Notas, etc) ---
    function setTheme(color) {
      document.documentElement.style.setProperty('--color-highlight', color);
    }

    // Notas (20 pestañas)
    const tabsContainer = document.getElementById('tabs-container');
    let activeTab = 1;
    for (let i = 1; i <= 20; i++) {
      const b = document.createElement('button');
      b.className = 'tab-btn' + (i==1?' active':'');
      b.innerText = i;
      b.onclick = () => {
        localStorage.setItem('note_'+activeTab, document.getElementById('notepad').value);
        document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active'));
        b.classList.add('active');
        activeTab = i;
        document.getElementById('notepad').value = localStorage.getItem('note_'+i) || "";
      };
      tabsContainer.appendChild(b);
    }

    // Calculadora Simple
    let curInput = '0';
    function updateDisplay() { document.getElementById('display').innerText = curInput; }
    function appendNumber(n) { curInput = curInput === '0' ? n : curInput + n; updateDisplay(); }
    function appendOperator(op) { curInput += op; updateDisplay(); }
    function clearDisplay() { curInput = '0'; updateDisplay(); }
    function backspace() { curInput = curInput.length > 1 ? curInput.slice(0,-1) : '0'; updateDisplay(); }
    function calculate() { try { curInput = eval(curInput).toString(); } catch { curInput = "Error"; } updateDisplay(); }

    // Reloj
    setInterval(() => {
      document.getElementById('fecha-hora').innerText = new Date().toLocaleString();
    }, 1000);

    // Pomodoro
    let pomoSec = 1500, pomoRunning = false, pomoInt;
    function togglePomodoro() {
      const btn = document.getElementById('start-btn');
      if(pomoRunning) { clearInterval(pomoInt); pomoRunning = false; btn.innerText = "INICIAR"; }
      else {
        pomoRunning = true; btn.innerText = "PAUSAR";
        const custom = document.getElementById('custom-min').value;
        if(custom) pomoSec = custom * 60;
        pomoInt = setInterval(() => {
          pomoSec--;
          const m = Math.floor(pomoSec/60), s = pomoSec%60;
          document.getElementById('pomo-display').innerText = `${m}:${s.toString().padStart(2,'0')}`;
          if(pomoSec<=0) { clearInterval(pomoInt); alert("¡Tiempo!"); resetPomodoro(); }
        }, 1000);
      }
    }
    function resetPomodoro() { clearInterval(pomoInt); pomoSec = 1500; pomoRunning = false; document.getElementById('pomo-display').innerText = "25:00"; }
  </script>
</body>
</html>
