<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DANIFU777 - Dominon </title>
  <link rel="icon" type="image/ico" href="Favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --color-dark-bg: #1A1A1A;
      --color-header-bg: #282828;
      --color-border: #444;
      --color-highlight: #A855F7;
      --color-main-bg: #282828;
      --color-text: #EAEAEA;
      --color-input-bg: #1F1F1F;
      --shadow-light: 0 0 8px rgba(0, 0, 0, 0.5);
      --main-gap: 15px;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--color-dark-bg);
      color: var(--color-text);
      overflow: hidden;
      transition: background 0.3s;
    }

    /* ========== LOGIN SCREEN ========== */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #loginScreen.hidden {
      display: none !important;
    }
    .login-container {
      background: #1F1F1F;
      border: 3px solid #A855F7;
      border-radius: 15px;
      padding: 50px;
      text-align: center;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
    }
    .google-button {
      background: white;
      color: #333;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1em;
    }

    /* ========== MAIN CONTAINER ========== */
    .container {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    .container.hidden {
      display: none !important;
    }

    /* ========== TOP BAR ========== */
    .top-bar {
      grid-column: 1 / span 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 15px;
      background: var(--color-header-bg);
      border-bottom: 2px solid var(--color-highlight);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.8);
      z-index: 10;
      position: sticky;
      top: 0;
    }
    .top-left, .top-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* USER INFO */
    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      background: #333;
      border: 1px solid var(--color-border);
      border-radius: 20px;
      font-size: 0.85em;
    }
    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--color-highlight);
      object-fit: cover;
    }
    .logout-btn {
      background: #DC2626;
      color: white;
      border: none;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 15px;
      font-size: 0.8em;
    }

    /* ========== MODAL DE MÚSICA ========== */
    .music-trigger {
      background: #333;
      color: var(--color-highlight);
      border: 1px solid var(--color-highlight);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
      transition: all 0.3s;
    }
    .music-trigger:hover { background: var(--color-highlight); color: #000; }

    #musicModal {
      position: fixed;
      top: 60px;
      right: 20px;
      width: 280px;
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.7);
      z-index: 1000;
      display: none;
    }
    #musicModal.active { display: block; }
    
    .music-header {
      display: flex;
      justify-content: space-between;
      color: var(--color-highlight);
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 0.9em;
    }
    .song-info { font-size: 0.75em; color: #bbb; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .music-controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
    .m-btn { background: #333; border: 1px solid #555; color: white; padding: 8px; border-radius: 50%; cursor: pointer; width: 35px; height: 35px; }
    .m-btn:hover { border-color: var(--color-highlight); color: var(--color-highlight); }

    .progress-area { margin-bottom: 10px; }
    .time-labels { display: flex; justify-content: space-between; font-size: 0.65em; color: #888; margin-top: 4px; }
    
    input[type="range"] { width: 100%; accent-color: var(--color-highlight); cursor: pointer; }
    
    .playlist-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; }
    .pl-btn { background: #111; border: 1px solid #444; color: #eee; font-size: 0.7em; padding: 5px; cursor: pointer; border-radius: 4px; }
    .pl-btn:hover { border-color: var(--color-highlight); }

    /* ========== ESTILOS ORIGINALES REUTILIZADOS ========== */
    .box { border: 1px solid var(--color-border); padding: 4px 10px; background: #333; border-radius: 4px; box-shadow: var(--shadow-light); font-size: 0.9em; white-space: nowrap; }
    .main { grid-column: 1 / -1; background: var(--color-main-bg); padding: var(--main-gap); display: flex; flex-direction: column; gap: var(--main-gap); height: calc(100vh - 52px); overflow-y: auto; box-sizing: border-box; }
    
    .chart-panel { background: var(--color-input-bg); border: 2px solid var(--color-highlight); border-radius: 8px; padding: 10px; height: 300px; flex-shrink: 0; }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .chart-header h2 { color: var(--color-highlight); margin: 0; font-size: 1.2em; }
    
    .notepad-panel { background: var(--color-input-bg); border: 2px solid var(--color-highlight); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; flex-grow: 1; min-height: 200px; }
    .notepad-tabs { display: flex; gap: 4px; flex-wrap: wrap; width: 100%; margin-top: 5px; }
    .tab-btn { background: #333; color: var(--color-text); border: 1px solid var(--color-border); padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 0.75em; }
    .tab-btn.active { background: var(--color-highlight); color: #000; font-weight: bold; }
    #notepad { background: #0D0D0D; color: var(--color-text); border: 1px solid var(--color-border); padding: 10px; border-radius: 4px; font-family: sans-serif; resize: none; flex-grow: 1; }

    .bottom-container { display: grid; grid-template-columns: 1fr 1fr; gap: var(--main-gap); flex-shrink: 0; }
    .calculator-panel, .pomodoro-panel { background: var(--color-input-bg); border: 2px solid var(--color-highlight); border-radius: 8px; padding: 10px; }
    .calc-display { background: #0D0D0D; color: var(--color-highlight); border: 2px solid var(--color-highlight); text-align: right; padding: 10px; margin-bottom: 6px; font-size: 1.5em; border-radius: 4px; font-family: monospace; }
    .calculator-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .calc-button { background: #333; color: white; border: 1px solid #444; padding: 10px; cursor: pointer; border-radius: 4px; }
    .calc-button.operator { background: var(--color-highlight); color: #000; font-weight: bold; }
    
    .pomodoro-display { font-size: 2em; font-weight: bold; color: var(--color-highlight); font-family: monospace; text-align: center; margin: 10px 0; }
    .pomo-btn { background: #333; color: #ddd; border: 1px solid #555; padding: 6px; cursor: pointer; border-radius: 4px; font-size: 0.8em; flex: 1; }
    .theme-btn { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #555; cursor: pointer; }
  </style>
</head>

  <!-- FIREBASE CONFIG (TU CONFIGURACIÓN ORIGINAL) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDOuLA7meYcSX7zpxHl6sA8eDGS21QD0CY",
      authDomain: "danifu777-4732c.firebaseapp.com",
      projectId: "danifu777-4732c",
      storageBucket: "danifu777-4732c.firebasestorage.app",
      messagingSenderId: "171480985650",
      appId: "1:171480985650:web:4873bc5cc38d67d6c10c2b",
      measurementId: "G-SL032V9XGM",
      databaseURL: "https://danifu777-4732c-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        window.currentUser = user;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userName').textContent = user.displayName;
        document.getElementById('userAvatar').src = user.photoURL;

        // Recuperar música de Firebase
        const musicRef = ref(db, `users/${user.uid}/musicProgress`);
        const snap = await get(musicRef);
        if(snap.exists()){
          window.savedMusic = snap.val();
          if(window.playerLoaded) resumeSavedMusic();
        }
      } else {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainApp').classList.add('hidden');
      }
    });

    // Guardar progreso cada 10 seg
    setInterval(() => {
      if(window.currentUser && window.player && player.getPlayerState() === 1){
        set(ref(db, `users/${window.currentUser.uid}/musicProgress`), {
          videoId: player.getVideoData().video_id,
          time: player.getCurrentTime(),
          listId: window.currentList || 'PLKByqT47PJxp9fLnCY9Fptz-BBuoW9OWG'
        });
      }
    }, 10000);

    document.getElementById('googleSignInBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);
  </script>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    // --- LÓGICA DE MÚSICA (PEDIDA) ---
    let player;
    window.playerLoaded = false;
    window.currentList = 'PLKByqT47PJxp9fLnCY9Fptz-BBuoW9OWG';

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('youtube-player', {
        height: '0', width: '0',
        playerVars: { listType: 'playlist', list: window.currentList, autoplay: 0 },
        events: { 'onReady': onPlayerReady, 'onStateChange': onStateChange }
      });
    }

    function onPlayerReady() {
      window.playerLoaded = true;
      if(window.savedMusic) resumeSavedMusic();
      setInterval(updateUI, 1000);
    }

    function resumeSavedMusic() {
      player.cueVideoById({
        videoId: window.savedMusic.videoId,
        startSeconds: window.savedMusic.time
      });
      document.getElementById('song-title').innerText = "Sesión recuperada...";
    }

    function onStateChange(e) {
      const btn = document.getElementById('modalPlayBtn');
      const icon = document.getElementById('disc-icon');
      if(e.data == 1) {
        btn.innerHTML = '<i class="fas fa-pause"></i>';
        icon.classList.add('fa-spin');
        document.getElementById('song-title').innerText = player.getVideoData().title;
      } else {
        btn.innerHTML = '<i class="fas fa-play"></i>';
        icon.classList.remove('fa-spin');
      }
    }

    function togglePlay() { player.getPlayerState() == 1 ? player.pauseVideo() : player.playVideo(); }
    function seek(v) { player.seekTo(player.getDuration() * (v/100)); }
    function changePL(id) { window.currentList = id; player.loadPlaylist({list:id, listType:'playlist'}); }
    
    function updateUI() {
      if(player && player.getPlayerState() == 1) {
        const cur = player.getCurrentTime();
        const dur = player.getDuration();
        document.getElementById('progressBar').value = (cur/dur)*100;
        document.getElementById('curr-time').innerText = formatTime(cur);
        document.getElementById('total-time').innerText = formatTime(dur);
      }
    }
    function formatTime(s) {
      let m = Math.floor(s/60);
      let sec = Math.floor(s%60);
      return m + ":" + (sec < 10 ? '0'+sec : sec);
    }

    // --- LÓGICA ORIGINAL DE CALCULADORA ---
    const display = document.getElementById('display');
    let curIn = '0';
    function updateCalc() { display.innerText = curIn; }
    window.appendNumber = (n) => { curIn = (curIn==='0' && n!=='.') ? n : curIn+n; updateCalc(); }
    window.appendOperator = (op) => { curIn += op; updateCalc(); }
    window.calculate = () => { try { curIn = eval(curIn).toString(); } catch { curIn = 'Error'; } updateCalc(); }
    window.clearDisplay = () => { curIn = '0'; updateCalc(); }
    window.backspace = () => { curIn = curIn.length > 1 ? curIn.slice(0,-1) : '0'; updateCalc(); }

    // --- LÓGICA ORIGINAL DE NOTAS (20 PESTAÑAS) ---
    const container = document.getElementById('tabs-container');
    let activeTab = 1;
    for(let i=1; i<=20; i++) {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (i===1 ? ' active' : '');
      btn.innerText = 'Pág '+i;
      btn.onclick = () => {
        localStorage.setItem('note_'+activeTab, document.getElementById('notepad').value);
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTab = i;
        document.getElementById('notepad-title').innerText = 'Bloc de Notas - Pág '+i;
        document.getElementById('notepad').value = localStorage.getItem('note_'+i) || '';
      };
      container.appendChild(btn);
    }
    document.getElementById('notepad').value = localStorage.getItem('note_1') || '';

    // --- LÓGICA ORIGINAL DE TEMA ---
    window.setTheme = (c) => document.documentElement.style.setProperty('--color-highlight', c);
    
    // --- POMODORO ---
    let pSec = 1500, pRun = false, pInt;
    window.togglePomodoro = () => {
      if(pRun) { clearInterval(pInt); pRun = false; document.getElementById('start-btn').innerText = "INICIAR"; }
      else {
        let cust = document.getElementById('custom-min').value;
        if(cust) pSec = cust * 60;
        pRun = true; document.getElementById('start-btn').innerText = "PAUSAR";
        pInt = setInterval(() => {
          pSec--;
          let m = Math.floor(pSec/60), s = pSec%60;
          document.getElementById('pomo-display').innerText = `${m}:${s<10?'0'+s:s}`;
          if(pSec<=0) { clearInterval(pInt); alert("¡Fin!"); resetPomodoro(); }
        }, 1000);
      }
    }
    window.resetPomodoro = () => { clearInterval(pInt); pSec = 1500; pRun = false; document.getElementById('pomo-display').innerText = "25:00"; }

    setInterval(() => { document.getElementById("fecha-hora").textContent = new Date().toLocaleString(); }, 1000);
  </script>
