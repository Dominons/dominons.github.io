<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Plataforma Personal</title>

<style>
body {
    background-color: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}
/* Contenedor general */
.container {
    display: flex;
    width: 100%;
}
/* Panel izquierdo */
.left {
    width: 70%;
    padding: 20px;
}
/* Panel derecho fijo con scroll */
.right {
    width: 30%;
    background: #111;
    padding: 10px;
    overflow-y: auto;
    height: 100vh;
}
/* Tarjetas */
.card {
    background: #111;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}
/* Inputs y botones */
input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 8px;
}
button {
    cursor: pointer;
    background: #333;
}
button:hover {
    background: #444;
}
textarea {
    width: 100%;
    height: 150px;
    background: #222;
    border: none;
    padding: 10px;
    color: white;
    border-radius: 10px;
}
/* Music player UI */
#current-song {
    font-size: 14px;
    text-align: center;
    margin-bottom: 10px;
}
.music-controls {
    display: flex;
    justify-content: space-between;
}
/* Hora */
#clock {
    font-size: 22px;
    font-weight: bold;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

    <!--  LEFT PANEL -->
    <div class="left">

        <!-- CALCULADORA -->
        <div class="card">
            <h3>Calculadora</h3>
            <input type="text" id="calc-display" readonly>
            <div>
                <button onclick="calc('7')">7</button>
                <button onclick="calc('8')">8</button>
                <button onclick="calc('9')">9</button>
                <button onclick="calc('/')">/</button>
            </div>
            <div>
                <button onclick="calc('4')">4</button>
                <button onclick="calc('5')">5</button>
                <button onclick="calc('6')">6</button>
                <button onclick="calc('*')">*</button>
            </div>
            <div>
                <button onclick="calc('1')">1</button>
                <button onclick="calc('2')">2</button>
                <button onclick="calc('3')">3</button>
                <button onclick="calc('-')">-</button>
            </div>
            <div>
                <button onclick="calc('0')">0</button>
                <button onclick="calc('.')">.</button>
                <button onclick="solve()">=</button>
                <button onclick="calc('+')">+</button>
            </div>
            <button onclick="clearCalc()">Limpiar</button>
        </div>

        <!-- GRÁFICO TRADINGVIEW -->
        <div class="card">
            <h3>Mini Gráfico BTC/USDT</h3>
            <iframe src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_abcdef&symbol=BINANCE%3ABTCUSDT&interval=15&hidesidetoolbar=1&symboledit=1&saveimage=1&toolbarbg=rgba(0,%200,%200,%201)&studies=[]&theme=dark&style=1&timezone=Etc%2FUTC&studies_overrides={}&overrides={}&enabled_features=[]&disabled_features=[]&locale=es"
            width="100%" height="300" frameborder="0"></iframe>
        </div>

        <!-- NOTAS -->
        <div class="card">
            <h3>Bloc de Notas</h3>
            <textarea id="notes" placeholder="Escribe tus notas..."></textarea>
            <button onclick="saveNotes()">Guardar Nota</button>
        </div>

        <!-- RELOJ -->
        <div class="card">
            <h3>Hora Actual</h3>
            <div id="clock"></div>
        </div>

    </div>

    <!-- RIGHT PANEL (VIDEOS + REPRODUCTOR) -->
    <div class="right">

        <!-- MUSIC PLAYER -->
        <div class="card">
            <h3>Reproductor Musical</h3>
            <div id="current-song">Cargando música...</div>
            <div class="music-controls">
                <button onclick="prevSong()">⏮️</button>
                <button onclick="playPause()">⏯️</button>
                <button onclick="nextSong()">⏭️</button>
            </div>
            <div id="player"></div>
        </div>

        <!-- VIDEOS -->
        <div class="card">
            <h3>Videos Sugeridos</h3>
            <iframe width="100%" height="200" src="https://www.youtube.com/embed/5qap5aO4i9A" frameborder="0" allowfullscreen></iframe>
            <iframe width="100%" height="200" src="https://www.youtube.com/embed/lTRiuFIWV54" frameborder="0" allowfullscreen></iframe>
        </div>

    </div>
</div>

<script>
// CALCULADORA
function calc(value) {
    document.getElementById("calc-display").value += value;
}
function solve() {
    try {
        let result = eval(document.getElementById("calc-display").value);
        document.getElementById("calc-display").value = result;
    } catch {
        alert("Error en la expresión");
    }
}
function clearCalc() {
    document.getElementById("calc-display").value = "";
}

// NOTAS
function saveNotes() {
    localStorage.setItem("notes", document.getElementById("notes").value);
}
document.getElementById("notes").value = localStorage.getItem("notes") || "";

// HORA
function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText = now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

// MUSIC PLAYER
let playlist = [
    "lTRiuFIWV54",
    "5qap5aO4i9A",
    "f02mOEt11OQ"
];
let currentSong = 0;
let player;
function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '200',
        width: '100%',
        videoId: playlist[currentSong],
        events: { 'onReady': onPlayerReady }
    });
}
function onPlayerReady() {
    player.setVolume(60);
    updateSongTitle();
}
function playPause() {
    if (player.getPlayerState() == 1) player.pauseVideo();
    else player.playVideo();
}
function nextSong() {
    currentSong = (currentSong + 1) % playlist.length;
    player.loadVideoById(playlist[currentSong]);
    updateSongTitle();
}
function prevSong() {
    currentSong = (currentSong - 1 + playlist.length) % playlist.length;
    player.loadVideoById(playlist[currentSong]);
    updateSongTitle();
}
function updateSongTitle() {
    document.getElementById("current-song").innerText = "Reproduciendo: " + playlist[currentSong];
}
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);
</script>

</body>
</html>
