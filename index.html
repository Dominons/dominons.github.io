<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DANIFU777 - Dominon</title>
  <link rel="icon" type="image/ico" href="Favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --color-dark-bg: #1A1A1A;
      --color-header-bg: #282828;
      --color-border: #444;
      --color-highlight: #A855F7;
      --color-main-bg: #282828;
      --color-text: #EAEAEA;
      --color-input-bg: #1F1F1F;
      --shadow-light: 0 0 8px rgba(0, 0, 0, 0.5);
      --top-tools-height: 300px;
      --main-gap: 15px;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--color-dark-bg);
      color: var(--color-text);
      overflow: hidden;
    }
    .container {
      display: grid;
      grid-template-columns: 70% 30%;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    .top-bar {
      grid-column: 1 / span 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 15px;
      background: var(--color-header-bg);
      border-bottom: 2px solid var(--color-highlight);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.8);
      z-index: 10;
      position: sticky;
      top: 0;
    }
    .top-left,
    .top-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .box {
      border: 1px solid var(--color-border);
      padding: 4px 10px;
      background: #333;
      border-radius: 4px;
      box-shadow: var(--shadow-light);
      transition: background 0.3s ease;
      font-size: 0.9em;
      white-space: nowrap;
    }
    .main {
      grid-column: 1 / 2;
      background: var(--color-main-bg);
      padding: var(--main-gap);
      display: flex;
      flex-direction: column;
      gap: var(--main-gap);
      height: calc(100vh - 52px);
      overflow-y: auto;
      box-sizing: border-box;
    }
    h1 {
      display: none;
    }
    .top-tools-container {
      display: flex;
      gap: 20px;
      height: var(--top-tools-height);
      flex-shrink: 0;
    }
    .tool-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 10px;
      box-shadow: var(--shadow-light);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .tool-panel h2 {
      color: var(--color-highlight);
      margin-top: 0;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 5px;
      font-size: 1.2em;
    }
    .calculator-panel {
      width: 300px;
    }
    .chart-panel {
      flex-grow: 1;
      overflow: hidden;
      padding: 0;
      border: 2px solid var(--color-highlight);
      height: 100%;
    }
    .chart-panel h2 {
      padding: 10px 10px 5px 10px;
      background: var(--color-input-bg);
    }
    .chart-iframe {
      width: 100%;
      height: calc(100% - 40px);
      border: none;
      display: block;
    }
    .calculator-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      height: 100%;
    }
    #display {
      grid-column: 1 / -1;
      background: #0D0D0D;
      color: var(--color-highlight);
      border: 1px solid var(--color-highlight);
      text-align: right;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 1.8em;
      overflow: hidden;
      height: 30px;
      line-height: 30px;
    }
    .calc-button {
      background: #333;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 6px 0;
      font-size: 1em;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #444;
    }
    .calc-button:active {
      background: #555;
    }
    .calc-button.equals {
      grid-row: 4 / span 2;
      grid-column: 4 / span 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .calc-button.zero {
      grid-column: 1 / span 2;
    }
    .calc-button.operator {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
    }
    .calc-button.clear {
      background: #DC2626;
      color: white;
    }
    /* --- ESTILOS DEL BLOC DE NOTAS CON PESTAÑAS --- */
    .notepad-panel {
      min-height: 250px;
      flex-shrink: 0;
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 15px;
      box-shadow: var(--shadow-light);
      display: flex;
      flex-direction: column;
    }
    .notepad-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 12px;
      margin-bottom: 12px;
    }
    .notepad-tabs {
      display: flex;
      gap: 8px;
    }
    .tab-btn {
      background: #2a2a2a;
      color: #888;
      border: 1px solid var(--color-border);
      padding: 6px 15px;
      font-size: 0.9em;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
      font-weight: 500;
      outline: none;
      z-index: 20;
      /* Asegurar que esté por encima */
    }
    .tab-btn:hover {
      background: #333;
      color: var(--color-text);
      border-color: #666;
    }
    .tab-btn.active {
      background: var(--color-highlight);
      color: white;
      border-color: var(--color-highlight);
      font-weight: bold;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
    }
    #notepad {
      flex-grow: 1;
      width: 100%;
      background: var(--color-input-bg);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 12px;
      resize: none;
      box-sizing: border-box;
      font-size: 1.05em;
      line-height: 1.5;
      border-radius: 4px;
      outline: none;
    }
    #notepad:focus {
      border-color: var(--color-highlight);
    }
    .sidebar {
      grid-column: 2 / 3;
      position: sticky;
      right: 0;
      top: 52px;
      bottom: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
      background: var(--color-header-bg);
      height: calc(100vh - 52px);
      box-sizing: border-box;
    }
    .sidebar iframe {
      width: 100%;
      height: calc(50% - 5px);
      border: 3px solid var(--color-highlight);
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
    }
    /* SCROLLBARS */
    #notepad::-webkit-scrollbar,
    .main::-webkit-scrollbar {
      width: 10px;
    }
    #notepad::-webkit-scrollbar-thumb,
    .main::-webkit-scrollbar-thumb {
      background-color: var(--color-highlight);
      border-radius: 5px;
    }
    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
      .main {
        height: auto;
        overflow-y: visible;
      }
      .sidebar {
        position: static;
        height: auto;
        flex-direction: row;
        overflow-x: auto;
      }
      .top-tools-container {
        flex-direction: column;
        height: auto;
      }
      .calculator-panel {
        width: 100%;
      }
      .sidebar iframe {
        min-width: 80%;
      }
    }
  </style>
</head>
<body>
  <div id="youtube-player" style="display:none;"></div>
  <div class="container">
    <header class="top-bar">
      <nav class="top-left">
        <div class="box user-info">DANIFU777</div>
        <div class="box music-control" id="prevBtn"><i class="fa-solid fa-backward-step"></i> ATRÁS</div>
        <div class="box music-control" id="playPauseBtn"><i class="fa-solid fa-play"></i> REPRODUCIR</div>
        <div class="box music-control" id="nextBtn"><i class="fa-solid fa-forward-step"></i> ADELANTE</div>
        <div class="box song-info">Música: <span id="song">YouTube Ready</span></div>
      </nav>
      <div class="top-right">
        <div class="box date-time" id="fecha-hora"></div>
      </div>
    </header>
    <main class="main">
      <div class="top-tools-container">
        <div class="tool-panel calculator-panel">
          <h2>Calculadora</h2>
          <div id="display">0</div>
          <div class="calculator-grid">
            <button class="calc-button clear" onclick="clearDisplay()">AC</button>
            <button class="calc-button operator" onclick="appendOperator('/')">/</button>
            <button class="calc-button operator" onclick="appendOperator('*')">x</button>
            <button class="calc-button" onclick="backspace()"><i class="fa-solid fa-delete-left"></i></button>
            <button class="calc-button" onclick="appendNumber('7')">7</button>
            <button class="calc-button" onclick="appendNumber('8')">8</button>
            <button class="calc-button" onclick="appendNumber('9')">9</button>
            <button class="calc-button operator" onclick="appendOperator('-')">-</button>
            <button class="calc-button" onclick="appendNumber('4')">4</button>
            <button class="calc-button" onclick="appendNumber('5')">5</button>
            <button class="calc-button" onclick="appendNumber('6')">6</button>
            <button class="calc-button operator" onclick="appendOperator('+')">+</button>
            <button class="calc-button" onclick="appendNumber('1')">1</button>
            <button class="calc-button" onclick="appendNumber('2')">2</button>
            <button class="calc-button" onclick="appendNumber('3')">3</button>
            <button class="calc-button operator equals" onclick="calculate()">=</button>
            <button class="calc-button zero" onclick="appendNumber('0')">0</button>
            <button class="calc-button" onclick="appendNumber('.')">.</button>
          </div>
        </div>
        <div class="tool-panel chart-panel">
          <h2>Mini-Gráfico (USDT/ARS)</h2>
          <iframe class="chart-iframe"
            src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3AUSDTARS&interval=D&theme=dark&style=1&locale=es&toolbar_bg=f1f3f6&allow_symbol_change=0&enable_publishing=0&hide_side_toolbar=0&save_image=0&studies=[]&show_popup_button=0&calendar=0&hide_volume=1&amp;no-cache"
            frameborder="0" allowfullscreen></iframe>
        </div>
      </div>
      <div class="notepad-panel">
        <div class="notepad-header-row">
          <h2 id="notepad-title">Bloc de Notas - Pág 1</h2>
          <div class="notepad-tabs">
            <!-- USO DIRECTO DE ONCLICK Global -->
            <button class="tab-btn active" id="btn-tab-1" onclick="switchTab(1)">Pág 1</button>
            <button class="tab-btn" id="btn-tab-2" onclick="switchTab(2)">Pág 2</button>
            <button class="tab-btn" id="btn-tab-3" onclick="switchTab(3)">Pág 3</button>
          </div>
        </div>
        <textarea id="notepad" placeholder="Escribe tus notas aquí..."></textarea>
      </div>
    </main>
    <aside class="sidebar">
      <iframe class="video-frame" src="https://www.youtube.com/embed/QviXe8xvA50" frameborder="0"
        allowfullscreen></iframe>
      <iframe class="video-frame" src="https://www.youtube.com/embed/dIqzNSKCNlI" frameborder="0"
        allowfullscreen></iframe>
    </aside>
  </div>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    // --- LÓGICA JAVASCRIPT ---
    // 1. Calculadora (Global para Onclick)
    const display = document.getElementById('display');
    let currentInput = '0';
    let previousInput = '';
    let operation = null;
    let waitingForSecondOperand = false;
    window.updateDisplay = function () {
      if (display) display.textContent = currentInput.length > 15 ? currentInput.slice(0, 15) : currentInput;
    };
    window.appendNumber = function (number) {
      if (waitingForSecondOperand) { currentInput = number; waitingForSecondOperand = false; }
      else { currentInput = currentInput === '0' && number !== '.' ? number : currentInput + number; }
      updateDisplay();
    };
    window.appendOperator = function (nextOperation) {
      const inputValue = parseFloat(currentInput);
      if (operation && waitingForSecondOperand) { operation = nextOperation; return; }
      if (previousInput === '') { previousInput = inputValue; }
      else if (operation) {
        const result = performCalculation[operation](previousInput, inputValue);
        currentInput = String(result);
        previousInput = result;
      }
      waitingForSecondOperand = true; operation = nextOperation; updateDisplay();
    };
    const performCalculation = {
      '/': (a, b) => a / b, '*': (a, b) => a * b, '+': (a, b) => a + b, '-': (a, b) => a - b
    };
    window.calculate = function () {
      if (!operation || waitingForSecondOperand) return;
      const result = performCalculation[operation](previousInput, parseFloat(currentInput));
      currentInput = String(result);
      operation = null; previousInput = ''; waitingForSecondOperand = false;
      updateDisplay();
    };
    window.clearDisplay = function () { currentInput = '0'; previousInput = ''; operation = null; updateDisplay(); };
    window.backspace = function () {
      if (currentInput.length > 1) currentInput = currentInput.slice(0, -1);
      else currentInput = '0';
      updateDisplay();
    };
    // 2. Bloc de Notas con Multi-Pestañas (MODO ROBUSTO GLOBAL)
    let activeTab = localStorage.getItem('danifu_active_tab') || "1";
    // Función GLOBAL switchTab
    window.switchTab = function (tabNum) {
      const notepad = document.getElementById('notepad');
      const notepadTitle = document.getElementById('notepad-title');
      // Convertir a string para consistencia
      const newTab = String(tabNum);
      // Guardar actual
      if (notepad) localStorage.setItem(`danifu_notes_v2_${activeTab}`, notepad.value);
      // Cambiar
      activeTab = newTab;
      localStorage.setItem('danifu_active_tab', activeTab);
      // Actualizar UI
      if (notepadTitle) notepadTitle.innerText = `Bloc de Notas - Pág ${activeTab}`;
      // Botones
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById(`btn-tab-${activeTab}`);
      if (activeBtn) activeBtn.classList.add('active');
      // Contenido
      if (notepad) notepad.value = localStorage.getItem(`danifu_notes_v2_${activeTab}`) || "";
    };
    // Inicialización al cargar la ventana
    window.onload = function () {
      // Inicializar Bloc de Notas
      window.switchTab(activeTab); // Cargar estado inicial
      // Listener para escritura
      const notepad = document.getElementById('notepad');
      if (notepad) {
        notepad.addEventListener('input', () => {
          localStorage.setItem(`danifu_notes_v2_${activeTab}`, notepad.value);
        });
      }
    };
    // 3. Fecha y Hora
    function actualizarFechaHora() {
      const ahora = new Date();
      const el = document.getElementById("fecha-hora");
      if (el) el.textContent = ahora.toLocaleDateString() + " " + ahora.toLocaleTimeString();
    }
    setInterval(actualizarFechaHora, 1000);
    actualizarFechaHora();
    // 4. Música
    let player;
    const playPauseBtn = document.getElementById('playPauseBtn');
    const songNameElement = document.getElementById('song');
    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('youtube-player', {
        height: '1', width: '1', videoId: 'P0TqT0-qJqU',
        playerVars: { 'listType': 'playlist', 'list': 'PLKByqT47PJxp9fLnCY9Fptz-BBuoW9OWG', 'autoplay': 0, 'controls': 0 },
        events: {
          'onReady': (e) => {
            if (songNameElement) songNameElement.textContent = "Listo para Play";
            if (playPauseBtn) {
              playPauseBtn.onclick = () => {
                if (player.getPlayerState() == 1) player.pauseVideo();
                else player.playVideo();
              };
            }
            const prev = document.getElementById('prevBtn');
            const next = document.getElementById('nextBtn');
            if (prev) prev.onclick = () => player.previousVideo();
            if (next) next.onclick = () => player.nextVideo();
          },
          'onStateChange': (e) => {
            if (e.data == 1) {
              if (playPauseBtn) playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i> PAUSA';
              try {
                if (songNameElement) songNameElement.textContent = player.getVideoData().title.substring(0, 25) + "...";
              } catch (err) { }
            } else {
              if (playPauseBtn) playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i> REPRODUCIR';
            }
          }
        }
      });
    }
  </script>
</body>
</html>
