<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANIFU777 - Dominion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-bg: #0b0b0b;
            --color-card: #151515;
            --color-text: #e0e0e0;
            --color-highlight: #a855f7;
            --color-input-bg: #1e1e1e;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Pantalla de Carga/Login */
        #loginScreen {
            position: fixed;
            inset: 0;
            background: var(--color-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .login-card {
            background: var(--color-card);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid var(--color-highlight);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }

        .login-btn {
            background: white;
            color: black;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        /* Header Principal */
        header {
            background-color: var(--color-card);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--color-highlight); }

        /* Contenedor de Música */
        .music-container { display: flex; align-items: center; gap: 15px; position: relative; }
        .music-btn {
            background: none;
            border: 1px solid var(--color-highlight);
            color: var(--color-highlight);
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .music-btn:hover { background: var(--color-highlight); color: white; }
        .fa-spin-slow { animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #musicPanel {
            position: absolute;
            top: 50px;
            right: 0;
            background: var(--color-card);
            border: 2px solid var(--color-highlight);
            padding: 15px;
            border-radius: 10px;
            z-index: 2000;
            width: 250px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #musicPanel.hidden { display: none; }

        /* Grid de Pestañas */
        .main-content {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            padding: 15px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .tab-box {
            background: var(--color-card);
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }

        .tab-header {
            font-size: 0.7em;
            color: var(--color-highlight);
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }

        textarea {
            background: var(--color-input-bg);
            color: white;
            border: none;
            resize: none;
            flex-grow: 1;
            border-radius: 4px;
            padding: 8px;
            font-size: 0.9em;
        }

        .hidden { display: none !important; }
        .box { font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h1 style="color: var(--color-highlight); margin-bottom: 10px;">DANIFU777</h1>
        <p>Inicia sesión para acceder a tus notas en la nube</p>
        <button id="googleSignInBtn" class="login-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" width="20">
            Continuar con Google
        </button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <header>
        <div class="user-info">
            <img id="userAvatar" src="" alt="Avatar">
            <span id="userName" style="font-weight: bold;"></span>
            <button id="logoutBtn" style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-size:0.8em;">Cerrar Sesión</button>
        </div>

        <div class="music-container">
            <span class="box" id="songStatus">Pausado</span>
            <button class="music-btn" id="toggleMusicPanel">
                <i class="fa-solid fa-compact-disc fa-spin-slow"></i>
            </button>

            <div id="musicPanel" class="hidden">
                <div style="text-align: center; margin-bottom: 10px; font-size: 0.8em; color: var(--color-highlight);">CONTROL DE AUDIO</div>
                <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 15px;">
                    <button class="music-btn" id="prevBtn"><i class="fa-solid fa-backward"></i></button>
                    <button class="music-btn" id="playPauseBtn"><i class="fa-solid fa-play"></i></button>
                    <button class="music-btn" id="nextBtn"><i class="fa-solid fa-forward"></i></button>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 0.75em; margin-bottom: 5px;">
                    <span id="current-time">0:00</span>
                    <span id="duration-time">0:00</span>
                </div>
                <input type="range" id="volumeSlider" min="0" max="100" value="50" style="width: 100%; accent-color: var(--color-highlight);">
            </div>
        </div>
    </header>

    <div class="main-content" id="tabsGrid">
        </div>
</div>

<div id="youtube-player"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDOuLA7meYcSX7zpxHl6sA8eDGS21QD0CY",
        authDomain: "danifu777-4732c.firebaseapp.com",
        projectId: "danifu777-4732c",
        databaseURL: "https://danifu777-4732c-default-rtdb.firebaseio.com",
        storageBucket: "danifu777-4732c.firebasestorage.app",
        messagingSenderId: "171480985650",
        appId: "1:171480985650:web:4873bc5cc38d67d6c10c2b",
        measurementId: "G-SL032V9XGM"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // Iniciar Grid de 20 pestañas
    const tabsGrid = document.getElementById('tabsGrid');
    for (let i = 1; i <= 20; i++) {
        const tab = document.createElement('div');
        tab.className = 'tab-box';
        tab.innerHTML = `
            <div class="tab-header">Pestaña ${i}</div>
            <textarea id="tab-${i}" placeholder="Escribe algo..."></textarea>
        `;
        tabsGrid.appendChild(tab);

        // Evento para guardar en Firestore al escribir
        tab.querySelector('textarea').addEventListener('input', (e) => {
            if (auth.currentUser) {
                const userDoc = doc(db, "users", auth.currentUser.uid, "notas", `nota-${i}`);
                setDoc(userDoc, { content: e.target.value }, { merge: true });
            }
        });
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userName').textContent = user.displayName;
            document.getElementById('userAvatar').src = user.photoURL;

            // Cargar notas desde Firestore
            for (let i = 1; i <= 20; i++) {
                onSnapshot(doc(db, "users", user.uid, "notas", `nota-${i}`), (doc) => {
                    if (doc.exists()) {
                        document.getElementById(`tab-${i}`).value = doc.data().content;
                    }
                });
            }

            // Cargar música desde Realtime Database
            const musicRef = ref(rtdb, 'users/' + user.uid + '/musicProgress');
            onValue(musicRef, (snapshot) => {
                const data = snapshot.val();
                if (data && window.player && window.player.cueVideoById) {
                    player.cueVideoById({ videoId: data.videoId, startSeconds: data.time });
                }
            }, { onlyOnce: true });

        } else {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
        }
    });

    // Guardado automático de música cada 10 seg
    setInterval(() => {
        if (auth.currentUser && window.player && player.getPlayerState() === 1) {
            set(ref(rtdb, 'users/' + auth.currentUser.uid + '/musicProgress'), {
                videoId: player.getVideoData().video_id,
                time: Math.floor(player.getCurrentTime())
            });
        }
    }, 10000);

    document.getElementById('googleSignInBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);
</script>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let player;
    const toggleBtn = document.getElementById('toggleMusicPanel');
    const musicPanel = document.getElementById('musicPanel');
    const songStatus = document.getElementById('songStatus');

    toggleBtn.onclick = () => musicPanel.classList.toggle('hidden');

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '0', width: '0',
            playerVars: { 
                'listType': 'playlist', 
                'list': 'PLKByqT47PJxp9fLnCY9Fptz-BBuoW9OWG',
                'controls': 0 
            },
            events: {
                'onReady': () => player.setVolume(50),
                'onStateChange': (e) => {
                    const playBtn = document.getElementById('playPauseBtn');
                    if (e.data == 1) {
                        playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                        songStatus.textContent = "Reproduciendo";
                    } else {
                        playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                        songStatus.textContent = "Pausado";
                    }
                }
            }
        });
    }

    document.getElementById('playPauseBtn').onclick = () => {
        player.getPlayerState() == 1 ? player.pauseVideo() : player.playVideo();
    };
    document.getElementById('nextBtn').onclick = () => player.nextVideo();
    document.getElementById('prevBtn').onclick = () => player.previousVideo();
    document.getElementById('volumeSlider').oninput = (e) => player.setVolume(e.target.value);

    // Actualizar tiempos
    setInterval(() => {
        if (player && player.getCurrentTime) {
            const cur = Math.floor(player.getCurrentTime());
            const dur = Math.floor(player.getDuration());
            document.getElementById('current-time').textContent = Math.floor(cur/60) + ":" + (cur%60).toString().padStart(2,'0');
            document.getElementById('duration-time').textContent = Math.floor(dur/60) + ":" + (dur%60).toString().padStart(2,'0');
        }
    }, 1000);
</script>

</body>
</html>
