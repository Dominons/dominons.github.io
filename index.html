<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DANIFU777 - Dominon </title>
  <link rel="icon" type="image/ico" href="Favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --color-dark-bg: #1A1A1A;
      --color-header-bg: #282828;
      --color-border: #444;
      --color-highlight: #A855F7;
      --color-main-bg: #282828;
      --color-text: #EAEAEA;
      --color-input-bg: #1F1F1F;
      --shadow-light: 0 0 8px rgba(0, 0, 0, 0.5);
      --top-tools-height: 300px;
      --main-gap: 15px;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--color-dark-bg);
      color: var(--color-text);
      overflow: hidden;
      transition: background 0.3s;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    .top-bar {
      grid-column: 1 / span 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 15px;
      background: var(--color-header-bg);
      border-bottom: 2px solid var(--color-highlight);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.8);
      z-index: 10;
      position: sticky;
      top: 0;
    }
    .top-left,
    .top-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .box {
      border: 1px solid var(--color-border);
      padding: 4px 10px;
      background: #333;
      border-radius: 4px;
      box-shadow: var(--shadow-light);
      transition: background 0.3s ease;
      font-size: 0.9em;
      white-space: nowrap;
    }
    .main {
      grid-column: 1 / -1;
      background: var(--color-main-bg);
      padding: var(--main-gap);
      display: flex;
      flex-direction: column;
      gap: var(--main-gap);
      height: calc(100vh - 52px);
      overflow-y: auto;
      box-sizing: border-box;
    }
    h1 {
      display: none;
    }
    /* --- SECCIÓN SUPERIOR (CALCULADORA + CHART) --- */
    .top-tools-container {
      display: flex;
      gap: 20px;
      height: var(--top-tools-height);
      flex-shrink: 0;
    }
    .tool-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 10px;
      box-shadow: var(--shadow-light);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .tool-panel h2 {
      color: var(--color-highlight);
      margin-top: 0;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 5px;
      font-size: 1.2em;
    }
    .calculator-panel {
      width: 300px;
    }
    .chart-panel {
      flex-grow: 1;
      overflow: hidden;
      padding: 0;
      border: 2px solid var(--color-highlight);
      height: 100%;
    }
    .chart-panel h2 {
      padding: 10px 10px 5px 10px;
      background: var(--color-input-bg);
    }
    .chart-iframe {
      width: 100%;
      height: calc(100% - 40px);
      border: none;
      display: block;
    }
    .calculator-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      height: 100%;
    }
    #display {
      grid-column: 1 / -1;
      background: #0D0D0D;
      color: var(--color-highlight);
      border: 1px solid var(--color-highlight);
      text-align: right;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 1.8em;
      overflow: hidden;
      height: 30px;
      line-height: 30px;
    }
    .calc-button {
      background: #333;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 6px 0;
      font-size: 1em;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #444;
    }
    .calc-button:active {
      background: #555;
    }
    .calc-button.equals {
      grid-row: 4 / span 2;
      grid-column: 4 / span 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .calc-button.zero {
      grid-column: 1 / span 2;
    }
    .calc-button.operator {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
    }
    .calc-button.clear {
      background: #DC2626;
      color: white;
    }
    /* --- POMODORO PANEL --- */
    .pomodoro-container {
      display: flex;
      gap: 20px;
      flex-shrink: 0;
    }
    .pomodoro-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 15px;
      box-shadow: var(--shadow-light);
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .pomodoro-display {
      font-size: 2.2em;
      font-weight: bold;
      color: var(--color-highlight);
      font-family: monospace;
      letter-spacing: 2px;
      margin-left: 15px;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }
    .pomodoro-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .pomo-btn {
      background: #333;
      color: #ddd;
      border: 1px solid #555;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.9em;
      transition: background 0.2s;
    }
    .pomo-btn:hover {
      background: #444;
    }
    .pomo-btn.active {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
    }
    .custom-time-input {
      background: #0D0D0D;
      color: var(--color-highlight);
      border: 1px solid var(--color-highlight);
      padding: 6px 8px;
      border-radius: 4px;
      width: 60px;
      font-size: 0.9em;
      text-align: center;
    }
    .custom-time-input::placeholder {
      color: #777;
    }
    /* --- NOTEPAD PANEL --- */
    .notepad-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow-light);
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      min-height: 0;
    }
    .notepad-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 8px;
    }
    .notepad-header-row h2 {
      color: var(--color-highlight);
      margin: 0;
      font-size: 1.1em;
    }
    .notepad-tabs {
      display: flex;
      gap: 8px;
    }
    .tab-btn {
      background: #333;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.85em;
      transition: all 0.2s;
    }
    .tab-btn:hover {
      background: #444;
    }
    .tab-btn.active {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
    }
    #notepad {
      background: #0D0D0D;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 10px;
      border-radius: 4px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.95em;
      resize: none;
      flex-grow: 1;
    }
    #notepad::placeholder {
      color: #666;
    }
    #notepad:focus {
      outline: none;
      border-color: var(--color-highlight);
      box-shadow: 0 0 8px rgba(168, 85, 247, 0.3);
    }
    /* --- MÚSICA Y CONTROLES --- */
    .music-container {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .theme-buttons {
      display: flex;
      gap: 8px;
    }
    .theme-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #555;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .theme-btn:hover {
      transform: scale(1.15);
    }
    .theme-btn.purple {
      background: #A855F7;
      border-color: #A855F7;
    }
    .theme-btn.blue {
      background: #3B82F6;
      border-color: #3B82F6;
    }
    .theme-btn.green {
      background: #10B981;
      border-color: #10B981;
    }
    .theme-btn.red {
      background: #EF4444;
      border-color: #EF4444;
    }
    .theme-btn.pink {
      background: #EC4899;
      border-color: #EC4899;
    }
    .music-btn {
      background: #333;
      color: var(--color-text);
      border: 1px solid #555;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.85em;
      transition: background 0.2s;
    }
    .music-btn:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div class="top-left">
        <div class="box" id="fecha-hora">Cargando...</div>
      </div>
      <div class="top-right">
        <div class="theme-buttons">
          <button class="theme-btn purple" onclick="setTheme('#A855F7')" title="Púrpura"></button>
          <button class="theme-btn blue" onclick="setTheme('#3B82F6')" title="Azul"></button>
          <button class="theme-btn green" onclick="setTheme('#10B981')" title="Verde"></button>
          <button class="theme-btn red" onclick="setTheme('#EF4444')" title="Rojo"></button>
          <button class="theme-btn pink" onclick="setTheme('#EC4899')" title="Rosa"></button>
        </div>
        <div class="music-container">
          <button class="music-btn" id="playPauseBtn"><i class="fa-solid fa-play"></i> REPRODUCIR</button>
          <button class="music-btn" id="prevBtn"><i class="fa-solid fa-chevron-left"></i></button>
          <button class="music-btn" id="nextBtn"><i class="fa-solid fa-chevron-right"></i></button>
          <span class="box" id="song">Listo para Play</span>
        </div>
      </div>
    </div>

    <main class="main">
      <!-- CALCULADORA + GRÁFICO -->
      <div class="top-tools-container">
        <div class="tool-panel calculator-panel">
          <h2>Calculadora</h2>
          <div class="calculator-grid">
            <input type="text" id="display" readonly>
            <button class="calc-button clear" onclick="clearDisplay()">C</button>
            <button class="calc-button" onclick="backspace()">←</button>
            <button class="calc-button" onclick="appendOperator('/')">/</button>
            <button class="calc-button" onclick="appendNumber('7')">7</button>
            <button class="calc-button" onclick="appendNumber('8')">8</button>
            <button class="calc-button" onclick="appendNumber('9')">9</button>
            <button class="calc-button operator" onclick="appendOperator('*')">*</button>
            <button class="calc-button" onclick="appendNumber('4')">4</button>
            <button class="calc-button" onclick="appendNumber('5')">5</button>
            <button class="calc-button" onclick="appendNumber('6')">6</button>
            <button class="calc-button operator" onclick="appendOperator('-')">-</button>
            <button class="calc-button" onclick="appendNumber('1')">1</button>
            <button class="calc-button" onclick="appendNumber('2')">2</button>
            <button class="calc-button" onclick="appendNumber('3')">3</button>
            <button class="calc-button operator equals" onclick="calculate()">=</button>
            <button class="calc-button zero" onclick="appendNumber('0')">0</button>
            <button class="calc-button" onclick="appendNumber('.')">.</button>
          </div>
        </div>
        <div class="tool-panel chart-panel">
          <h2>Mini-Gráfico (USDT/ARS)</h2>
          <iframe class="chart-iframe"
            src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3AUSDTARS&interval=D&theme=dark&style=1&locale=es&toolbar_bg=f1f3f6&allow_symbol_change=0&enable_publishing=0&hide_side_toolbar=0&save_image=0&studies=[]&show_popup_button=0&calendar=0&hide_volume=1&amp;no-cache"
            frameborder="0" allowfullscreen></iframe>
        </div>
      </div>

      <!-- POMODORO -->
      <div class="pomodoro-container">
        <div class="pomodoro-panel">
          <div style="display:flex; align-items:center;">
            <h2 style="margin:0; font-size:1.3em; color:var(--color-highlight);">Pomodoro</h2>
            <div class="pomodoro-display" id="pomo-display">25:00</div>
          </div>
          <div class="pomodoro-controls">
            <input type="number" id="custom-min" class="custom-time-input" placeholder="Min" min="1" max="120">
            <button class="pomo-btn" onclick="setCustomTime()">FIJAR</button>
            <div style="width: 1px; height: 30px; background: #555; margin: 0 10px;"></div>
            <button class="pomo-btn" id="start-btn" onclick="togglePomodoro()">INICIAR</button>
            <button class="pomo-btn" onclick="resetPomodoro()">RST</button>
          </div>
        </div>
      </div>

      <!-- BLOC DE NOTAS -->
      <div class="notepad-panel">
        <div class="notepad-header-row">
          <h2 id="notepad-title">Bloc de Notas - Pág 1</h2>
          <div class="notepad-tabs">
            <button class="tab-btn active" id="btn-tab-1" onclick="switchTab(1)">Pág 1</button>
            <button class="tab-btn" id="btn-tab-2" onclick="switchTab(2)">Pág 2</button>
            <button class="tab-btn" id="btn-tab-3" onclick="switchTab(3)">Pág 3</button>
          </div>
        </div>
        <textarea id="notepad" placeholder="Escribe tus notas aquí..."></textarea>
      </div>
    </main>
  </div>

  <div id="youtube-player"></div>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    // --- FUNCIONES GLOBALES ---
    // 1. CALCULADORA
    const display = document.getElementById('display');
    let currentInput = '0'; let previousInput = ''; let operation = null; let waitingForSecondOperand = false;
    window.updateDisplay = function () { if (display) display.textContent = currentInput.length > 15 ? currentInput.slice(0, 15) : currentInput; };
    window.appendNumber = function (number) {
      if (waitingForSecondOperand) { currentInput = number; waitingForSecondOperand = false; }
      else { currentInput = currentInput === '0' && number !== '.' ? number : currentInput + number; }
      updateDisplay();
    };
    window.appendOperator = function (nextOperation) {
      const inputValue = parseFloat(currentInput);
      if (operation && waitingForSecondOperand) { operation = nextOperation; return; }
      if (previousInput === '') { previousInput = inputValue; }
      else if (operation) {
        const result = performCalculation[operation](previousInput, inputValue);
        currentInput = String(result); previousInput = result;
      }
      waitingForSecondOperand = true; operation = nextOperation; updateDisplay();
    };
    const performCalculation = { '/': (a, b) => a / b, '*': (a, b) => a * b, '+': (a, b) => a + b, '-': (a, b) => a - b };
    window.calculate = function () {
      if (!operation || waitingForSecondOperand) return;
      const result = performCalculation[operation](previousInput, parseFloat(currentInput));
      currentInput = String(result); operation = null; previousInput = ''; waitingForSecondOperand = false;
      updateDisplay();
    };
    window.clearDisplay = function () { currentInput = '0'; previousInput = ''; operation = null; updateDisplay(); };
    window.backspace = function () { if (currentInput.length > 1) currentInput = currentInput.slice(0, -1); else currentInput = '0'; updateDisplay(); };
    
    // 2. BLOC DE NOTAS
    let activeTab = localStorage.getItem('danifu_active_tab') || "1";
    window.switchTab = function (tabNum) {
      const notepad = document.getElementById('notepad');
      const notepadTitle = document.getElementById('notepad-title');
      if (notepad) localStorage.setItem(`danifu_notes_v2_${activeTab}`, notepad.value);
      activeTab = String(tabNum);
      localStorage.setItem('danifu_active_tab', activeTab);
      if (notepadTitle) notepadTitle.innerText = `Bloc de Notas - Pág ${activeTab}`;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById(`btn-tab-${activeTab}`);
      if (activeBtn) activeBtn.classList.add('active');
      if (notepad) notepad.value = localStorage.getItem(`danifu_notes_v2_${activeTab}`) || "";
    };
    
    // 3. CAMBIAR TEMA
    window.setTheme = function (color) {
      document.documentElement.style.setProperty('--color-highlight', color);
      localStorage.setItem('danifu_theme', color);
    };
    
    // 4. POMODORO CON PERSONALIZACIÓN
    let pomoInterval;
    let pomoSeconds = 25 * 60;
    let isRunning = false;
    window.updatePomoUI = function () {
      const m = Math.floor(pomoSeconds / 60).toString().padStart(2, '0');
      const s = (pomoSeconds % 60).toString().padStart(2, '0');
      document.getElementById('pomo-display').innerText = `${m}:${s}`;
    };
    window.togglePomodoro = function () {
      const btn = document.getElementById('start-btn');
      if (isRunning) {
        clearInterval(pomoInterval);
        isRunning = false;
        btn.innerText = "INICIAR";
        btn.classList.remove('active');
      } else {
        isRunning = true;
        btn.innerText = "PAUSAR";
        btn.classList.add('active');
        pomoInterval = setInterval(() => {
          if (pomoSeconds > 0) {
            pomoSeconds--;
            updatePomoUI();
          } else {
            clearInterval(pomoInterval);
            isRunning = false;
            btn.innerText = "INICIAR";
            btn.classList.remove('active');
            alert("¡Tiempo terminado!");
          }
        }, 1000);
      }
    };
    window.resetPomodoro = function () {
      clearInterval(pomoInterval);
      isRunning = false;
      pomoSeconds = 25 * 60;
      updatePomoUI();
      document.getElementById('start-btn').innerText = "INICIAR";
      document.getElementById('start-btn').classList.remove('active');
    };
    window.setCustomTime = function () {
      const input = document.getElementById('custom-min');
      const mins = parseInt(input.value);
      if (!mins || mins <= 0) {
        alert("Por favor ingresa un número de minutos válido.");
        return;
      }
      clearInterval(pomoInterval);
      isRunning = false;
      pomoSeconds = mins * 60;
      updatePomoUI();
      document.getElementById('start-btn').innerText = "INICIAR";
      document.getElementById('start-btn').classList.remove('active');
    };
    
    // INIT
    window.onload = function () {
      window.switchTab(activeTab);
      const notepad = document.getElementById('notepad');
      if (notepad) notepad.addEventListener('input', () => localStorage.setItem(`danifu_notes_v2_${activeTab}`, notepad.value));
      const savedTheme = localStorage.getItem('danifu_theme');
      if (savedTheme) window.setTheme(savedTheme);
      updatePomoUI();
    };
    
    // DATE
    setInterval(() => {
      const d = new Date();
      const el = document.getElementById("fecha-hora");
      if (el) el.textContent = d.toLocaleDateString() + " " + d.toLocaleTimeString();
    }, 1000);
    
    // YOUTUBE
    let player;
    const playPauseBtn = document.getElementById('playPauseBtn');
    const songNameElement = document.getElementById('song');
    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('youtube-player', {
        height: '1', width: '1', videoId: 'P0TqT0-qJqU',
        playerVars: { 'listType': 'playlist', 'list': 'PLKByqT47PJxp9fLnCY9Fptz-BBuoW9OWG', 'autoplay': 0, 'controls': 0 },
        events: {
          'onReady': () => {
            if (songNameElement) songNameElement.textContent = "Listo para Play";
            if (playPauseBtn) playPauseBtn.onclick = () => { if (player.getPlayerState() == 1) player.pauseVideo(); else player.playVideo(); };
            document.getElementById('prevBtn').onclick = () => player.previousVideo();
            document.getElementById('nextBtn').onclick = () => player.nextVideo();
          },
          'onStateChange': (e) => {
            if (e.data == 1) {
              if (playPauseBtn) playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i> PAUSA';
              try { if (songNameElement) songNameElement.textContent = player.getVideoData().title.substring(0, 25) + "..."; } catch (e) { }
            } else if (playPauseBtn) playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i> REPRODUCIR';
          }
        }
      });
    }
  </script>
</body>
</html>
