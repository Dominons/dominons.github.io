<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Plataforma</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Panel Izquierdo */
        .main-content {
            width: 70%;
            padding: 20px;
            overflow-y: auto;
        }

        .card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px #000;
        }

        .card h2 {
            margin-top: 0;
            font-size: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #222;
            color: white;
            border: none;
            padding: 10px;
            resize: none;
        }

        button {
            background: #444;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 8px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #666;
        }

        /* Panel Derecho fijo */
        .sidebar {
            width: 30%;
            background: #181818;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        iframe {
            width: 100%;
            height: 180px;
            margin-bottom: 20px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .date-time {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>

    <!-- PARTE IZQUIERDA -->
    <div class="main-content">

        <!-- CALCULADORA -->
        <div class="card">
            <h2>Calculadora</h2>
            <input type="text" id="calc-display" disabled 
                   style="width:100%;padding:10px;font-size:20px;background:#000;color:#0f0;border:none;text-align:right;margin-bottom:10px;">
            <div id="calc-buttons"></div>
        </div>

        <!-- Bloc de Notas -->
        <div class="card">
            <h2>Bloc de Notas</h2>
            <textarea id="notepad"></textarea>
            <button onclick="saveNote()">Guardar Nota</button>
        </div>

        <!-- MI PORTAFOLIO -->
        <div class="card">
            <h2>📈 Mi Portafolio</h2>

            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" 
                        src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                {
                  "colorTheme": "dark",
                  "dateRange": "1D",
                  "showChart": false,
                  "locale": "es",
                  "width": "100%",
                  "height": "300px",
                  "tabs": [
                    {
                      "title": "Acciones",
                      "symbols": [
                        { "s": "AMEX:SPY", "d": "SPY" },
                        { "s": "BCBA:YPF", "d": "YPF" },
                        { "s": "NASDAQ:TSLA", "d": "TSLA" },
                        { "s": "NASDAQ:MSFT", "d": "MSFT" },
                        { "s": "NASDAQ:GOOGL", "d": "GOOGL" },
                        { "s": "NASDAQ:AAPL", "d": "AAPL" },
                        { "s": "NASDAQ:NVDA", "d": "NVDA" },
                        { "s": "NASDAQ:AMZN", "d": "AMZN" }
                      ]
                    }
                  ]
                }
                </script>
            </div>

        </div>

    </div>

    <!-- DERECHA FIJA -->
    <div class="sidebar">
        <div class="date-time" id="dateTime"></div>
        <h3>Videos Sugeridos</h3>
        
        <iframe src="https://www.youtube.com/embed/jfKfPfyJRdk" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/DWcJFNfaw9c" allowfullscreen></iframe>
    </div>

<script>
    // Fecha y Hora
    function updateTime() {
        document.getElementById('dateTime').innerHTML =
            new Date().toLocaleString("es-AR");
    }
    setInterval(updateTime, 1000);
    updateTime();

    // Bloc de notas
    const noteArea = document.getElementById("notepad");
    noteArea.value = localStorage.getItem("notes") || "";
    function saveNote() {
        localStorage.setItem("notes", noteArea.value);
        alert("Guardado! ✔️");
    }

    // Generar botones calculadora
    const calcButtons = [
        "7","8","9","/","4","5","6","*","1","2","3","-","0",".","=","C"
    ];
    const container = document.getElementById("calc-buttons");
    calcButtons.forEach(text => {
        const btn = document.createElement("button");
        btn.textContent = text;
        btn.onclick = () => calcPress(text);
        container.appendChild(btn);
    });
    function calcPress(val) {
        const display = document.getElementById("calc-display");
        if (val === "C") display.value = "";
        else if (val === "=") {
            try { display.value = eval(display.value); } catch {}
        } else display.value += val;
    }
</script>

</body>
</html>
