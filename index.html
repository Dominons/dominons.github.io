<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DANIFU777 - Dominon </title>
  <link rel="icon" type="image/ico" href="Favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --color-dark-bg: #1A1A1A;
      --color-header-bg: #282828;
      --color-border: #444;
      --color-highlight: #A855F7;
      --color-main-bg: #282828;
      --color-text: #EAEAEA;
      --color-input-bg: #1F1F1F;
      --shadow-light: 0 0 8px rgba(0, 0, 0, 0.5);
      --main-gap: 15px;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--color-dark-bg);
      color: var(--color-text);
      overflow: hidden;
      transition: background 0.3s;
    }

    /* ========== LOGIN SCREEN ========== */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #loginScreen.hidden {
      display: none !important;
    }
    .login-container {
      background: #1F1F1F;
      border: 3px solid #A855F7;
      border-radius: 15px;
      padding: 50px;
      text-align: center;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
    }
    .google-button {
      background: white;
      color: #333;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1em;
    }
    .google-button:hover {
      background: #f0f0f0;
    }
    .google-button svg {
      width: 20px;
      height: 20px;
    }

    /* ========== MAIN CONTAINER ========== */
    .container {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    .container.hidden {
      display: none !important;
    }

    /* ========== TOP BAR ========== */
    .top-bar {
      grid-column: 1 / span 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 15px;
      background: var(--color-header-bg);
      border-bottom: 2px solid var(--color-highlight);
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.8);
      z-index: 10;
      position: sticky;
      top: 0;
    }
    .top-left,
    .top-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* ========== USER INFO (COMPACT) ========== */
    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      background: #333;
      border: 1px solid var(--color-border);
      border-radius: 20px;
      font-size: 0.85em;
    }
    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--color-highlight);
      object-fit: cover;
    }
    .user-name {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--color-text);
    }
    .logout-btn {
      background: #DC2626;
      color: white;
      border: none;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 15px;
      font-size: 0.8em;
      transition: background 0.2s;
    }
    .logout-btn:hover {
      background: #b91c1c;
    }

    /* ========== SHARED STYLES ========== */
    .box {
      border: 1px solid var(--color-border);
      padding: 4px 10px;
      background: #333;
      border-radius: 4px;
      box-shadow: var(--shadow-light);
      transition: background 0.3s ease;
      font-size: 0.9em;
      white-space: nowrap;
    }
    .main {
      grid-column: 1 / -1;
      background: var(--color-main-bg);
      padding: var(--main-gap);
      display: flex;
      flex-direction: column;
      gap: var(--main-gap);
      height: calc(100vh - 52px);
      overflow-y: auto;
      box-sizing: border-box;
    }
    .main::-webkit-scrollbar {
      width: 10px;
    }
    .main::-webkit-scrollbar-track {
      background: var(--color-input-bg);
    }
    .main::-webkit-scrollbar-thumb {
      background: var(--color-highlight);
      border-radius: 5px;
    }
    .main::-webkit-scrollbar-thumb:hover {
      background: #8b3ed9;
    }
    h1 {
      display: none;
    }
    /* --- GRÁFICO TOP --- */
    .chart-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 10px;
      box-shadow: var(--shadow-light);
      height: 300px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 10px;
    }
    .chart-header h2 {
      color: var(--color-highlight);
      margin: 0;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 5px;
      font-size: 1.2em;
      flex: 1;
    }
    .symbol-selector {
      background: #333;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 0.85em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .symbol-selector:hover {
      background: #444;
    }
    .symbol-selector:focus {
      outline: none;
      border-color: var(--color-highlight);
    }
    .chart-iframe {
      width: 100%;
      height: calc(100% - 40px);
      border: none;
      display: block;
    }
    /* --- NOTEPAD PANEL --- */
    .notepad-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow-light);
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      min-height: 200px;
    }
    .notepad-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 8px;
    }
    .notepad-header-row h2 {
      color: var(--color-highlight);
      margin: 0;
      font-size: 1.1em;
    }
    .notepad-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      width: 100%;
    }
    .tab-btn {
      background: #333;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.75em;
      transition: all 0.2s;
      white-space: nowrap;
      flex: 0 1 auto;
    }
    .tab-btn:hover {
      background: #444;
    }
    .tab-btn.active {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
    }
    #notepad {
      background: #0D0D0D;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 10px;
      border-radius: 4px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.95em;
      resize: none;
      flex-grow: 1;
    }
    #notepad::placeholder {
      color: #666;
    }
    #notepad:focus {
      outline: none;
      border-color: var(--color-highlight);
      box-shadow: 0 0 8px rgba(168, 85, 247, 0.3);
    }
    /* --- BOTTOM CONTAINER (CALC + POMODORO) --- */
    .bottom-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--main-gap);
      flex-shrink: 0;
      height: auto;
    }
    /* --- CALCULADORA --- */
    .calculator-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 8px;
      box-shadow: var(--shadow-light);
      display: flex;
      flex-direction: column;
    }
    .calculator-panel h2 {
      color: var(--color-highlight);
      margin: 0 0 6px 0;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 4px;
      font-size: 1em;
    }
    .calculator-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    .calc-display {
      grid-column: 1 / -1;
      background: #0D0D0D;
      color: var(--color-highlight);
      border: 2px solid var(--color-highlight);
      text-align: right;
      padding: 10px;
      margin-bottom: 6px;
      font-size: 1.5em;
      font-weight: bold;
      overflow: hidden;
      min-height: 32px;
      border-radius: 4px;
      font-family: monospace;
      word-break: break-all;
    }
    .calc-button {
      background: #333;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 10px 0;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.1s;
    }
    .calc-button:active {
      background: #555;
      transform: scale(0.95);
    }
    .calc-button:hover {
      background: #444;
    }
    .calc-button.equals {
      grid-column: 4 / span 1;
      grid-row: 5 / span 1;
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
      font-size: 1.1em;
    }
    .calc-button.equals:hover {
      background: #8b3ed9;
    }
    .calc-button.zero {
      grid-column: 1 / span 2;
    }
    .calc-button.operator {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
      font-size: 1.1em;
    }
    .calc-button.operator:hover {
      background: #8b3ed9;
    }
    .calc-button.clear {
      background: #DC2626;
      color: white;
      font-weight: bold;
    }
    .calc-button.clear:hover {
      background: #b91c1c;
    }
    /* --- POMODORO PANEL --- */
    .pomodoro-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 10px;
      box-shadow: var(--shadow-light);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .pomodoro-panel h2 {
      color: var(--color-highlight);
      margin: 0 0 6px 0;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 4px;
      font-size: 1em;
    }
    .pomodoro-display {
      font-size: 2em;
      font-weight: bold;
      color: var(--color-highlight);
      font-family: monospace;
      letter-spacing: 2px;
      text-align: center;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      margin: 8px 0;
    }
    .pomodoro-controls {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .pomo-btn {
      background: #333;
      color: #ddd;
      border: 1px solid #555;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.8em;
      transition: background 0.2s;
      flex: 1;
      min-width: 55px;
    }
    .pomo-btn:hover {
      background: #444;
    }
    .pomo-btn.active {
      background: var(--color-highlight);
      color: var(--color-dark-bg);
      font-weight: bold;
    }
    .custom-time-input {
      background: #0D0D0D;
      color: var(--color-highlight);
      border: 1px solid var(--color-highlight);
      padding: 5px 6px;
      border-radius: 4px;
      width: 50px;
      font-size: 0.8em;
      text-align: center;
      flex: 0 0 auto;
    }
    .custom-time-input::placeholder {
      color: #777;
    }
    /* --- MÚSICA Y CONTROLES --- */
    .music-container {
      display: flex;
      gap: 10px;
      align-items: center;
      position: relative;
    }
    .theme-buttons {
      display: flex;
      gap: 8px;
    }
    .theme-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #555;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .theme-btn:hover {
      transform: scale(1.15);
    }
    .theme-btn.purple { background: #A855F7; border-color: #A855F7; }
    .theme-btn.blue { background: #3B82F6; border-color: #3B82F6; }
    .theme-btn.green { background: #10B981; border-color: #10B981; }
    .theme-btn.red { background: #EF4444; border-color: #EF4444; }
    .theme-btn.pink { background: #EC4899; border-color: #EC4899; }
    .theme-btn.yellow { background: #FBBF24; border-color: #FBBF24; }
    .theme-btn.cyan { background: #06B6D4; border-color: #06B6D4; }
    .theme-btn.lime { background: #84CC16; border-color: #84CC16; }
    .theme-btn.orange { background: #F97316; border-color: #F97316; }
    .theme-btn.indigo { background: #6366F1; border-color: #6366F1; }
    .theme-btn.white { background: #FFFFFF; border-color: #FFFFFF; }
    .theme-btn.black { background: #000000; border-color: #FFFFFF; }
    .theme-btn.gray { background: #9CA3AF; border-color: #9CA3AF; }
    .music-btn {
      background: #333;
      color: var(--color-text);
      border: 1px solid #555;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.85em;
      transition: background 0.2s;
    }
    .music-btn:hover {
      background: var(--color-highlight);
    }
    .fa-spin-slow { animation: spin 4s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    /* SONG DISPLAY */
    .song-display {
      flex: 1;
      max-width: 250px;
      background: #0D0D0D;
      border: 1px solid var(--color-border);
      padding: 6px 12px;
      border-radius: 4px;
      overflow: hidden;
    }
    .song-marquee {
      display: block;
      color: var(--color-highlight);
      font-size: 0.85em;
      font-weight: 600;
      white-space: nowrap;
      animation: marquee 8s linear infinite;
    }
    @keyframes marquee {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    
    /* MUSIC PLAYER PANEL */
    #musicPanel.hidden { display: none !important; }
    .music-player-panel {
      position: absolute;
      top: 40px;
      right: 0;
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      padding: 15px;
      border-radius: 8px;
      z-index: 1000;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      min-width: 280px;
    }
    .player-header {
      text-align: center;
      margin-bottom: 12px;
      font-size: 0.8em;
      color: var(--color-highlight);
      font-weight: 700;
      letter-spacing: 1px;
    }
    .song-info {
      background: #0D0D0D;
      border: 1px solid var(--color-border);
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 12px;
      text-align: center;
    }
    .player-song-title {
      color: var(--color-text);
      font-size: 0.85em;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .progress-time {
      display: flex;
      justify-content: space-between;
      font-size: 0.7em;
      color: #AAA;
      margin-bottom: 6px;
    }
    .progress-bar-container {
      margin-bottom: 12px;
    }
    .progress-bar {
      width: 100%;
      height: 5px;
      accent-color: var(--color-highlight);
      cursor: pointer;
      border-radius: 2px;
    }
    .volume-control {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .volume-control i {
      color: var(--color-highlight);
      font-size: 0.85em;
    }
    .volume-slider {
      flex: 1;
      height: 4px;
      accent-color: var(--color-highlight);
      cursor: pointer;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <div id="loginScreen">
    <div class="login-container">
      <h1 style="color: #A855F7; font-size: 3em; margin: 0;">DANIFU777</h1>
      <p style="color: #EAEAEA; margin-top: 10px;">Dominon</p>
      <button class="google-button" id="googleSignInBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Iniciar sesión con Google
      </button>
    </div>
  </div>

  <div class="container hidden" id="mainApp">
    <div class="top-bar">
      <div class="top-left">
        <div class="box" id="fecha-hora">Cargando...</div>
      </div>
      <div class="top-right">
        <div class="user-info" id="userInfo">
          <img class="user-avatar" id="userAvatar" src="" alt="Avatar">
          <span class="user-name" id="userName"></span>
          <button class="logout-btn" id="logoutBtn" title="Cerrar sesión">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
        <div class="theme-buttons">
          <button class="theme-btn purple" onclick="setTheme('#A855F7')" title="Púrpura"></button>
          <button class="theme-btn blue" onclick="setTheme('#3B82F6')" title="Azul"></button>
          <button class="theme-btn green" onclick="setTheme('#10B981')" title="Verde"></button>
          <button class="theme-btn red" onclick="setTheme('#EF4444')" title="Rojo"></button>
          <button class="theme-btn pink" onclick="setTheme('#EC4899')" title="Rosa"></button>
          <button class="theme-btn yellow" onclick="setTheme('#FBBF24')" title="Amarillo"></button>
          <button class="theme-btn cyan" onclick="setTheme('#06B6D4')" title="Cyan"></button>
          <button class="theme-btn lime" onclick="setTheme('#84CC16')" title="Lima"></button>
          <button class="theme-btn orange" onclick="setTheme('#F97316')" title="Naranja"></button>
          <button class="theme-btn indigo" onclick="setTheme('#6366F1')" title="Índigo"></button>
          <button class="theme-btn white" onclick="setTheme('#FFFFFF')" title="Blanco"></button>
          <button class="theme-btn black" onclick="setTheme('#000000')" title="Negro"></button>
          <button class="theme-btn gray" onclick="setTheme('#9CA3AF')" title="Gris"></button>
        </div>
        <div class="music-container">
          <div class="song-display">
            <span id="songTitle" class="song-marquee">Listo para Play</span>
          </div>
          <button class="music-btn" id="toggleMusicPanel" title="Reproductor">
            <i class="fa-solid fa-music"></i>
          </button>
          
          <div id="musicPanel" class="hidden music-player-panel">
            <div class="player-header">REPRODUCTOR</div>
            
            <div class="song-info">
              <span id="playerSongTitle" class="player-song-title">Listo para Play</span>
            </div>
            
            <div class="player-controls">
              <button class="music-btn" id="prevBtn" title="Anterior"><i class="fa-solid fa-backward"></i></button>
              <button class="music-btn" id="playPauseBtn" title="Play/Pausa"><i class="fa-solid fa-play"></i></button>
              <button class="music-btn" id="nextBtn" title="Siguiente"><i class="fa-solid fa-forward"></i></button>
            </div>
            
            <div class="progress-time">
              <span id="current-time">0:00</span>
              <span id="duration-time">0:00</span>
            </div>
            
            <div class="progress-bar-container">
              <input type="range" id="progressBar" min="0" max="100" value="0" class="progress-bar">
            </div>
            
            <div class="volume-control">
              <i class="fa-solid fa-volume-low"></i>
              <input type="range" id="volumeSlider" min="0" max="100" value="50" class="volume-slider">
              <i class="fa-solid fa-volume-high"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <main class="main">
      <div class="chart-panel">
        <div class="chart-header">
          <h2>Mini-Gráfico</h2>
          <select class="symbol-selector" id="symbolSelect" onchange="changeSymbol()">
            <option value="BINANCE:USDTARS">USDT/ARS</option>
            <option value="FOREXCOM:XAUUSD">Oro (XAU/USD)</option>
            <option value="FOREXCOM:EURUSD">EUR/USD</option>
            <option value="FOREXCOM:GBPUSD">GBP/USD</option>
            <option value="FOREXCOM:JPYUSD">JPY/USD</option>
            <option value="BITSTAMP:BTCUSD">Bitcoin (BTC/USD)</option>
            <option value="BITSTAMP:ETHUSD">Ethereum (ETH/USD)</option>
            <option value="FOREXCOM:XAGUSD">Plata (XAG/USD)</option>
            <option value="FOREXCOM:WTIUSD">Petróleo (WTI/USD)</option>
            <option value="FOREXCOM:NGAS">Gas Natural</option>
          </select>

  <script type="module">
    import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    
    // --- FUNCIONES GLOBALES ---
    // 1. CALCULADORA
    const display = document.getElementById('display');
    let currentInput = '0'; let previousInput = ''; let operation = null; let waitingForSecondOperand = false;
    window.updateDisplay = function () { if (display) display.textContent = currentInput.length > 15 ? currentInput.slice(0, 15) : currentInput; };
    window.appendNumber = function (number) {
      if (waitingForSecondOperand) { currentInput = number; waitingForSecondOperand = false; }
      else { currentInput = currentInput === '0' && number !== '.' ? number : currentInput + number; }
      updateDisplay();
    };
    window.appendOperator = function (nextOperation) {
      const inputValue = parseFloat(currentInput);
      if (operation && waitingForSecondOperand) { operation = nextOperation; return; }
      if (previousInput === '') { previousInput = inputValue; }
      else if (operation) {
        const result = performCalculation[operation](previousInput, inputValue);
        currentInput = String(result); previousInput = result;
      }
      waitingForSecondOperand = true; operation = nextOperation; updateDisplay();
    };
    const performCalculation = { '/': (a, b) => a / b, '*': (a, b) => a * b, '+': (a, b) => a + b, '-': (a, b) => a - b };
    window.calculate = function () {
      if (!operation || waitingForSecondOperand) return;
      const result = performCalculation[operation](previousInput, parseFloat(currentInput));
      currentInput = String(result); operation = null; previousInput = ''; waitingForSecondOperand = false;
      updateDisplay();
    };
    window.clearDisplay = function () { currentInput = '0'; previousInput = ''; operation = null; updateDisplay(); };
    window.backspace = function () { if (currentInput.length > 1) currentInput = currentInput.slice(0, -1); else currentInput = '0'; updateDisplay(); };

    // 2. BLOC DE NOTAS FIRESTORE

          const docSnap = await getDoc(userDocRef);
          if (docSnap.exists()) {
             if (notepadEl) notepadEl.value = docSnap.data().content || "";
          } else {
             if (notepadEl) notepadEl.value = "";
          }
       } catch (error) {
          console.error("Error cargando nota:", error);
          const notepadEl = document.getElementById('notepad');
          if (notepadEl) notepadEl.value = "";
       }
    }

    const notepadEl = document.getElementById('notepad');
    if (notepadEl) {
        notepadEl.addEventListener('input', function() {
           if (!window.auth || !window.auth.currentUser) return;
           clearTimeout(saveTimeout);
           saveTimeout = setTimeout(async function() {
              try {
                 const userDocRef = doc(window.db, "users", window.auth.currentUser.uid, "notas", "pagina-" + window.activeTab);
                 await setDoc(userDocRef, { content: notepadEl.value }, { merge: true });

                 console.error("Error guardando nota:", error);
              }
           }, 1000);
        });

    window.switchTab = function(tabNum) {
      window.activeTab = String(tabNum);

      var notepadTitle = document.getElementById('notepad-title');
      if (notepadTitle) notepadTitle.innerText = "Bloc de Notas - Pág " + window.activeTab;
      
      document.querySelectorAll('.tab-btn').forEach(function(btn) { btn.classList.remove('active'); });
      var activeBtn = document.getElementById('btn-tab-' + window.activeTab);

      if (window.auth && window.auth.currentUser) {
        window.loadNoteFromFirestore(window.activeTab);
      } else {
        var notepadEl = document.getElementById('notepad');
        if (notepadEl) notepadEl.value = "";
      }
    };

    // 3. CAMBIAR TEMA
    window.setTheme = function (color) {
      document.documentElement.style.setProperty('--color-highlight', color);
      localStorage.setItem('danifu_theme', color);
    };

    // 3.5. CAMBIAR SÍMBOLO DEL GRÁFICO
    window.changeSymbol = function () {

    // 4. POMODORO CON PERSONALIZACIÓN

    window.updatePomoUI = function () {
      const m = Math.floor(pomoSeconds / 60).toString().padStart(2, '0');
      const s = (pomoSeconds % 60).toString().padStart(2, '0');
      document.getElementById('pomo-display').innerText = `${m}:${s}`;

    window.togglePomodoro = function () {
      const btn = document.getElementById('start-btn');
      if (isRunning) {
        clearInterval(pomoInterval);
        isRunning = false;
        btn.innerText = "INICIAR";
        btn.classList.remove('active');
      } else {
        isRunning = true;
        btn.innerText = "PAUSAR";
        btn.classList.add('active');
        pomoInterval = setInterval(() => {
          if (pomoSeconds > 0) {
            pomoSeconds--;
            updatePomoUI();
          } else {
            clearInterval(pomoInterval);
            isRunning = false;
            btn.innerText = "INICIAR";
            btn.classList.remove('active');
            alert("¡Tiempo terminado!");
          }
        }, 1000);
      }
    };
    window.resetPomodoro = function () {
      clearInterval(pomoInterval);
      isRunning = false;
      pomoSeconds = 25 * 60;
      updatePomoUI();
      document.getElementById('start-btn').innerText = "INICIAR";
      document.getElementById('start-btn').classList.remove('active');
    };
    window.setCustomTime = function () {
      const input = document.getElementById('custom-min');
      const mins = parseInt(input.value);
      if (!mins || mins <= 0) {
        alert("Por favor ingresa un número de minutos válido.");
        return;
      }
      clearInterval(pomoInterval);
      isRunning = false;
      pomoSeconds = mins * 60;
      updatePomoUI();
      document.getElementById('start-btn').innerText = "INICIAR";
      document.getElementById('start-btn').classList.remove('active');
    };

    // INIT
    window.onload = function () {
      window.switchTab(window.activeTab);
      const savedTheme = localStorage.getItem('danifu_theme');
      if (savedTheme) window.setTheme(savedTheme);
      const savedSymbol = localStorage.getItem('danifu_chart_symbol');
      if (savedSymbol) {
        document.getElementById('symbolSelect').value = savedSymbol;
      }
      updatePomoUI();
      updateDisplay();
    };

    // DATE
    setInterval(() => {
      const d = new Date();
      const el = document.getElementById("fecha-hora");
      if (el) el.textContent = d.toLocaleDateString() + " " + d.toLocaleTimeString();
    }, 1000);
  </script>
</body>
</html>
