<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DANIFU777 - Dominon </title>
  <link rel="icon" type="image/ico" href="Favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --color-dark-bg: #1A1A1A;
      --color-header-bg: #282828;
      --color-border: #444;
      --color-highlight: #A855F7;
      --color-main-bg: #282828;
      --color-text: #EAEAEA;
      --color-input-bg: #1F1F1F;
      --shadow-light: 0 0 8px rgba(0, 0, 0, 0.5);
      --main-gap: 15px;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--color-dark-bg);
      color: var(--color-text);
      overflow: hidden;
      transition: background 0.3s;
    }

    /* ========== LOGIN SCREEN ========== */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .login-card {
      background: #282828;
      border: 2px solid var(--color-highlight);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 320px;
    }
    .login-card h1 {
      display: block;
      margin: 0 0 10px;
      font-size: 2.5em;
      color: var(--color-highlight);
    }
    .login-card p { margin-bottom: 30px; color: #aaa; }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1em;
    }

    /* ========== MAIN LAYOUT ========== */
    .container {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 15px;
      background: var(--color-header-bg);
      border-bottom: 2px solid var(--color-highlight);
      z-index: 10;
    }
    .top-left, .top-right { display: flex; align-items: center; gap: 15px; }
    .box {
      border: 1px solid var(--color-border);
      padding: 4px 10px;
      background: #333;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .main {
      padding: var(--main-gap);
      display: flex;
      flex-direction: column;
      gap: var(--main-gap);
      height: calc(100vh - 52px);
      box-sizing: border-box;
    }

    /* --- CHART --- */
    .chart-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 10px;
      height: 280px;
      display: flex;
      flex-direction: column;
    }
    .chart-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .chart-header h2 { color: var(--color-highlight); margin: 0; font-size: 1.1em; }
    .chart-iframe { width: 100%; height: 100%; border: none; }

    /* --- BLOC DE NOTAS (CORREGIDO) --- */
    .notepad-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      overflow: hidden;
    }
    .notepad-header-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 10px;
    }
    .notepad-header-row h2 { color: var(--color-highlight); margin: 0; font-size: 1em; }
    
    .notepad-tabs {
      display: flex;
      width: 100%;
      gap: 2px;
      overflow: hidden; /* Quita el scroll horizontal */
    }
    .tab-btn {
      flex: 1; /* Hace que todas las pestañas midan lo mismo y llenen el espacio */
      background: #333;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 4px 0;
      cursor: pointer;
      border-radius: 2px;
      font-size: 0.75em; /* Tamaño compacto para que entren las 20 */
      text-align: center;
      transition: all 0.2s;
      min-width: 0; /* Permite que el flexbox las encoja */
    }
    .tab-btn.active {
      background: var(--color-highlight);
      color: #000;
      font-weight: bold;
    }
    #notepad {
      background: #0D0D0D;
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 10px;
      border-radius: 4px;
      resize: none;
      flex-grow: 1;
      font-family: sans-serif;
    }

    /* --- BOTTOM --- */
    .bottom-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--main-gap);
      height: 180px;
    }
    .calculator-panel, .pomodoro-panel {
      background: var(--color-input-bg);
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 10px;
    }
    .calc-display {
      background: #000;
      color: var(--color-highlight);
      text-align: right;
      padding: 8px;
      font-size: 1.4em;
      margin-bottom: 5px;
      border-radius: 4px;
      font-family: monospace;
    }
    .calculator-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .calc-button { background: #333; color: #fff; border: 1px solid #444; padding: 5px; cursor: pointer; border-radius: 3px; font-size: 0.8em;}
    
    .pomodoro-display {
      font-size: 2.2em;
      color: var(--color-highlight);
      text-align: center;
      margin: 10px 0;
      font-family: monospace;
    }
    .pomodoro-controls { display: flex; gap: 5px; justify-content: center; }
    .pomo-btn { background: #333; color: #fff; border: 1px solid #444; padding: 5px 8px; cursor: pointer; font-size: 0.8em; flex: 1;}

    /* --- THEMES --- */
    .theme-buttons { display: flex; gap: 5px; }
    .theme-btn { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #fff; cursor: pointer; }
    .purple { background: #A855F7; } .blue { background: #3B82F6; } .red { background: #EF4444; } .white { background: #FFF; } .black { background: #000; }
    .neon-green { background: #39FF14; box-shadow: 0 0 5px #39FF14; }
    .neon-pink { background: #FF007F; box-shadow: 0 0 5px #FF007F; }
  </style>
</head>
<body>

  <div id="loginScreen">
    <div class="login-card">
      <h1>DANIFU777</h1>
      <p>Dominon</p>
      <button class="btn-google" id="googleLoginBtn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18"> Iniciar sesión con Google
      </button>
    </div>
  </div>

  <div class="container" id="appContent" style="display:none;">
    <div class="top-bar">
      <div class="top-left">
        <div class="box" id="fecha-hora">00/00/0000 00:00:00</div>
      </div>
      <div class="top-right">
        <div class="theme-buttons">
          <button class="theme-btn purple" onclick="setTheme('#A855F7')"></button>
          <button class="theme-btn blue" onclick="setTheme('#3B82F6')"></button>
          <button class="theme-btn red" onclick="setTheme('#EF4444')"></button>
          <button class="theme-btn white" onclick="setTheme('#FFFFFF')"></button>
          <button class="theme-btn black" onclick="setTheme('#000000')"></button>
          <button class="theme-btn neon-green" onclick="setTheme('#39FF14')"></button>
          <button class="theme-btn neon-pink" onclick="setTheme('#FF007F')"></button>
        </div>
        <div class="box" id="user-info">Cargando...</div>
        <button class="box" style="cursor:pointer; background:#dc2626;" id="logoutBtn">Logout</button>
      </div>
    </div>

    <main class="main">
      <div class="chart-panel">
        <div class="chart-header"><h2>TradingView</h2></div>
        <iframe class="chart-iframe" src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3AUSDTARS&interval=D&theme=dark&style=1"></iframe>
      </div>

      <div class="notepad-panel">
        <div class="notepad-header-row">
          <h2 id="notepad-title">Bloc de Notas - Pág 1</h2>
          <div class="notepad-tabs" id="tabs-container">
            </div>
        </div>
        <textarea id="notepad" placeholder="Escribe algo..."></textarea>
      </div>

      <div class="bottom-container">
        <div class="calculator-panel">
          <div class="calc-display" id="display">0</div>
          <div class="calculator-grid">
            <button class="calc-button" onclick="clearDisplay()">C</button>
            <button class="calc-button" onclick="backspace()">←</button>
            <button class="calc-button" onclick="appendOperator('/')">/</button>
            <button class="calc-button" onclick="appendOperator('*')">*</button>
            <button class="calc-button" onclick="appendNumber('7')">7</button>
            <button class="calc-button" onclick="appendNumber('8')">8</button>
            <button class="calc-button" onclick="appendNumber('9')">9</button>
            <button class="calc-button" onclick="appendOperator('-')">-</button>
            <button class="calc-button" onclick="calculate()">=</button>
            <button class="calc-button" onclick="appendNumber('0')">0</button>
          </div>
        </div>

        <div class="pomodoro-panel">
          <div class="pomodoro-display" id="pomo-display">25:00</div>
          <div class="pomodoro-controls">
            <button class="pomo-btn" onclick="togglePomodoro()" id="start-btn">INICIAR</button>
            <button class="pomo-btn" onclick="resetPomodoro()">RST</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "danifu777-4732c.firebaseapp.com",
      projectId: "danifu777-4732c",
      storageBucket: "danifu777-4732c.appspot.com",
      messagingSenderId: "TU_SENDER_ID",
      appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginScreen = document.getElementById('loginScreen');
    const appContent = document.getElementById('appContent');
    const userInfo = document.getElementById('user-info');

    document.getElementById('googleLoginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginScreen.style.display = 'none';
        appContent.style.display = 'grid';
        userInfo.innerText = user.displayName;
      } else {
        loginScreen.style.display = 'flex';
        appContent.style.display = 'none';
      }
    });
  </script>

  <script>
    // THEME
    function setTheme(color) {
      document.documentElement.style.setProperty('--color-highlight', color);
      localStorage.setItem('danifu_theme', color);
    }
    const savedTheme = localStorage.getItem('danifu_theme');
    if(savedTheme) setTheme(savedTheme);

    // NOTEPAD TABS (Generar 20 compactas)
    const tabsContainer = document.getElementById('tabs-container');
    let activeTab = 1;

    for(let i=1; i<=20; i++) {
      let btn = document.createElement('button');
      btn.className = 'tab-btn' + (i===1 ? ' active' : '');
      btn.id = 'tab-' + i;
      btn.innerText = i;
      btn.onclick = () => switchTab(i);
      tabsContainer.appendChild(btn);
    }

    function switchTab(n) {
      localStorage.setItem('note_'+activeTab, document.getElementById('notepad').value);
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-'+n).classList.add('active');
      activeTab = n;
      document.getElementById('notepad-title').innerText = "Bloc de Notas - Pág " + n;
      document.getElementById('notepad').value = localStorage.getItem('note_'+n) || "";
    }
    document.getElementById('notepad').value = localStorage.getItem('note_1') || "";

    // POMODORO SIMPLE
    let pomoSec = 25*60; let pInt; let pRun = false;
    function updatePUI() {
      let m = Math.floor(pomoSec/60); let s = pomoSec%60;
      document.getElementById('pomo-display').innerText = `${m}:${s<10?'0':''}${s}`;
    }
    function togglePomodoro() {
      const btn = document.getElementById('start-btn');
      if(pRun){ clearInterval(pInt); pRun=false; btn.innerText="INICIAR"; }
      else {
        pRun=true; btn.innerText="PAUSA";
        pInt = setInterval(() => { if(pomoSec>0){pomoSec--; updatePUI();} else {clearInterval(pInt); alert("¡Tiempo!"); resetPomodoro();} }, 1000);
      }
    }
    function resetPomodoro() { clearInterval(pInt); pRun=false; pomoSec=25*60; updatePUI(); document.getElementById('start-btn').innerText="INICIAR"; }

    // CALC
    const display = document.getElementById('display');
    window.appendNumber = (n) => { if(display.innerText==='0') display.innerText=n; else display.innerText+=n; };
    window.appendOperator = (o) => display.innerText += o;
    window.clearDisplay = () => display.innerText = '0';
    window.backspace = () => display.innerText = display.innerText.slice(0,-1) || '0';
    window.calculate = () => { try { display.innerText = eval(display.innerText); } catch { display.innerText = "Error"; } };

    // CLOCK
    setInterval(() => { document.getElementById('fecha-hora').innerText = new Date().toLocaleString(); }, 1000);
  </script>
</body>
</html>
