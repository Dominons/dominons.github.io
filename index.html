<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DANIFU777 - Dominon</title>
  <link rel="icon" type="image/ico" href="Favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --color-dark-bg: #0A0A0A;
      --color-header-bg: #151515;
      --color-border: #333;
      --color-highlight: #A855F7;
      --color-main-bg: #111;
      --color-text: #EAEAEA;
      --color-input-bg: #0D0D0D;
      --shadow-light: 0 0 10px rgba(0, 0, 0, 0.7);
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--color-dark-bg);
      color: var(--color-text);
      overflow: hidden;
    }
    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    /* BARRA SUPERIOR */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 15px;
      background: var(--color-header-bg);
      border-bottom: 2px solid var(--color-highlight);
      z-index: 10;
    }
    .top-left, .top-right { display: flex; align-items: center; gap: 12px; }
    .box {
      border: 1px solid var(--color-border);
      padding: 3px 8px;
      background: #222;
      border-radius: 4px;
      font-size: 0.85em;
    }
    .theme-buttons { display: flex; gap: 5px; }
    .theme-btn {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid #fff;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .theme-btn:hover { transform: scale(1.2); }
    /* COLORES SOLICITADOS */
    .purple { background: #A855F7; } .blue { background: #3B82F6; }
    .red { background: #EF4444; } .white { background: #FFFFFF; }
    .black { background: #000000; border: 1px solid #444; }
    /* NEONES ÉPICOS */
    .neon-green { background: #39FF14; box-shadow: 0 0 5px #39FF14; }
    .neon-pink { background: #FF007F; box-shadow: 0 0 5px #FF007F; }
    .neon-cyan { background: #00FFFF; box-shadow: 0 0 5px #00FFFF; }
    .neon-yellow { background: #CCFF00; box-shadow: 0 0 5px #CCFF00; }
    .neon-orange { background: #FF5F1F; box-shadow: 0 0 5px #FF5F1F; }

    .main {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      overflow-y: auto;
    }

    /* GRÁFICO */
    .chart-panel {
      height: 250px;
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      background: var(--color-input-bg);
      overflow: hidden;
    }
    .chart-iframe { width: 100%; height: 100%; border: none; }

    /* BLOC DE NOTAS COMPACTO */
    .notepad-panel {
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      background: var(--color-input-bg);
      display: flex;
      flex-direction: column;
      padding: 8px;
      flex: 1;
    }
    .notepad-tabs {
      display: flex;
      justify-content: space-between;
      gap: 2px;
      margin-bottom: 5px;
    }
    .tab-btn {
      flex: 1;
      background: #222;
      color: #aaa;
      border: 1px solid #333;
      padding: 2px 0;
      font-size: 0.7em;
      cursor: pointer;
      border-radius: 2px;
    }
    .tab-btn.active {
      background: var(--color-highlight);
      color: #000;
      font-weight: bold;
    }
    #notepad {
      background: #050505;
      color: #fff;
      border: 1px solid #222;
      padding: 10px;
      flex: 1;
      resize: none;
      font-size: 0.9em;
    }

    /* BOTTOM CONTAINER */
    .bottom-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      height: 180px;
    }

    /* CALCULADORA */
    .calculator-panel {
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 8px;
      display: flex;
      flex-direction: column;
    }
    .calc-display {
      background: #000;
      color: var(--color-highlight);
      text-align: right;
      padding: 5px;
      font-size: 1.2em;
      margin-bottom: 5px;
      border: 1px solid #222;
    }
    .calculator-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      flex: 1;
    }
    .calc-btn {
      background: #222;
      border: 1px solid #333;
      color: #fff;
      cursor: pointer;
      font-size: 0.8em;
    }
    .calc-btn.op { background: var(--color-highlight); color: #000; }

    /* POMODORO CORREGIDO (CENTRADITO Y COMPACTO) */
    .pomodoro-panel {
      border: 2px solid var(--color-highlight);
      border-radius: 8px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .pomo-display {
      font-size: 3em;
      color: var(--color-highlight);
      font-family: monospace;
      margin-bottom: 10px;
    }
    .pomo-controls {
      display: flex;
      gap: 5px;
      width: 100%;
    }
    .pomo-input {
      width: 40px;
      background: #000;
      color: #fff;
      border: 1px solid var(--color-highlight);
      text-align: center;
    }
    .pomo-btn {
      flex: 1;
      background: #222;
      color: #fff;
      border: 1px solid #444;
      padding: 5px;
      cursor: pointer;
      font-size: 0.8em;
    }
    .pomo-btn.active { background: var(--color-highlight); color: #000; }
  </style>
</head>
<body>

  <div class="container">
    <div class="top-bar">
      <div class="top-left">
        <div class="box" id="fecha-hora">00/00/0000 00:00:00</div>
      </div>
      <div class="top-right">
        <div class="theme-buttons">
          <button class="theme-btn purple" onclick="setTheme('#A855F7')"></button>
          <button class="theme-btn blue" onclick="setTheme('#3B82F6')"></button>
          <button class="theme-btn red" onclick="setTheme('#EF4444')"></button>
          <button class="theme-btn white" onclick="setTheme('#FFFFFF')"></button>
          <button class="theme-btn black" onclick="setTheme('#000000')"></button>
          <button class="theme-btn neon-green" onclick="setTheme('#39FF14')"></button>
          <button class="theme-btn neon-pink" onclick="setTheme('#FF007F')"></button>
          <button class="theme-btn neon-cyan" onclick="setTheme('#00FFFF')"></button>
          <button class="theme-btn neon-yellow" onclick="setTheme('#CCFF00')"></button>
          <button class="theme-btn neon-orange" onclick="setTheme('#FF5F1F')"></button>
        </div>
        <div class="box" id="song"><i class="fa-solid fa-music"></i> DANIFU777 Radio</div>
      </div>
    </div>

    <main class="main">
      <div class="chart-panel">
        <iframe class="chart-iframe" src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3AUSDTARS&interval=D&theme=dark&style=1"></iframe>
      </div>

      <div class="notepad-panel">
        <div class="notepad-tabs" id="tab-container">
          </div>
        <textarea id="notepad" placeholder="Escribe aquí..."></textarea>
      </div>

      <div class="bottom-container">
        <div class="calculator-panel">
          <div class="calc-display" id="calc-display">0</div>
          <div class="calculator-grid">
            <button class="calc-btn" onclick="clearCalc()">C</button>
            <button class="calc-btn" onclick="backCalc()">←</button>
            <button class="calc-btn op" onclick="setOp('/')">/</button>
            <button class="calc-btn op" onclick="setOp('*')">×</button>
            <button class="calc-btn" onclick="num('7')">7</button>
            <button class="calc-btn" onclick="num('8')">8</button>
            <button class="calc-btn" onclick="num('9')">9</button>
            <button class="calc-btn op" onclick="setOp('-')">-</button>
            <button class="calc-btn" onclick="num('4')">4</button>
            <button class="calc-btn" onclick="num('5')">5</button>
            <button class="calc-btn" onclick="num('6')">6</button>
            <button class="calc-btn op" onclick="setOp('+')">+</button>
            <button class="calc-btn" onclick="num('1')">1</button>
            <button class="calc-btn" onclick="num('2')">2</button>
            <button class="calc-btn" onclick="num('3')">3</button>
            <button class="calc-btn op" style="grid-row: span 2;" onclick="solve()">=</button>
            <button class="calc-btn" style="grid-column: span 2;" onclick="num('0')">0</button>
            <button class="calc-btn" onclick="num('.')">.</button>
          </div>
        </div>

        <div class="pomodoro-panel">
          <div class="pomo-display" id="pomo-time">25:00</div>
          <div class="pomo-controls">
            <input type="number" id="pomo-min" class="pomo-input" value="25">
            <button class="pomo-btn" onclick="setPomo()">FIJAR</button>
            <button class="pomo-btn" id="pomo-start" onclick="togglePomo()">INICIAR</button>
            <button class="pomo-btn" onclick="resetPomo()">RST</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // THEME
    function setTheme(color) {
      document.documentElement.style.setProperty('--color-highlight', color);
      localStorage.setItem('danifu_theme', color);
    }
    const savedTheme = localStorage.getItem('danifu_theme');
    if(savedTheme) setTheme(savedTheme);

    // NOTEPAD TABS (Una sola línea)
    const tabCont = document.getElementById('tab-container');
    let currentTab = 1;
    for(let i=1; i<=15; i++) {
      let b = document.createElement('button');
      b.className = 'tab-btn' + (i===1?' active':'');
      b.id = 'tab-'+i;
      b.innerText = i;
      b.onclick = () => switchTab(i);
      tabCont.appendChild(b);
    }

    function switchTab(n) {
      localStorage.setItem('note_'+currentTab, document.getElementById('notepad').value);
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-'+n).classList.add('active');
      currentTab = n;
      document.getElementById('notepad').value = localStorage.getItem('note_'+n) || "";
    }
    document.getElementById('notepad').value = localStorage.getItem('note_1') || "";

    // POMODORO
    let pTime = 25 * 60;
    let pInt;
    let pRun = false;
    function updatePUI() {
      let m = Math.floor(pTime/60); let s = pTime%60;
      document.getElementById('pomo-time').innerText = `${m}:${s<10?'0':''}${s}`;
    }
    function togglePomo() {
      let btn = document.getElementById('pomo-start');
      if(pRun) { clearInterval(pInt); pRun = false; btn.innerText = "INICIAR"; btn.classList.remove('active'); }
      else {
        pRun = true; btn.innerText = "PAUSA"; btn.classList.add('active');
        pInt = setInterval(() => { if(pTime>0){pTime--; updatePUI();} else {clearInterval(pInt); alert("Fin!"); resetPomo();} }, 1000);
      }
    }
    function resetPomo() { clearInterval(pInt); pRun = false; pTime = 25*60; updatePUI(); }
    function setPomo() { pTime = document.getElementById('pomo-min').value * 60; updatePUI(); }

    // CALC SIMPLE
    let cDisp = document.getElementById('calc-display');
    function num(v) { if(cDisp.innerText==='0') cDisp.innerText=v; else cDisp.innerText+=v; }
    function clearCalc() { cDisp.innerText = '0'; }
    function backCalc() { cDisp.innerText = cDisp.innerText.slice(0,-1) || '0'; }
    function setOp(o) { cDisp.innerText += o; }
    function solve() { try { cDisp.innerText = eval(cDisp.innerText); } catch { cDisp.innerText = "Error"; } }

    // CLOCK
    setInterval(() => { document.getElementById('fecha-hora').innerText = new Date().toLocaleString(); }, 1000);
  </script>
</body>
</html>
