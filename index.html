<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Plataforma</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-content {
            width: 70%;
            padding: 20px;
            overflow-y: auto;
        }

        .card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px #000;
        }

        .card h2 {
            margin-top: 0;
            font-size: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #222;
            color: white;
            border: none;
            padding: 10px;
            resize: none;
        }

        button {
            background: #444;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 8px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #666;
        }

        .sidebar {
            width: 30%;
            background: #181818;
            padding: 15px;
            overflow-y: auto;
        }

        iframe {
            width: 100%;
            height: 180px;
            margin-bottom: 20px;
            border-radius: 6px;
        }

        .date-time {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Portafolio tabla */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 15px;
        }
        th, td {
            padding: 6px;
            border-bottom: 1px solid #333;
        }
        th {
            color: #0dd;
        }
        .green { color: #0f0; }
        .red { color: #f44; }
        .grey { color: #aaa; }
    </style>
</head>
<body>

    <div class="main-content">

        <div class="card">
            <h2>Calculadora</h2>
            <input type="text" id="calc-display" disabled 
                   style="width:100%;padding:10px;font-size:20px;background:#000;color:#0f0;border:none;text-align:right;margin-bottom:10px;">
            <div id="calc-buttons"></div>
        </div>

        <div class="card">
            <h2>Bloc de Notas</h2>
            <textarea id="notepad"></textarea>
            <button onclick="saveNote()">Guardar Nota</button>
        </div>

        <!-- 💹 NUEVO: Portafolio -->
        <div class="card">
            <h2>📈 Mi Portafolio</h2>
            <table id="portfolio">
                <thead>
                    <tr>
                        <th>Activo</th>
                        <th>Precio</th>
                        <th>Cambio</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>SPY</td><td>—</td><td>—</td></tr>
                    <tr><td>YPF</td><td>—</td><td>—</td></tr>
                    <tr><td>TSLA</td><td>—</td><td>—</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- VIDEOS -->
    <div class="sidebar">
        <div class="date-time" id="dateTime"></div>

        <h3>Videos Sugeridos</h3>
        <iframe src="https://www.youtube.com/embed/jfKfPfyJRdk" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/DWcJFNfaw9c" allowfullscreen></iframe>
    </div>

<script>
    function updateTime() {
        document.getElementById('dateTime').innerHTML =
            new Date().toLocaleString("es-AR");
    }
    setInterval(updateTime, 1000);
    updateTime();

    const noteArea = document.getElementById("notepad");
    noteArea.value = localStorage.getItem("notes") || "";
    function saveNote() {
        localStorage.setItem("notes", noteArea.value);
        alert("Guardado! ✔️");
    }

    const calcButtons = [
        "7","8","9","/","4","5","6","*","1","2","3","-","0",".","=","C"
    ];
    const container = document.getElementById("calc-buttons");
    calcButtons.forEach(text => {
        const btn = document.createElement("button");
        btn.textContent = text;
        btn.onclick = () => calcPress(text);
        container.appendChild(btn);
    });
    function calcPress(val) {
        const display = document.getElementById("calc-display");
        if (val === "C") display.value = "";
        else if (val === "=") {
            try { display.value = eval(display.value); } catch {}
        } else display.value += val;
    }

    /* 🎯 ACTUALIZACIÓN DE ACTIVOS */
    const assets = ["SPY", "YPF", "TSLA"];

    async function updatePrices() {
        for (let i = 0; i < assets.length; i++) {
            const symbol = assets[i];
            try {
                const response = await fetch(
                    `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1m`
                );
                const data = await response.json();
                const result = data.chart.result[0];
                const quote = result.meta;

                const price = quote.regularMarketPrice;
                const change = quote.regularMarketChangePercent;

                const tbody = document.querySelector("#portfolio tbody");
                const row = tbody.rows[i];

                row.cells[1].innerHTML = price.toFixed(2);

                if (change > 0) {
                    row.cells[2].innerHTML = `+${change.toFixed(2)}%`;
                    row.cells[2].className = "green";
                } else if (change < 0) {
                    row.cells[2].innerHTML = `${change.toFixed(2)}%`;
                    row.cells[2].className = "red";
                } else {
                    row.cells[2].innerHTML = "0.00%";
                    row.cells[2].className = "grey";
                }

            } catch (e) {
                console.log("Error:", e);
            }
        }
    }

    updatePrices();
    setInterval(updatePrices, 60000);
</script>

</body>
</html>
